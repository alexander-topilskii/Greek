# Убеждаемся, что закоммиченные HTML совпадают с выводом генератора.

name: Verify generated HTML

on:
  pull_request:
    paths:
      - "book/pages/**"
      - "scripts/generate_book_lesson_content_md.py"
      - "scripts/generate_index_html.py"
      - "scripts/requirements-generate.txt"
      - "Readme.md"
      - "AGENTS.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: pip install -r scripts/requirements-generate.txt
      - name: Regenerate HTML
        run: python3 scripts/generate_book_lesson_content_md.py
      - name: Check working tree
        run: git diff --exit-code
