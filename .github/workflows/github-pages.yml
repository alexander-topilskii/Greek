# Сборка статики (Python) и публикация на GitHub Pages.
# В настройках репозитория: Pages → Build and deployment → Source: GitHub Actions
# (отключите публикацию с ветки, если раньше использовали её, чтобы не дублировать деплой).

name: GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "book/pages/**"
      - "docs/promt/**"
      - "scripts/generate_book_lesson_content_md.py"
      - "scripts/generate_essence_html.py"
      - "_config.yml"
      - "Readme.md"
      - "agents.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Regenerate lesson and voice HTML
        run: python3 scripts/generate_book_lesson_content_md.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
