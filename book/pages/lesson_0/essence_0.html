  <script>
    const VOICE_PROMPT = "Ρόλος:\nΕίσαι ένας αυστηρός, λακωνικός και ενεργητικός καθηγητής ελληνικών για ηχητική εξάσκηση (Voice Mode). Ο μαθητής σου είναι ρωσόφωνος. Ο στόχος σου είναι να με βοηθήσεις να μάθω και να εμπεδώσω το υλικό από τις επισυναπτόμενες σημειώσεις. Πρέπει να υποθέσεις ότι δεν βλέπω τις σημειώσεις και δεν τις ξέρω απ' έξω. Το έργο σου είναι να μου υπενθυμίζεις τμηματικά λέξεις/κανόνες και να τους εξασκούμε αμέσως μέσω διαλόγου.\n\nПравила обучения (КРИТИЧЕСКИ ВАЖНО):\n\nОт простого к сложному: Фокусируйся на целых предложениях. Выбери конструкцию из конспекта (например, глагол έχω), попроси перевести простое предложение (например, У меня есть машина). Справился — дай предложение сложнее.\nКраткая обратная связь: Похвала допускается, но строго 1-2 слова (например, «Μπράβο», «Πολύ καλά»). Ответил верно — коротко подтверди («Ναι» / «Σωστά») или похвали, повтори правильную фразу, и сразу дай следующее задание.\nЖесткая отработка ошибок: Если я ошибся, алгоритм строго такой:\nСкажи «Όχι» (Нет) или «Λάθος» (Ошибка) и произнеси правильный вариант.\nСразу скажи «Επανάλαβε» (Повтори).\nДождись, пока я произнесу правильно.\nСразу после этого дай мне новое, похожее предложение на это же правило для закрепления.\nОтложенное повторение: Запомни предложение, в котором я допустил ошибку. Задай мне 2-3 других вопроса по конспекту, а затем внезапно снова попроси перевести то самое первоначальное предложение, чтобы проверить, не забыл ли я правильный вариант. Если я дал правильный ответ - больше не повторяем.\nПорционность: Не вываливай весь конспект. Напомнил одно правило/слово -> отработали на 3-4 предложениях -> перешли к следующему.\nНе говори за меня: Если я просто молчу или застрял, дай короткую подсказку (назови первое слово), но не выдавай ответ целиком, пока я не скажу: «Скажи ответ» или «Πες μου την απάντηση».\n\nГибкость к запросам: Ты всегда прислушиваешься к моим просьбам. Если в процессе урока я прошу изменить формат, объяснить, пропустить тему или делать что-то по-новому — ты должен сразу согласиться и подстроиться без лишних вопросов. \nСпецифика ГОЛОСОВОГО режима:\n- Ультра-краткость: Твои реплики должны состоять максимум из 1-2 предложений.\n- Один шаг за один раз: Никогда не задавай два вопроса подряд. Задал вопрос на перевод — замолчи и жди моего ответа.\n- Никакого форматирования в твоих ответах: Не генерируй списки, тире, скобки. Твоя речь должна быть абсолютно естественной для восприятия на слух.\n- Бесшовность: Никаких мета-фраз вроде «Идем дальше?», «Давай продолжим».\n\n\n\nВАЖНО: твой ученик говорит по русски. Формулируй задания, фразы, объяснения на русском языке. \nВАЖНО: активно используй слова из \"Итоговая таблица лексики урока\" при построении предложений.\nВАЖНО: когда ученик закрепит отдельные фразы - переходи к общению по ролям. Проведи с учеником диалог и проверь как он импровизирует с использованием выученных слов и фраз. Используй предложенные диалоги как каркас для отрбаотки.\nВАЖНО: не подсказывай перевод перед заданием.";
    const ESSENCE_MD = "# 💎 Урок 0 — суть: алфавит и первое чтение (стр. 8–13)\n\n**[🏠 Readme](../../../Readme.md) → [📘 book/pages](../) → [📚 content_0.md](content_0.md) → 📄 `essence_0.md`**\n\n*Конспект для повторения и практики («Ελληνικά Α'», введение **εισαγωγή**). Тема: **Από το Α στο Ω** — буквы, названия букв, чтение по примерам стран и слов.*\n\n| ⚡ Быстрые ссылки        |                              |\n|-------------------------|------------------------------|\n| 📚 Страницы со сканами | [content_0.md](content_0.md) |\n| 🖼 Диапазон            | стр. 8–13                    |\n\n## 📌 Тема и цели\n\n- Выучить **24 буквы** (названия: **άλφα, βήτα, … ωμέγα**) и буквосочетание **ου** [u].\n- Научиться **читать** слова по образцам (страны, города, международная лексика).\n- Различать **греческие и латинские** буквы; писать **строчные и прописные**.\n- Закрепить звуки **/i/** и **/o/**; вставлять **ου** в названия стран.\n\n## 1) Алфавит: буква — название — звук — примеры\n\nНиже — опора по таблице учебника (стр. 9). **Проговаривайте** название буквы и читайте примеры вслух.\n\n| Буква   | Название | Звук (ориентир) | Страна | Город |\n|---------|----------|-----------------|--------|-------|\n| Α α     | άλφα     | [a]             | Αλβανία | Αβάνα |\n| Β β     | βήτα     | [v]             | Βολιβία | Βερολίνο |\n| Γ γ     | γάμα     | [γ]             | Γαλλία | Γρανάδα |\n| Δ δ     | δέλτα    | [ð]             | Δανία | Δαμασκός |\n| Ε ε     | έψιλον   | [e]             | Ελλάδα | Ελσίνκι |\n| Ζ ζ     | ζήτα     | [z]             | Ζαΐρ | Ζυρίχη |\n| Η η     | ήτα      | [i]             | ΗΠΑ | Αθήνα |\n| Θ θ     | θήτα     | [θ]             | Θιβέτ | Θεσσαλονίκη |\n| Ι ι     | γιώτα    | [i]             | Ιράν | Παρίσι |\n| Κ κ     | κάπα     | [k]             | Καναδάς | Καράκας |\n| Λ λ     | λάμδα    | [l]             | Λίβανος | Λονδίνο |\n| Μ μ     | μι       | [m]             | Μαρόκο | Μαδρίτη |\n| Ν ν     | νι       | [n]             | Νότια Αφρική | Νέα Ορλεάνη |\n| Ξ ξ     | ξι       | [ks]            | Μεξικό | Ξάνθη |\n| Ο ο     | όμικρον  | [o]             | Ολλανδία | Όσλο |\n| Π π     | πι       | [p]             | Πακιστάν | Πεκίνο |\n| Ρ ρ     | ρο       | [r]             | Ρωσία | Ρίγα |\n| Σ σ / ς | σίγμα    | [s]             | Σερβία | Σόφια |\n| Τ τ     | ταυ      | [t]             | Τουρκία | Τίρανα |\n| Υ υ     | ύψιλον   | [i]             | Υεμένη | Νέα Υόρκη |\n| Φ φ     | φι       | [f]             | Φιλιππίνες | Φρανκφούρτη |\n| Χ χ     | χι       | [χ]             | Χιλή | Χαρτούμ |\n| Ψ ψ     | ψι       | [ps]            | — | Ουψάλα |\n| Ω ω     | ωμέγα    | [o]             | Πολωνία | Ρώμη |\n\n**Ου ου** — [u]: **Ουκρανία**, **Βουκουρέστι**.\n\n*В конце слова пишется **ς** (сигма на конце), внутри слова — **σ**.*\n\n### Практика: Греция от Α до Ω (стр. 10)\n\nСопоставьте **первую букву** города с алфавитом; прочитайте список вслух:\n\n| Буква | Город (начинается с …) |\n|-------|-------------------------|\n| Α | Αθήνα |\n| Β | Βόλος |\n| Γ | Γιάννενα |\n| Δ | Δράμα |\n| Ε | Έδεσσα |\n| Ζ | Ζάκυνθος |\n| Η | Ηράκλειο |\n| Θ | Θεσσαλονίκη |\n| Ι | Ιεράπετρα |\n| Κ | Καβάλα |\n| Λ | Λάρισα |\n| Μ | Μυτιλήνη |\n| Ν | Νάξος |\n| Ξ | Ξάνθη |\n| Ο | Ολυμπία |\n| Π | Πάτρα |\n| Ρ | Ρόδος |\n| Σ | Σπάρτη |\n| Τ | Τρίπολη |\n| Υ | Ύδρα |\n| Φ | Φλώρινα |\n| Χ | Χανιά |\n| Ψ | Ψαρά |\n| Ω | Ωρωπός |\n\n## 2) Лексика для письма и чтения (стр. 11–12)\n\n### Слова из учебника (прописные → строчные)\n\nПерепишите в **строчные** и проговорите: **αεροπλάνο, φωτογραφία, δημοκρατία, φιλοσοφία, ιστορία, γεωγραφία, πολιτική, μαθηματικά, φυσική, πρόγραμμα, γραμματική, βιολογία, αστρολογία, γυμναστική, τραγωδία, βιογραφία, ξενοφοβία, αλλεργία, βάση, καταστροφή, μουσική, τεχνολογία, ψυχολογία, ωκεανός, τηλέφωνο, θέατρο, διάλογος, ρυθμός**.\n\n**Реплики из рисунков (для чтения):**\n\n- **Η γραμματική είναι καταστροφή!**\n- **Έχω αλλεργία στην ξενοφοβία!**\n\n### Заимствования для транскрипции (стр. 12)\n\nПрочитайте и при необходимости перепишите: **σοκολάτα, κάμερα, φιλμ, νερό, ραδιόφωνο, τρένο, ταβέρνα, ρακέτα, ούζο, ιστορία, σουβλάκι, ψυχολογία, φιλοσοφία, σπορ, Αττική**.\n\n## 3) Звуки /i/ и /o/ — что обводить в кружок (стр. 12)\n\n**Звук /i/** пишут буквы и сочетания: **ι, η, υ, ει, οι** (в словах учебника: **τηλέφωνο, καλημέρα, αστυνομία, πυραμίδα, βιβλίο, ταξί, σπίτι**).\n\n**Звук /o/** — буквы **ο, ω** (примеры: **φωτογραφία, σοκολάτα, τηλέφωνο, ώρα, ομελέτα, ψωμί**).\n\n**Практика:** в каждом слове найдите все графемы с /i/ или /o/ и проговорите слово дважды.\n\n## 4) Буквосочетание **ου** в названиях стран (стр. 12)\n\nЗаполните по образцу и прочитайте вслух: **Βουλγαρία, Τουρκία, Ουκρανία, Περού, Παραγουάη, Ουρουγουάη, Ονδούρα, Γουατεμάλα, Σουδάν, Καμερούν, Κούβα, Λιθουανία, Λουξεμβούργο, Ρουμανία**.\n\n## 5) Транспорт: слова для чтения карт (стр. 13)\n\n**Существительные:** **γραμμή** (линия маршрута), **σταθμός**, **αεροδρόμιο**, **τραμ**, **προαστιακός** (пригородная электричка).\n\n**Станции (пример):** **Πειραιάς, Κηφισία, Σύνταγμα, Μοναστηράκι, Ακρόπολη, Αιγάλεω, Γλυφάδα** — тренировка: найти на схеме и прочитать подряд пять названий.\n\n**Практика:** перепишите названия станций с карты из **ПРОПИСНЫХ** в обычное написание, как в примере **Πανεπιστήμιο** (стр. 13).\n\n## 6) Готовые фразы\n\n- **Από το Α στο Ω** — от А до Ω (обо всём понемногу).\n- **εισαγωγή** — введение.\n";

    document.getElementById("prompt-block").textContent = VOICE_PROMPT;
    if (typeof marked !== "undefined") {
      document.getElementById("essence-render").innerHTML = marked.parse(ESSENCE_MD);
    } else {
      document.getElementById("essence-render").innerHTML = "<pre>" + ESSENCE_MD.replace(/</g, "&lt;") + "</pre>";
    }

    document.getElementById("copy-all").addEventListener("click", async () => {
      const text = VOICE_PROMPT + "\n\n---\n\n" + ESSENCE_MD;
      try {
        await navigator.clipboard.writeText(text);
        const el = document.getElementById("copy-feedback");
        el.textContent = "Скопировано.";
        setTimeout(() => { el.textContent = ""; }, 2500);
      } catch (e) {
        alert("Не удалось скопировать: " + e);
      }
    });
  </script>
