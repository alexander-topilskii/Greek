  <script>
    const VOICE_PROMPT = "Ρόλος:\n\nΕίσαι ένας αυστηρός, λακωνικός και ενεργητικός καθηγητής ελληνικών για ηχητική εξάσκηση (Voice Mode). Ο μαθητής σου είναι ρωσόφωνος. Ο στόχος σου είναι να με βοηθήσεις να μάθω και να εμπεδώσω το υλικό από τις επισυναπτόμενες σημειώσεις (αρχείο essence — κονσπέκτο του μαθήματος). Πρέπει να υποθέσεις ότι δεν βλέπω τις σημειώσεις και δεν τις ξέρω απ' έξω. Το έργο σου είναι να μου υποενθυμίζεις τμηματικά λέξεις, κανόνες και έτοιμες φράσεις και να τα εξασκούμε αμέσως μέσω διαλόγου.\n\nΠρόσθετη προτεραιότητα — διάλογοι:\n\nΟι πλήρεις διάλογοι στις σημειώσεις (γραμμές με ονόματα, σκηνές) είναι για την επόμενη φάση. Πρώτα εξασκούμε ξεχωριστά τις φράσεις, τα μοτίβα και τις κατασκευές του μαθήματος (3–4 μικρά βήματα ανά θέμα). Μόνο όταν τα κατακτήσω σε απλές προτάσεις και μεταφράσεις, περνάμε σε σύντομο διάλογο: εσύ λες μία γραμμή από το κείμενο των σημειώσεων και περιμένεις τη δική μου — όχι ανάγνωση ολόκληρου του διαλόγου σε μία ροή χωρίς παύση.\n\nΚανόνες διδασκαλίας (ΚΡΙΣΙΜΑ):\n\nΑπό το απλό στο σύνθετο: Εστίασε σε ολόκληρες προτάσεις. Διάλεξε μία κατασκευή από τις σημειώσεις — π.χ. ένα ρήμα σε συγκεκριμένο χρόνο, ένα ερώτημα από πίνακα ερωτήσεων, ένα μοτίβο με άρθρο και προθέσεις —, θύμισέ το πολύ σύντομα και ζήτα μετάφραση απλής πρότασης από τα ρωσικά στα ελληνικά (ή το αντίστροφο, αν ταιριάζει στο μάθημα). Όταν απαντήσω σωστά — δώσε λίγο πιο δύσκολη πρόταση με την ίδια κατασκευή.\n\nΣύντομο feedback: Επιδοκιμασία επιτρέπεται, αλλά αυστηρά 1–2 λέξεις («Μπράβο», «Πολύ καλά»). Σωστή απάντηση — σύντομη επιβεβαίωση («Ναι» / «Σωστά») και αμέσως επόμενη άσκηση.\n\nΣκληρή διόρθωση λαθών: Αν έκανα λάθος, η ροή είναι σταθερή:\n\nΠες «Όχι» ή «Λάθος» και πες το σωστό.\n\nΑμέσως «Επανάλαβε».\n\nΠερίμενε να το πω σωστά.\n\nΑμέσως μετά δώσε νέα, παρόμοια πρόταση για τον ίδιο κανόνα, για ενίσχυση.\n\nΚαθυστερημένη επανάληψη: Θυμήσου την πρόταση όπου έσφαλα. Κάνε 2–3 άλλες ερωτήσεις από τις σημειώσεις και μετά ξαφνικά ξανά την ίδια αρχική πρόταση.\n\nΔόση: Μην ξεχύνεις όλο το υλικό των σημειώσεων. Ένας κανόνας ή μία λέξη — 3–4 προτάσεις — μετά επόμενο θέμα.\n\nΜη μιλάς για λογαριασμό μου: Αν σωπαίνω ή κολλάω, δώσε κοντή υπόδειξη (πρώτη λέξη), όχι ολόκληρη την απάντηση, εκτός αν πω ρητά «Πες μου την απάντηση» / «Скажи ответ».\n\nΕυελιξία: Αν ζητήσω να αλλάξει μορφή, να παραλείψω θέμα ή να κάνουμε αλλιώς — συμφώνησε αμέσως και προσαρμόσου.\n\nΕιδικά για ΦΩΝΗ:\n\nΥπερ-συντομία: Μέχρι 1–2 προτάσεις ανά ρεπλίκα σου.\n\nΈνα βήμα τη φορά: Ποτέ δύο ερωτήσεις στη σειρά. Έκανες ερώτηση — σώπασε και περίμενε.\n\nΧωρίς μορφοποίηση στη φωνή: Όχι λίστες, παύλες, αγκύλες στην ομιλία σου — φυσική προφορική γλώσσα.\n\nΧωρίς μετα-φράσεις τύπου «Πάμε παρακάτω;» — συνέχισε αθόρυβα στο επόμενο βήμα.\n\n---\n\nΣυνημμένο: σημειώσεις μαθήματος (essence_N.md) — ακολούθα αυστηρά το περιεχόμενό τους για λεξιλόγιο, γραμματική και διάλογους.";
    const ESSENCE_MD = "# 💎 Урок 3 — суть: «Τι δουλειά κάνεις;» — семья, кто это, профессии (стр. 38–47)\n\n**[🏠 Readme](../../../Readme.md) → [📘 book/pages](../) → [📚 content_3.md](content_3.md) → 📄 `essence_3.md`**\n\n*Третья единица **«Ελληνικά Α'»** («**Τι δουλειά κάνεις;**»). Материал **самодостаточен** для повторения: правила, фразы, эталоны, словарь. **Порядок:** цели → грамматика → фразы и диалоги → эталоны → словарь.*\n\n| ⚡ Быстрые ссылки       |                                                                                                                       |\n|------------------------|-----------------------------------------------------------------------------------------------------------------------|\n| 📚 Страницы со сканами | [content_3.md](content_3.md)                                                                                          |\n| 🖼 Диапазон            | стр. 38–47                                                                                                            |\n| 📘 Рядом по курсу      | [essence_2](../lesson_2/essence_2.md) · [essence_4](../lesson_4/essence_4.md) · [обзор 1–4](../lesson_5/essence_5.md) |\n\n## 📌 Тема и цели\n\n- **Η οικογένειά μου** — моя семья; **Ποιος / Ποια / Ποιο** — кто это? (м / ж / ср.)\n- **Τον λένε / Τη λένε / Το λένε** — как зовут …; **Πώς τον/την/το λένε;**\n- **Τι δουλειά κάνεις;** — кем ты работаешь? **Είμαι …** (профессия в именительном).\n- **Δουλεύω … / Σπουδάζω …** — работаю / учусь (в вузе); **μένω με …**, семейный статус.\n\n### Сводка целей (стр. 38)\n\n| Цель |\n|------|\n| Η οικογένειά μου |\n| Τον λένε / τη λένε / το λένε |\n| Ποιος είναι αυτός; · Ποια είναι αυτή; · Ποιο είναι αυτό; |\n| Τι δουλειά κάνεις; |\n\n## 🧠 Грамматика и правила\n\n### Вопросы **ποιος / ποια / ποιο**\n\n| Вопрос | Типичный ответ |\n|--------|----------------|\n| **Ποιος είναι αυτός;** | **Ο …** (отец, Γιώργος …) |\n| **Ποια είναι αυτή;** | **Η …** |\n| **Ποιο είναι αυτό;** / **Ποιο είναι αυτό το παιδί;** | **Το …** · **Το παιδί μου.** |\n\n### Имя: **Πώς … λένε;** — **Τον/Την/Το λένε …**\n\n| Вопрос | Ответ |\n|--------|--------|\n| **Πώς τον λένε;** | **Τον λένε …** |\n| **Πώς τη λένε;** | **Τη λένε …** |\n| **Πώς το λένε στα ελληνικά;** | **Το λένε …** *(например **τηλέφωνο**)* |\n\n*В имени после **λένε** — форма, как в обращении (**Γιάννη**, **Μαρία** …).*\n\n### Профессия: **Τι δουλειά κάνεις;** — **Είμαι + существительное (ном.)**\n\n**Τι δουλειά κάνεις; / Τι δουλειά κάνετε;** — **Είμαι γιατρός.** **Είμαι ηλεκτρολόγος.** **Είμαι δασκάλα.**\n\n**Πού δουλεύεις;** — **Δουλεύω στο/στη/στον …** · **δουλεύω στο σχολείο**, **στην τράπεζα**.\n\n**Τι δουλειά κάνουν;** — **Η … είναι γιατρός.** **Ο … είναι δάσκαλος.**\n\n### Глаголы **δουλεύω** и **σπουδάζω** (настоящее, тип Α)\n\n| лицо | δουλεύω | σπουδάζω |\n|------|---------|----------|\n| εγώ | δουλεύω | σπουδάζω |\n| εσύ | δουλεύεις | σπουδάζεις |\n| αυτός/ή/ό | δουλεύει | σπουδάζει |\n| εμείς | δουλεύουμε | σπουδάζουμε |\n| εσείς | δουλεύετε | σπουδάζετε |\n| αυτοί/ές/ά | δουλεύουν | σπουδάζουν |\n\n*Примеры:* **Δουλεύω στην Ελλάδα.** **Σπουδάζω Ιστορία στην Αθήνα.**\n\n### Семейный статус (прилагательные)\n\n| муж. | жен. | смысл |\n|------|------|--------|\n| παντρεμένος | παντρεμένη | женат / замужем |\n| ελεύθερος | ελεύθερη | свободен / свободна |\n| χωρισμένος | χωρισμένη | в разводе |\n| δεσμευμένος | δεσμευμένη | в паре; разг. **έχω σχέση** |\n\n**Вопросы:** **Είσαι παντρεμένος; / Είσαι παντρεμένη;** — **Όχι, δεν είμαι. Είμαι ελεύθερος.**\n\n### Род профессий (ориентир)\n\n- Пары **♂ / ♀:** **καθηγητής / καθηγήτρια**, **φοιτητής / φοιτήτρια**, **εργάτης / εργάτρια**, **πωλητής / πωλήτρια**, **σερβιτόρος / σερβιτόρα**, **νοσοκόμος / νοσοκόμα**, **δάσκαλος / δασκάλα**, **μάγειρας / μαγείρισσα**, **άνεργος / άνεργη**.\n- **Общий род (форма одна):** **δικηγόρος**, **ηλεκτρολόγος**, **οδηγός**, **μηχανικός**, **γιατρός**, **υπάλληλος**, **ηθοποιός**, **ταμίας**, **αρχιτέκτονας**, **γραμματέας** …\n\n*Полный визуальный список — в разделе **«Словарь»** ниже.*\n\n## 💬 Готовые фразы и диалоги\n\n### «Πώς το λένε;» — кто это (стр. 40)\n\n| Ερώτηση | Απάντηση |\n|---------|----------|\n| Ποιος είναι αυτός; | Ο Γιώργος. / Ο Γιάννης. / Ο Κώστας. |\n| Ποια είναι αυτή; | Η Ελένη. / Η Άννα. |\n| Ποιο είναι αυτό το παιδί; | Το παιδί μου. |\n| Πώς τον λένε; | Τον λένε Γιώργο. / Γιάννη. / Κώστα. |\n| Πώς τη λένε; | Τη λένε Ελένη. / Άννα. |\n\n### Диалог **A21** — в кафенείο (стр. 39)\n\n**Παναγιώτης:** Καλησπέρα, Λι. Τι είναι αυτό; Φωτογραφία;  \n**Λι:** Ναι, από την Κίνα. Η οικογένειά μου.  \n**Παναγιώτης:** Ααα! Ποιος είναι αυτός;  \n**Λι:** Ο πατέρας μου. Τον λένε Χουάνγκ.  \n**Παναγιώτης:** Αυτή ποια είναι; Η μητέρα σου;  \n**Λι:** Ναι.  \n**Παναγιώτης:** Πώς τη λένε;  \n**Λι:** Τη λένε Γκονγκ. Και εδώ είναι ο αδερφός μου, ο Τσου.  \n**Παναγιώτης:** Είναι παντρεμένος;  \n**Λι:** Ναι. Αυτή είναι η γυναίκα του, η Λιέν, και αυτός ο γιος τους, ο Ξιάο.  \n**Παναγιώτης:** Πολύ ωραία!\n\n### Цепочки «Η σειρά μου τώρα» (стр. 39–42)\n\n- **Είσαι παντρεμένη; / παντρεμένος;**\n- **Πώς λένε τον άντρα σου; / τη γυναίκα σου;**\n- **Έχεις παιδιά;**\n- **Δουλεύεις;** · **Τι δουλειά κάνεις;**\n\n### Диалог **A22** — у класса (стр. 42)\n\n**Βόιτσεκ:** Καλησπέρα. Είμαστε μαζί στην τάξη;  \n**Ελένη:** Ναι. Τάξη Α΄. Είμαι η Ελένη.  \n**Βόιτσεκ:** Χαίρω πολύ. Βόιτσεκ.  \n**Ελένη:** Τι κάνεις στην Ελλάδα, Βόιτσεκ;  \n**Βόιτσεκ:** Δουλεύω.  \n**Ελένη:** Τι δουλειά κάνεις;  \n**Βόιτσεκ:** Είμαι ηλεκτρολόγος. Εσύ δουλεύεις;  \n**Ελένη:** Ναι, είμαι γιατρός. Είσαι παντρεμένος;  \n**Βόιτσεκ:** Όχι, αλλά μένω με τη φίλη μου. Εσύ είσαι παντρεμένη;  \n**Ελένη:** Ναι, ο άντρας μου είναι από την Ελλάδα.\n\n### «Πώς το λένε;» — работа (стр. 42)\n\n- **Δουλεύω στην Ελλάδα.**\n- **Τι δουλειά κάνεις;** — **Είμαι γιατρός.** **Είμαι ηλεκτρολόγος.**\n- **Είσαι παντρεμένος;** — **Μένω με τη φίλη μου.**\n\n### Знакомство в дороге (образец по смыслу стр. 46)\n\n— **Χαίρετε! Από πού είστε;**  \n— **Από τη Θεσσαλονίκη. Εσείς;**  \n— **Από την Αθήνα. Πού μένετε τώρα;**  \n— **Μένω στο Παγκράτι.**  \n— **Τι κάνετε; Σπουδάζετε;**  \n— **Ναι, σπουδάζω Ιστορία στην Αθήνα.**\n\n*(Персонажи **Θανάσης** / **Βασιλική** на стр. 46: стоматолог из Афин, женат, Колонаки; студентка, Салоники, история, свободна, Панграти — можно составить свой диалог по этим опорам.)*\n\n### Модель: **Τη λένε … Είναι … και δουλεύει …**\n\n**Пример (стр. 44):** **Τη λένε Αννέτ. Είναι σερβιτόρα και δουλεύει στο καφέ «Θησείο».**\n\n## 📖 Эталоны для самопроверки\n\n*Готовые формы для сверки.*\n\n### Тексты **Α, Β, Γ** (стр. 40)\n\n**Α.** Η Λιέν είναι παντρεμένη. Ο Τσου είναι ο **άντρας** της. Έχουν ένα **παιδί**.\n\n**Β.** Τον λένε Τσου. Είναι **παντρεμένος**. Η Λιέν είναι η **γυναίκα** του. Ο Ξιάο είναι ο **γιος** του.\n\n**Γ.** Τον λένε Ξιάο. Είναι από την Κίνα. Η Λιέν είναι η **μητέρα** του και ο Τσου ο **πατέρας** του. Ο Χουάνγκ είναι ο **παππούς** του και η Γκονγκ είναι η **γιαγιά** του.\n\n### «Σωστό ή λάθος» по **A21** (стр. 39)\n\n| № | Ответ |\n|---|--------|\n| 1 | Σωστό |\n| 2 | Λάθος *(ο Παναγιώτης δεν είναι ο άντρας της Λι)* |\n| 3 | Λάθος *(ο Χουάνγκ — πατέρας)* |\n| 4 | Σωστό |\n| 5 | Σωστό |\n\n### Упражнение 6 (стр. 42) — ключ\n\nΟ Βόιτσεκ **δουλεύει** στην Ελλάδα. Είναι **ηλεκτρολόγος**.\n\nΔεν είναι παντρεμένος. Μένει με **τη φίλη του**.\n\nΗ Ελένη είναι παντρεμένη. Ο **άντρας** της είναι από την Ελλάδα. Η Ελένη είναι **γιατρός** και δουλεύει στην Ελλάδα.\n\n### Упражнение 8 (стр. 43) — ключ\n\n| № | Ответ |\n|---|--------|\n| 2 | **οδηγός** |\n| 3 | **φοιτήτρια** |\n| 4 | **μάγειρας** |\n| 5 | **υπάλληλος** |\n| 6 | **ταμίας** |\n\n### Упражнение 9 — образцы предложений (стр. 44)\n\n1. *(дано)* **Τη λένε Αννέτ. Είναι σερβιτόρα και δουλεύει στο καφέ «Θησείο».**\n\n2. **Τον λένε Κώστα. Είναι γιατρός και δουλεύει στο νοσοκομείο «Ιπποκράτης».**\n\n3. **Τη λένε Αλεξάνδρα. Είναι κομμώτρια και δουλεύει στο κομμωτήριο «Κούκλος».**\n\n4. **Τον λένε Μοχάμετ. Είναι μηχανικός και δουλεύει στο συνεργείο «moto».**\n\n5. **Τον λένε Σπύρο. Είναι γραμματέας και δουλεύει σε γραφείο.**\n\n6. **Τη λένε Δέσποινα. Είναι ταμίας και δουλεύει στην τράπεζα.**\n\n### «Τι λείπει;» (стр. 45, 1.1) — типовые вопросы\n\n| № | Дополни вопрос |\n|---|----------------|\n| 2 | **Από πού είσαι;** |\n| 4 | **Είσαι παντρεμένος;** |\n| 6 | **Τι δουλειά κάνεις;** |\n| 7 | **Έχεις παιδιά;** |\n\n*(Для пунктов с ответом без вопроса в задании — ориентир: **Πού μένεις;** — … · **Πού δουλεύεις;** — …)*\n\n### Семейное дерево (стр. 41) — ключ\n\n**Ο Χαράλαμπος είναι ο αδερφός του.** *(дано)*\n\n2. **Η Νάντια είναι η μητέρα του.**  \n3. **Ο Αντρέας είναι ο πατέρας του.**  \n4. **Η Αγγελική είναι η γυναίκα του.**  \n5. **Ο Κώστας είναι ο γιος του.**  \n6. **Η Ελένη είναι η κόρη του.**  \n7. **Η Μαρία είναι η γιαγιά του.**  \n8. **Ο Φίλιππος είναι ο παππούς του.**\n\n## 📇 Словарь урока\n\n### Семья и люди\n\n| ελληνικά | по-русски |\n|----------|-----------|\n| η οικογένεια | семья |\n| η φωτογραφία | фотография |\n| ο πατέρας / ο μπαμπάς | отец / папа |\n| η μητέρα / η μαμά | мать / мама |\n| οι γονείς | родители |\n| ο αδερφός / η αδερφή / τα αδέρφια | брат / сестра / братья и сёстры |\n| ο άντρας / η γυναίκα | муж / жена |\n| ο γιος / η κόρη | сын / дочь |\n| το παιδί / τα παιδιά | ребёнок / дети |\n| το αγόρι / το κορίτσι | мальчик / девочка |\n| ο παππούς / η γιαγιά | дедушка / бабушка |\n| το καφενείο | кафенейо |\n| η δουλειά | работа; профессия |\n\n### Быт, места, учёба\n\n| ελληνικά | по-русски |\n|----------|-----------|\n| το σχολείο | школа |\n| το γραφείο | офис |\n| το νοσοκομείο | больница |\n| η τράπεζα | банк |\n| το κομμωτήριο | парикмахерская |\n| το συνεργείο | мастерская, автосервис |\n| το καφέ | кафе |\n| η τάξη | класс |\n| η φίλη | подруга |\n| το πάρτι | вечеринка |\n| το αεροπλάνο | самолёт |\n\n### Профессии — пары ♂ / ♀\n\n| ♂ | ♀ | по-русски |\n|---|---|-----------|\n| καθηγητής | καθηγήτρια | преподаватель / преподавательница |\n| κομμωτής | κομμώτρια | парикмахер / парикмахерка |\n| φοιτητής | φοιτήτρια | студент / студентка |\n| εργάτης | εργάτρια | рабочий / рабочая |\n| πωλητής | πωλήτρια | продавец / продавщица |\n| αθλητής | αθλήτρια | спортсмен / спортсменка |\n| σερβιτόρος | σερβιτόρα | официант / официантка |\n| νοσοκόμος | νοσοκόμα | медбрат / медсестра |\n| δάσκαλος | δασκάλα | учитель / учительница (нач. школа) |\n| άνεργος | άνεργη | безработный / безработная |\n| μάγειρας | μαγείρισσα | повар / повариха |\n\n### Профессии — общая форма (частые)\n\nδικηγόρος, ηλεκτρολόγος, οδηγός, μηχανικός, γιατρός, οδοντίατρος, υπάλληλος, ηθοποιός, ταμίας, αρχιτέκτονας, γραμματέας, φωτογράφος, δημοσιογράφος, ζωγράφος, τραγουδίστρια …\n\n### Прилагательные и наречие\n\n| ελληνικά | по-русски |\n|----------|-----------|\n| παντρεμένος / -η | женат / замужем |\n| ελεύθερος / -η | свободный; холостой / незамужняя |\n| χωρισμένος / -η | разведённый / разведённая |\n| δεσμευμένος / -η | в отношениях |\n| ωραίος / -ά | красивый; хороший |\n| μαζί | вместе |\n\n### Глаголы (опорный список)\n\nείμαι, λέω, λένε, κάνω, έχω, ρωτάω, δουλεύω, μένω, ταξιδεύω, σπουδάζω, μαγειρεύω, ξέρω, γράφω.\n";

    document.getElementById("prompt-block").textContent = VOICE_PROMPT;
    if (typeof marked !== "undefined") {
      document.getElementById("essence-render").innerHTML = marked.parse(ESSENCE_MD);
    } else {
      document.getElementById("essence-render").innerHTML = "<pre>" + ESSENCE_MD.replace(/</g, "&lt;") + "</pre>";
    }

    document.getElementById("copy-all").addEventListener("click", async () => {
      const text = VOICE_PROMPT + "\n\n---\n\n" + ESSENCE_MD;
      try {
        await navigator.clipboard.writeText(text);
        const el = document.getElementById("copy-feedback");
        el.textContent = "Скопировано.";
        setTimeout(() => { el.textContent = ""; }, 2500);
      } catch (e) {
        alert("Не удалось скопировать: " + e);
      }
    });
  </script>
