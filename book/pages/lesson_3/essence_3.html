  <script>
    const VOICE_PROMPT = "Ρόλος:\nΕίσαι ένας αυστηρός, λακωνικός και ενεργητικός καθηγητής ελληνικών για ηχητική εξάσκηση (Voice Mode). Ο μαθητής σου είναι ρωσόφωνος. Ο στόχος σου είναι να με βοηθήσεις να μάθω και να εμπεδώσω το υλικό από τις επισυναπτόμενες σημειώσεις. Πρέπει να υποθέσεις ότι δεν βλέπω τις σημειώσεις και δεν τις ξέρω απ' έξω. Το έργο σου είναι να μου υπενθυμίζεις τμηματικά λέξεις/κανόνες και να τους εξασκούμε αμέσως μέσω διαλόγου.\n\nПравила обучения (КРИТИЧЕСКИ ВАЖНО):\n\nОт простого к сложному: Фокусируйся на целых предложениях. Выбери конструкцию из конспекта (например, глагол έχω), коротко напомни перевод и попроси перевести простое предложение (например, У меня есть машина). Справился — дай предложение сложнее.\nКраткая обратная связь: Похвала допускается, но строго 1-2 слова (например, «Μπράβο», «Πολύ καλά»). Ответил верно — коротко подтверди («Ναι» / «Σωστά») или похвали, повтори правильную фразу, и сразу дай следующее задание.\nЖесткая отработка ошибок: Если я ошибся, алгоритм строго такой:\nСкажи «Όχι» (Нет) или «Λάθος» (Ошибка) и произнеси правильный вариант.\nСразу скажи «Επανάλαβε» (Повтори).\nДождись, пока я произнесу правильно.\nСразу после этого дай мне новое, похожее предложение на это же правило для закрепления.\nОтложенное повторение: Запомни предложение, в котором я допустил ошибку. Задай мне 2-3 других вопроса по конспекту, а затем внезапно снова попроси перевести то самое первоначальное предложение, чтобы проверить, не забыл ли я правильный вариант. Если я дал правильный ответ - больше не повторяем.\nПорционность: Не вываливай весь конспект. Напомнил одно правило/слово -> отработали на 3-4 предложениях -> перешли к следующему.\nНе говори за меня: Если я просто молчу или застрял, дай короткую подсказку (назови первое слово), но не выдавай ответ целиком, пока я не скажу: «Скажи ответ» или «Πες μου την απάντηση».\n\nГибкость к запросам: Ты всегда прислушиваешься к моим просьбам. Если в процессе урока я прошу изменить формат, объяснить, пропустить тему или делать что-то по-новому — ты должен сразу согласиться и подстроиться без лишних вопросов. \nСпецифика ГОЛОСОВОГО режима:\n- Ультра-краткость: Твои реплики должны состоять максимум из 1-2 предложений.\n- Один шаг за один раз: Никогда не задавай два вопроса подряд. Задал вопрос на перевод — замолчи и жди моего ответа.\n- Никакого форматирования в твоих ответах: Не генерируй списки, тире, скобки. Твоя речь должна быть абсолютно естественной для восприятия на слух.\n- Бесшовность: Никаких мета-фраз вроде «Идем дальше?», «Давай продолжим».\n\n\n\nВАЖНО: твой ученик говорит по русски. Формулируй задания, фразы, объяснения на русском языке. \nВАЖНО: активно используй слова из \"Итоговая таблица лексики урока\" при построении предложений.\nВАЖНО: когда ученик закрепит отдельные фразы - переходи к общению по ролям. Проведи с учеником диалог и проверь как он импровизирует с использованием выученных слов и фраз. Используй предложенные диалоги как каркас для отрбаотки.";
    const ESSENCE_MD = "# 💎 Урок 3 — суть: «Τι δουλειά κάνεις;» — семья, кто это, профессии (стр. 38–47)\n\n**[🏠 Readme](../../../Readme.md) → [📘 book/pages](../) → [📚 content_3.md](content_3.md) → 📄 `essence_3.md`**\n\n*Третья единица **«Ελληνικά Α'»** («**Τι δουλειά κάνεις;**»). Материал **самодостаточен** для повторения: правила,\nфразы, эталоны, словарь. **Порядок:** цели → грамматика → фразы и диалоги → эталоны → словарь.*\n\n| ⚡ Быстрые ссылки       |                                                                                                                       |\n|------------------------|-----------------------------------------------------------------------------------------------------------------------|\n| 📚 Страницы со сканами | [content_3.md](content_3.md)                                                                                          |\n| 🖼 Диапазон            | стр. 38–47                                                                                                            |\n| 📘 Рядом по курсу      | [essence_2](../lesson_2/essence_2.md) · [essence_4](../lesson_4/essence_4.md) · [обзор 1–4](../lesson_5/essence_5.md) |\n\n## 📌 Тема и цели\n\n### После повторения я могу (проверяемые цели)\n\n- Спросить и ответить «кто это» (**ποιος/ποια/ποιο είναι …**).\n- Спросить и сказать, как зовут (**πώς τον/την/το λένε;**, **τον λένε …**).\n- Спросить и назвать профессию (**τι δουλειά κάνεις;**, **είμαι …**, **δουλεύω …**, **σπουδάζω …**).\n- Описать семью и статус (**η οικογένειά μου**, **παντρεμένος** …).\n\n### Содержание темы\n\n- **Η οικογένειά μου** — моя семья; **Ποιος / Ποια / Ποιο** — кто это? (м / ж / ср.)\n- **Τον λένε / Τη λένε / Το λένε** — как зовут …; **Πώς τον/την/το λένε;**\n- **Τι δουλειά κάνεις;** — кем ты работаешь? **Είμαι …** (профессия в именительном).\n- **Δουλεύω … / Σπουδάζω …** — работаю / учусь (в вузе); **μένω με …**, семейный статус.\n\n### Сводка целей (стр. 38)\n\n| Цель                                                     |\n|----------------------------------------------------------|\n| Η οικογένειά μου                                         |\n| Τον λένε / τη λένε / το λένε                             |\n| Ποιος είναι αυτός; · Ποια είναι αυτή; · Ποιο είναι αυτό; |\n| Τι δουλειά κάνεις;                                       |\n\n## 🧠 Грамматика и правила\n\n### Вопросы **ποιος / ποια / ποιο**\n\n| Вопрос                                               | Типичный ответ               |\n|------------------------------------------------------|------------------------------|\n| **Ποιος είναι αυτός;**                               | **Ο …** (отец, Γιώργος …)    |\n| **Ποια είναι αυτή;**                                 | **Η …**                      |\n| **Ποιο είναι αυτό;** / **Ποιο είναι αυτό το παιδί;** | **Το …** · **Το παιδί μου.** |\n\n### Имя: **Πώς … λένε;** — **Τον/Την/Το λένε …**\n\n| Вопрос                        | Ответ                                   |\n|-------------------------------|-----------------------------------------|\n| **Πώς τον λένε;**             | **Τον λένε …**                          |\n| **Πώς τη λένε;**              | **Τη λένε …**                           |\n| **Πώς το λένε στα ελληνικά;** | **Το λένε …** *(например **τηλέφωνο**)* |\n\n*В имени после **λένε** — форма, как в обращении (**Γιάννη**, **Μαρία** …).*\n\n### Профессия: **Τι δουλειά κάνεις;** — **Είμαι + существительное (ном.)**\n\n**Τι δουλειά κάνεις; / Τι δουλειά κάνετε;** — **Είμαι γιατρός.** **Είμαι ηλεκτρολόγος.** **Είμαι δασκάλα.**\n\n**Πού δουλεύεις;** — **Δουλεύω στο/στη/στον …** · **δουλεύω στο σχολείο**, **στην τράπεζα**.\n\n**Τι δουλειά κάνουν;** — **Η … είναι γιατρός.** **Ο … είναι δάσκαλος.**\n\n### Глаголы **δουλεύω** и **σπουδάζω** (настоящее, тип Α)\n\n| лицо       | δουλεύω    | σπουδάζω    |\n|------------|------------|-------------|\n| εγώ        | δουλεύω    | σπουδάζω    |\n| εσύ        | δουλεύεις  | σπουδάζεις  |\n| αυτός/ή/ό  | δουλεύει   | σπουδάζει   |\n| εμείς      | δουλεύουμε | σπουδάζουμε |\n| εσείς      | δουλεύετε  | σπουδάζετε  |\n| αυτοί/ές/ά | δουλεύουν  | σπουδάζουν  |\n\n*Примеры:* **Δουλεύω στην Ελλάδα.** **Σπουδάζω Ιστορία στην Αθήνα.**\n\n### Семейный статус (прилагательные)\n\n| муж.        | жен.       | смысл                       |\n|-------------|------------|-----------------------------|\n| παντρεμένος | παντρεμένη | женат / замужем             |\n| ελεύθερος   | ελεύθερη   | свободен / свободна         |\n| χωρισμένος  | χωρισμένη  | в разводе                   |\n| δεσμευμένος | δεσμευμένη | в паре; разг. **έχω σχέση** |\n\n**Вопросы:** **Είσαι παντρεμένος; / Είσαι παντρεμένη;** — **Όχι, δεν είμαι. Είμαι ελεύθερος.**\n\n### Род профессий (ориентир)\n\n- Пары **♂ / ♀:** **καθηγητής / καθηγήτρια**, **φοιτητής / φοιτήτρια**, **εργάτης / εργάτρια**, **πωλητής / πωλήτρια**,\n  **σερβιτόρος / σερβιτόρα**, **νοσοκόμος / νοσοκόμα**, **δάσκαλος / δασκάλα**, **μάγειρας / μαγείρισσα**, **άνεργος /\n  άνεργη**.\n- **Общий род (форма одна):** **δικηγόρος**, **ηλεκτρολόγος**, **οδηγός**, **μηχανικός**, **γιατρός**, **υπάλληλος**, *\n  *ηθοποιός**, **ταμίας**, **αρχιτέκτονας**, **γραμματέας** …\n\n*Полный визуальный список — в разделе **«Словарь»** ниже.*\n\n## 💬 Готовые фразы и диалоги\n\n### «Πώς το λένε;» — кто это (стр. 40)\n\n| Ερώτηση                   | Απάντηση                            |\n|---------------------------|-------------------------------------|\n| Ποιος είναι αυτός;        | Ο Γιώργος. / Ο Γιάννης. / Ο Κώστας. |\n| Ποια είναι αυτή;          | Η Ελένη. / Η Άννα.                  |\n| Ποιο είναι αυτό το παιδί; | Το παιδί μου.                       |\n| Πώς τον λένε;             | Τον λένε Γιώργο. / Γιάννη. / Κώστα. |\n| Πώς τη λένε;              | Τη λένε Ελένη. / Άννα.              |\n\n### Диалог **A21** — в кафенείο (стр. 39)\n\n**Παναγιώτης:** Καλησπέρα, Λι. Τι είναι αυτό; Φωτογραφία;  \n**Λι:** Ναι, από την Κίνα. Η οικογένειά μου.  \n**Παναγιώτης:** Ααα! Ποιος είναι αυτός;  \n**Λι:** Ο πατέρας μου. Τον λένε Χουάνγκ.  \n**Παναγιώτης:** Αυτή ποια είναι; Η μητέρα σου;  \n**Λι:** Ναι.  \n**Παναγιώτης:** Πώς τη λένε;  \n**Λι:** Τη λένε Γκονγκ. Και εδώ είναι ο αδερφός μου, ο Τσου.  \n**Παναγιώτης:** Είναι παντρεμένος;  \n**Λι:** Ναι. Αυτή είναι η γυναίκα του, η Λιέν, και αυτός ο γιος τους, ο Ξιάο.  \n**Παναγιώτης:** Πολύ ωραία!\n\n### Цепочки «Η σειρά μου τώρα» (стр. 39–42)\n\n- **Είσαι παντρεμένη; / παντρεμένος;**\n- **Πώς λένε τον άντρα σου; / τη γυναίκα σου;**\n- **Έχεις παιδιά;**\n- **Δουλεύεις;** · **Τι δουλειά κάνεις;**\n\n### Диалог **A22** — у класса (стр. 42)\n\n**Βόιτσεκ:** Καλησπέρα. Είμαστε μαζί στην τάξη;  \n**Ελένη:** Ναι. Τάξη Α΄. Είμαι η Ελένη.  \n**Βόιτσεκ:** Χαίρω πολύ. Βόιτσεκ.  \n**Ελένη:** Τι κάνεις στην Ελλάδα, Βόιτσεκ;  \n**Βόιτσεκ:** Δουλεύω.  \n**Ελένη:** Τι δουλειά κάνεις;  \n**Βόιτσεκ:** Είμαι ηλεκτρολόγος. Εσύ δουλεύεις;  \n**Ελένη:** Ναι, είμαι γιατρός. Είσαι παντρεμένος;  \n**Βόιτσεκ:** Όχι, αλλά μένω με τη φίλη μου. Εσύ είσαι παντρεμένη;  \n**Ελένη:** Ναι, ο άντρας μου είναι από την Ελλάδα.\n\n### «Πώς το λένε;» — работа (стр. 42)\n\n- **Δουλεύω στην Ελλάδα.**\n- **Τι δουλειά κάνεις;** — **Είμαι γιατρός.** **Είμαι ηλεκτρολόγος.**\n- **Είσαι παντρεμένος;** — **Μένω με τη φίλη μου.**\n\n### Знакомство в дороге (образец по смыслу стр. 46)\n\n— **Χαίρετε! Από πού είστε;**  \n— **Από τη Θεσσαλονίκη. Εσείς;**  \n— **Από την Αθήνα. Πού μένετε τώρα;**  \n— **Μένω στο Παγκράτι.**  \n— **Τι κάνετε; Σπουδάζετε;**  \n— **Ναι, σπουδάζω Ιστορία στην Αθήνα.**\n\n*(Персонажи **Θανάσης** / **Βασιλική** на стр. 46: стоматолог из Афин, женат, Колонаки; студентка, Салоники, история,\nсвободна, Панграти — можно составить свой диалог по этим опорам.)*\n\n### Модель: **Τη λένε … Είναι … και δουλεύει …**\n\n**Пример (стр. 44):** **Τη λένε Αννέτ. Είναι σερβιτόρα και δουλεύει στο καφέ «Θησείο».**\n\n## 📖 Эталоны для самопроверки\n\n*Готовые формы для сверки.*\n\n### Тексты **Α, Β, Γ** (стр. 40)\n\n**Α.** Η Λιέν είναι παντρεμένη. Ο Τσου είναι ο **άντρας** της. Έχουν ένα **παιδί**.\n\n**Β.** Τον λένε Τσου. Είναι **παντρεμένος**. Η Λιέν είναι η **γυναίκα** του. Ο Ξιάο είναι ο **γιος** του.\n\n**Γ.** Τον λένε Ξιάο. Είναι από την Κίνα. Η Λιέν είναι η **μητέρα** του και ο Τσου ο **πατέρας** του. Ο Χουάνγκ είναι ο\n**παππούς** του και η Γκονγκ είναι η **γιαγιά** του.\n\n### «Σωστό ή λάθος» по **A21** (стр. 39)\n\n| № | Ответ                                            |\n|---|--------------------------------------------------|\n| 1 | Σωστό                                            |\n| 2 | Λάθος *(ο Παναγιώτης δεν είναι ο άντρας της Λι)* |\n| 3 | Λάθος *(ο Χουάνγκ — πατέρας)*                    |\n| 4 | Σωστό                                            |\n| 5 | Σωστό                                            |\n\n### Упражнение 6 (стр. 42) — ключ\n\nΟ Βόιτσεκ **δουλεύει** στην Ελλάδα. Είναι **ηλεκτρολόγος**.\n\nΔεν είναι παντρεμένος. Μένει με **τη φίλη του**.\n\nΗ Ελένη είναι παντρεμένη. Ο **άντρας** της είναι από την Ελλάδα. Η Ελένη είναι **γιατρός** και δουλεύει στην Ελλάδα.\n\n### Упражнение 8 (стр. 43) — ключ\n\n| № | Ответ         |\n|---|---------------|\n| 2 | **οδηγός**    |\n| 3 | **φοιτήτρια** |\n| 4 | **μάγειρας**  |\n| 5 | **υπάλληλος** |\n| 6 | **ταμίας**    |\n\n### Упражнение 9 — образцы предложений (стр. 44)\n\n1. *(дано)* **Τη λένε Αννέτ. Είναι σερβιτόρα και δουλεύει στο καφέ «Θησείο».**\n\n2. **Τον λένε Κώστα. Είναι γιατρός και δουλεύει στο νοσοκομείο «Ιπποκράτης».**\n\n3. **Τη λένε Αλεξάνδρα. Είναι κομμώτρια και δουλεύει στο κομμωτήριο «Κούκλος».**\n\n4. **Τον λένε Μοχάμετ. Είναι μηχανικός και δουλεύει στο συνεργείο «moto».**\n\n5. **Τον λένε Σπύρο. Είναι γραμματέας και δουλεύει σε γραφείο.**\n\n6. **Τη λένε Δέσποινα. Είναι ταμίας και δουλεύει στην τράπεζα.**\n\n### «Τι λείπει;» (стр. 45, 1.1) — типовые вопросы\n\n| № | Дополни вопрос         |\n|---|------------------------|\n| 2 | **Από πού είσαι;**     |\n| 4 | **Είσαι παντρεμένος;** |\n| 6 | **Τι δουλειά κάνεις;** |\n| 7 | **Έχεις παιδιά;**      |\n\n*(Для пунктов с ответом без вопроса в задании — ориентир: **Πού μένεις;** — … · **Πού δουλεύεις;** — …)*\n\n### Семейное дерево (стр. 41) — ключ\n\n**Ο Χαράλαμπος είναι ο αδερφός του.** *(дано)*\n\n2. **Η Νάντια είναι η μητέρα του.**\n3. **Ο Αντρέας είναι ο πατέρας του.**\n4. **Η Αγγελική είναι η γυναίκα του.**\n5. **Ο Κώστας είναι ο γιος του.**\n6. **Η Ελένη είναι η κόρη του.**\n7. **Η Μαρία είναι η γιαγιά του.**\n8. **Ο Φίλιππος είναι ο παππούς του.**\n\n## 📇 Словарь урока\n\n### Семья и люди\n\n| ελληνικά                          | по-русски                       |\n|-----------------------------------|---------------------------------|\n| η οικογένεια                      | семья                           |\n| η φωτογραφία                      | фотография                      |\n| ο πατέρας / ο μπαμπάς             | отец / папа                     |\n| η μητέρα / η μαμά                 | мать / мама                     |\n| οι γονείς                         | родители                        |\n| ο αδερφός / η αδερφή / τα αδέρφια | брат / сестра / братья и сёстры |\n| ο άντρας / η γυναίκα              | муж / жена                      |\n| ο γιος / η κόρη                   | сын / дочь                      |\n| το παιδί / τα παιδιά              | ребёнок / дети                  |\n| το αγόρι / το κορίτσι             | мальчик / девочка               |\n| ο παππούς / η γιαγιά              | дедушка / бабушка               |\n| το καφενείο                       | кафенейо                        |\n| η δουλειά                         | работа; профессия               |\n\n### Быт, места, учёба\n\n| ελληνικά      | по-русски              |\n|---------------|------------------------|\n| το σχολείο    | школа                  |\n| το γραφείο    | офис                   |\n| το νοσοκομείο | больница               |\n| η τράπεζα     | банк                   |\n| το κομμωτήριο | парикмахерская         |\n| το συνεργείο  | мастерская, автосервис |\n| το καφέ       | блица лексики урока (стр. 38–47)\n\n*Алфавитный перечень (`casefold`) уникальных слов и устойчивых выражений материала единицы, **включая заголовки заданий**.*\n\n| ελληνικά | по-русски |\n|----------|-----------|\n| 1 Σωστό ή λάθος; | 1 верно или неверно? |\n| 1.1 Τι λείπει; | 1.1 чего не хватает? |\n| 1.2 τ ή θ; — A24 | 1.2 τ или θ? — A24 |\n| 1.3 δ ή ντ; — A25 | 1.3 δ или ντ? — A25 |\n| 1.4 σ ή ζ; — A26 | 1.4 σ или ζ? — A26 |\n| 1.5 Ο Θανάσης και η Βασιλική είναι στο αεροπλάνο. Γράφω τον διάλογο. | 1.5 Танасис и Василики в самолёте. Пишу диалог. |\n| 16 Τι δουλειά κάνουν; | 16 кем они работают? |\n| 2 Ρωτάω κάποιον: | 2 спрашиваю кого-то: |\n| 3 Διαλέγω: | 3 выбираю: |\n| 4 Ποιος είναι αυτός; Ποια είναι αυτή; Πώς τον λένε; Πώς τη λένε; | 4 кто это? как зовут? (стр. 41) |\n| 5 Τώρα γράφω για τον Γιάννη και την οικογένειά του, όπως στο παράδειγμα. | 5 пишу о Яннисе и семье… |\n| 6 Συμπληρώνω: | 6 дополняю: |\n| 7 Απαντάω: | 7 отвечаю: |\n| 8 Διαλέγω τη σωστή λέξη, όπως στο παράδειγμα. | 8 выбираю правильное слово… |\n| 9 Λέω τι ξέρω για τα πρόσωπα. | 9 говорю, что знаю о людях |\n| A21 — στο καφενείο | A21 — в кафенейо |\n| A22 — έξω από την τάξη | A22 — вне класса |\n| άνεργος / άνεργη | безработный / безработная |\n| έχω | имею |\n| έχω σχέση | в отношениях (разг.) |\n| Ααα! | ааа! |\n| Αγγελική | Ангелики |\n| Αθήνα | Афины |\n| αθλητής / αθλήτρια | спортсмен / спортсменка |\n| Αλέξανδρος | Александр |\n| Αλεξάνδρα | Александра |\n| Αννέτ | Аннет |\n| Αντρέας | Андреас |\n| Αντώνης | Андонис |\n| αρχιτέκτονας | архитектор |\n| Αυτή είναι η οικογένειά μου | это моя семья (заголовок стр. 39) |\n| Βασιλική | Василики |\n| Βόιτσεκ | Войцех |\n| Γαλλία | Франция |\n| Γιάννης Χατζής | Яннис Хадзис |\n| Για δες | ну-ка посмотри (стр. 40) |\n| γιατρός | врач |\n| Γιώργος / Γιάννης / Κώστας | Йоргис / Яннис / Костас |\n| Γκονγκ | Гун (кит. фамилия) |\n| γράφω | пишу |\n| Γράψε-σβήσε | пиши-стирай |\n| γραμματέας | секретарь |\n| Γραπτές ασκήσεις | письменные упражнения |
