  <script>
    const VOICE_PROMPT = "Ρόλος:\n\nΕίσαι ένας αυστηρός, λακωνικός και ενεργητικός καθηγητής ελληνικών για ηχητική εξάσκηση (Voice Mode). Ο μαθητής σου είναι ρωσόφωνος. Ο στόχος σου είναι να με βοηθήσεις να μάθω και να εμπεδώσω το υλικό από τις επισυναπτόμενες σημειώσεις (αρχείο essence — κονσπέκτο του μαθήματος). Πρέπει να υποθέσεις ότι δεν βλέπω τις σημειώσεις και δεν τις ξέρω απ' έξω. Το έργο σου είναι να μου υποενθυμίζεις τμηματικά λέξεις, κανόνες και έτοιμες φράσεις και να τα εξασκούμε αμέσως μέσω διαλόγου.\n\nΠρόσθετη προτεραιότητα — διάλογοι:\n\nΟι πλήρεις διάλογοι στις σημειώσεις (γραμμές με ονόματα, σκηνές) είναι για την επόμενη φάση. Πρώτα εξασκούμε ξεχωριστά τις φράσεις, τα μοτίβα και τις κατασκευές του μαθήματος (3–4 μικρά βήματα ανά θέμα). Μόνο όταν τα κατακτήσω σε απλές προτάσεις και μεταφράσεις, περνάμε σε σύντομο διάλογο: εσύ λες μία γραμμή από το κείμενο των σημειώσεων και περιμένεις τη δική μου — όχι ανάγνωση ολόκληρου του διαλόγου σε μία ροή χωρίς παύση.\n\nΚανόνες διδασκαλίας (ΚΡΙΣΙΜΑ):\n\nΑπό το απλό στο σύνθετο: Εστίασε σε ολόκληρες προτάσεις. Διάλεξε μία κατασκευή από τις σημειώσεις — π.χ. ένα ρήμα σε συγκεκριμένο χρόνο, ένα ερώτημα από πίνακα ερωτήσεων, ένα μοτίβο με άρθρο και προθέσεις —, θύμισέ το πολύ σύντομα και ζήτα μετάφραση απλής πρότασης από τα ρωσικά στα ελληνικά (ή το αντίστροφο, αν ταιριάζει στο μάθημα). Όταν απαντήσω σωστά — δώσε λίγο πιο δύσκολη πρόταση με την ίδια κατασκευή.\n\nΣύντομο feedback: Επιδοκιμασία επιτρέπεται, αλλά αυστηρά 1–2 λέξεις («Μπράβο», «Πολύ καλά»). Σωστή απάντηση — σύντομη επιβεβαίωση («Ναι» / «Σωστά») και αμέσως επόμενη άσκηση.\n\nΣκληρή διόρθωση λαθών: Αν έκανα λάθος, η ροή είναι σταθερή:\n\nΠες «Όχι» ή «Λάθος» και πες το σωστό.\n\nΑμέσως «Επανάλαβε».\n\nΠερίμενε να το πω σωστά.\n\nΑμέσως μετά δώσε νέα, παρόμοια πρόταση για τον ίδιο κανόνα, για ενίσχυση.\n\nΚαθυστερημένη επανάληψη: Θυμήσου την πρόταση όπου έσφαλα. Κάνε 2–3 άλλες ερωτήσεις από τις σημειώσεις και μετά ξαφνικά ξανά την ίδια αρχική πρόταση.\n\nΔόση: Μην ξεχύνεις όλο το υλικό των σημειώσεων. Ένας κανόνας ή μία λέξη — 3–4 προτάσεις — μετά επόμενο θέμα.\n\nΜη μιλάς για λογαριασμό μου: Αν σωπαίνω ή κολλάω, δώσε κοντή υπόδειξη (πρώτη λέξη), όχι ολόκληρη την απάντηση, εκτός αν πω ρητά «Πες μου την απάντηση» / «Скажи ответ».\n\nΕυελιξία: Αν ζητήσω να αλλάξει μορφή, να παραλείψω θέμα ή να κάνουμε αλλιώς — συμφώνησε αμέσως και προσαρμόσου.\n\nΕιδικά για ΦΩΝΗ:\n\nΥπερ-συντομία: Μέχρι 1–2 προτάσεις ανά ρεπλίκα σου.\n\nΈνα βήμα τη φορά: Ποτέ δύο ερωτήσεις στη σειρά. Έκανες ερώτηση — σώπασε και περίμενε.\n\nΧωρίς μορφοποίηση στη φωνή: Όχι λίστες, παύλες, αγκύλες στην ομιλία σου — φυσική προφορική γλώσσα.\n\nΧωρίς μετα-φράσεις τύπου «Πάμε παρακάτω;» — συνέχισε αθόρυβα στο επόμενο βήμα.\n\n---\n\nΣυνημμένο: σημειώσεις μαθήματος (essence_N.md) — ακολούθα αυστηρά το περιεχόμενό τους για λεξιλόγιο, γραμματική και διάλογους.";
    const ESSENCE_MD = "# 💎 Урок 9 — суть: «Πάμε για ψώνια;» — магазин, мнение, прилагательные (стр. 108–121)\n\n**[🏠 Readme](../../../Readme.md) → [📘 book/pages](../) → [📚 content_9.md](content_9.md) → 📄 `essence_9.md`**\n\n*Девятая единица **«Ελληνικά Α'»** («**Πάμε για ψώνια;**»). Материал **самодостаточен** для повторения: правила, фразы, эталоны, словарь. **Порядок:** цели → грамматика → фразы и диалоги → эталоны → словарь.*\n\n| ⚡ Быстрые ссылки       |                                                                                                                       |\n|------------------------|-----------------------------------------------------------------------------------------------------------------------|\n| 📚 Страницы со сканами | [content_9.md](content_9.md)                                                                                          |\n| 🖼 Диапазон            | стр. 108–121                                                                                                          |\n| 📘 Рядом по курсу      | [essence_8](../lesson_8/essence_8.md) · [essence_10](../lesson_10/essence_10.md)                                    |\n\n## 📌 Тема и цели\n\n- В магазине: **Πόσο κοστίζει;**, цвет (**Τι χρώμα θέλετε;**), мнение (**Σου αρέσει;** / **Σ’ αρέσει;**).\n- Одежда: **σου πάει**, **δε μου κάνει**, **μου είναι στενό**, размер (**τι νούμερο φοράτε;**).\n- Оплата: **μετρητά ή με κάρτα;**, **ταυτότητα**, **απόδειξη**, **εγγύηση**.\n- **Косвенное дополнение** (**μου, σου, του, της …**); прилагательные **-ος -η -ο** (**ακριβός**, **καινούριος**); глаголы **μέσης/παθητικής** (**έρχομαι, χρειάζομαι, βρίσκομαι** …).\n\n### Сводка темы (стр. 108)\n\n| Слева | Справа |\n|-------|--------|\n| **Σ’ αρέσει;** | **Τι χρώμα θέλετε;** |\n| **Σου πάει!** | **ακριβός, ακριβή, ακριβό** |\n| **Δε μου κάνει.** | **καινούριος, καινούρια, καινούριο** |\n| **Πόσο κοστίζει;** | **έρχομαι, χρειάζομαι, βρίσκομαι** |\n\n## 🧠 Грамматика и правила\n\n### Косвенные местоимения (кому?)\n\n**μου, σου, του, της, μας, σας, τους** — стоят **перед** глаголом: **Μου δίνετε μια ταυτότητα;** **Σου αρέσει το κινητό;** **Τους αρέσει το χιπ χοπ.**\n\n### Прилагательные **-ος, -η, -ο** — **ακριβός**\n\nПолная таблица: [digitized/110.md](digitized/110.md). Опора: **ο ακριβός υπολογιστής**, **την ακριβή μηχανή**, **το ακριβό κινητό**; мн. ч. **ακριβοί / ακριβές / ακριβά**.\n\n### Прилагательные **-ος, -α, -ο** — **καινούριος**\n\n**καινούριος / καινούρια / καινούριο** — примеры со **υπολογιστής, μηχανή, κινητό** — [digitized/111.md](digitized/111.md).\n\n### Антонимы (опора)\n\nκαλός ≠ κακός · μεγάλος ≠ μικρός · όμορφος ≠ άσχημος · φτηνός ≠ ακριβός · ψηλός ≠ κοντός · χοντρός ≠ λεπτός\n\n### **αυτός / εκείνος**\n\n**Αυτός ο υπολογιστής** … **Εκείνος ο υπολογιστής** … — [digitized/111.md](digitized/111.md).\n\n### Тип Γ1 — **έρχομαι** (и рядом **βρίσκομαι**, **χρειάζομαι**)\n\n| | έρχομαι |\n|---|---------|\n| εγώ | έρχομαι |\n| εσύ | έρχεσαι |\n| αυτός/ή/ό | έρχεται |\n| εμείς | ερχόμαστε |\n| εσείς | έρχεστε / ερχόσαστε |\n| αυτοί/ές/ά | έρχονται |\n\n*Примеры:* **Έρχομαι αμέσως.** **Βρίσκομαι στα μαγαζιά.** **Χρειάζομαι καινούρια ρούχα.**\n\n### **αρέσει / αρέσουν**\n\n**Μου αρέσει** … (ед.) · **Μας αρέσουν** … (мн.) — [digitized/118.md](digitized/118.md).\n\n### **Σου πάει / μου κάνει** (одежда)\n\nЕд. ч.: **μου πάει** / **μου κάνει** · Мн. ч.: **μου πάνε** / **μου κάνουν**.\n\n### **Υπάρχει κανένας / καμία / κανένα;**\n\nВопросы о наличии товара — [digitized/118.md](digitized/118.md).\n\n### Цвета и род (стр. 116)\n\n**άσπρος σκούφος** / **άσπρη μπλούζα** / **άσπρο πουκάμισο** — многие названия цветов **одинаковы** для всех родов (**μπλε, καφέ, γκρι** …) — [digitized/116.md](digitized/116.md).\n\n## 💬 Готовые фразы и диалоги\n\n### Диалог **A54** — магазин электроники (стр. 109)\n\n**Υπάλληλος:** Παρακαλώ;\n\n**Πάμπλο:** Γεια σας. Θα ήθελα ένα κινητό.\n\n**Υπάλληλος:** Με σύνδεση ή με κάρτα;\n\n**Πάμπλο:** Ε, δεν είμαι σίγουρος. Νίκο, τι λες;\n\n**Νίκος:** Ξέρω ’γω; Καρτοκινητό, νομίζω.\n\n**Υπάλληλος:** Θέλετε μια συγκεκριμένη μάρκα;\n\n**Πάμπλο:** Δε με πειράζει.\n\n**Υπάλληλος:** Αυτό σας αρέσει; Είναι καινούριο μοντέλο, πολύ μοντέρνο, με φωτογραφική μηχανή…\n\n**Πάμπλο:** Ναι, ωραίο είναι. Και μικρό. Πόσο κοστίζει;\n\n**Υπάλληλος:** 175 ευρώ.\n\n**Πάμπλο:** Εντάξει, δεν είναι πολύ ακριβό. Εδώ πληρώνω;\n\n**Υπάλληλος:** Μάλιστα. Μετρητά;\n\n**Πάμπλο:** Όχι, με κάρτα. Ορίστε.\n\n**Υπάλληλος:** Μου δίνετε μια ταυτότητα;\n\n**Πάμπλο:** Έχω διαβατήριο.\n\n**Υπάλληλος:** Ωραία. Μια υπογραφή εδώ. Είστε έτοιμος. Με την απόδειξή σας έχετε έναν χρόνο εγγύηση.\n\n**Νίκος:** Πάμπλο, πάμε και στους υπολογιστές; Χρειάζομαι καινούριο κομπιούτερ και θέλω τη γνώμη σου…\n\n### «Πώς το λένε;» — A54 (стр. 109)\n\n**Δεν είμαι σίγουρος.** · **Τι λες;** · **Ξέρω ’γω;** · **Δε με πειράζει.** · **Πόσο κοστίζει;** · **Μετρητά ή με κάρτα;** · **Μου δίνετε μια ταυτότητα;** · **Θέλω τη γνώμη σου.**\n\n### Диалог **A55** — **κατάστημα ρούχων** (стр. 113)\n\n**Πωλητής:** Καλημέρα. Χρειάζεστε βοήθεια;\n\n**Φοίβος:** Ναι. Θα ήθελα ένα παντελόνι τζιν.\n\n**Πωλητής:** Βεβαίως. Τι νούμερο φοράτε;\n\n**Φοίβος:** Το 32, νομίζω.\n\n**Πωλητής:** Μάλιστα. Αυτό εδώ σας αρέσει; Είναι καταπληκτικό τζιν.\n\n**Φοίβος:** Πόσο έχει;\n\n**Πωλητής:** 85 ευρώ. 70 με την έκπτωση.\n\n**Φοίβος:** Μμμ, είναι ακριβό. Δεν έχετε άλλο, πιο φτηνό;\n\n**Πωλητής:** Αυτό εδώ. Είναι στα 50 ευρώ.\n\n**Φοίβος:** Ωραία, το δοκιμάζω και βλέπουμε.\n\n**Πωλητής:** Πώς είναι;\n\n**Φοίβος:** Εντάξει, μια χαρά. Μου κάνει. Τα πουκάμισα πού βρίσκονται;\n\n**Πωλητής:** Έρχεστε μαζί μου; Τι ακριβώς ψάχνετε;\n\n**Φοίβος:** Θέλω ένα απλό πουκάμισο σε άσπρο ή γαλάζιο χρώμα.\n\n**Πωλητής:** Τι λέτε για αυτό;\n\n**Φοίβος:** Ωραίο είναι.\n\n**Πωλητής:** Σας κάνει;\n\n**Φοίβος:** Ένα λεπτάκι. Μπα, μου είναι λίγο στενό.\n\n**Πωλητής:** Ναι, ναι, το βλέπω. Δοκιμάζετε αυτό εδώ; Υπάρχει σε γαλάζιο, πράσινο και μπεζ.\n\n**Φοίβος:** Το προτιμώ σε γαλάζιο… Ναι. Αυτό είναι το νούμερό μου.\n\n**Πωλητής:** Εντάξει. Θέλετε κάτι άλλο;\n\n**Φοίβος:** Όχι, αυτά.\n\n**Πωλητής:** Πληρώνετε στο ταμείο. Με γεια σας!\n\n**Φοίβος:** Ευχαριστώ.\n\n### Диалог **A56** — платье (стр. 115)\n\n**Πωλήτρια:** Καλησπέρα. Τι θα θέλατε;\n\n**Μαρίνα:** Ρίχνουμε μια ματιά στα φορέματα.\n\n**Πωλήτρια:** Σας αρέσει κανένα;\n\n**Μελέκ:** Ναι, εκείνο το μαύρο φόρεμα στη βιτρίνα. Το έχετε στο νούμερό μου;\n\n**Πωλήτρια:** Μάλλον αυτό είναι το νούμερό σας. Το δοκιμαστήριο είναι στο βάθος.\n\n*δύο λεπτά μετά*\n\n**Μελέκ:** Μαρίνα, πώς είναι;\n\n**Μαρίνα:** Τέλειο. Σου πάει πολύ!\n\n**Μελέκ:** Εντάξει, το παίρνω. Μ’ αρέσει. Η σειρά σου τώρα.\n\n**Μαρίνα:** Εγώ θέλω παπούτσια, αλλά αυτά που έχουν εδώ δε μου αρέσουν καθόλου.\n\n**Μελέκ:** Έχεις δίκιο. Και τα χρώματα είναι απαίσια. Πληρώνω και πάμε αλλού.\n\n### «Πώς το λένε;» — продавец / клиент (стр. 113–115)\n\n**Χρειάζεστε βοήθεια;** · **Τι νούμερο φοράτε;** · **Δοκιμάζετε αυτό εδώ;** · **Σας κάνει;** · **Με γεια σας!**\n\n**Είναι ακριβό / φτηνό.** · **Μου είναι στενό.** · **Μου κάνει.** · **Το προτιμώ σε γαλάζιο.**\n\n**Ρίχνω μια ματιά.** · **Σου πάει πολύ.** · **Έχεις δίκιο.**\n\n## 📖 Эталоны для самопроверки\n\n*Готовые формы для сверки — не полный ключ ко всем аудио (**A57, A58**) и творческим спискам.*\n\n### Упр. 1 — Σωστό ή λάθος по **A54** (стр. 109)\n\n| № | Ответ |\n|---|--------|\n| 1 | Σωστό |\n| 2 | Σωστό *(καρτοκινητό)* |\n| 3 | Λάθος *(ο Νίκος λέει «καρτοκινητό»)* |\n| 4 | Σωστό |\n| 5 | Λάθος *(η φωτογραφική μηχανή είναι στο κινητό, όχι ξεχωριστή αγορά)* |\n| 6 | Λάθος *(με κάρτα)* |\n| 7 | Σωστό |\n| 8 | Λάθος *(έχετε έναν χρόνο εγγύηση)* |\n| 9 | Σωστό |\n\n### Упр. 3 — местоимения (стр. 110)\n\n… **Του** τηλεφωνώ συχνά και **του** λέω τα νέα μου. Αυτός συνήθως **μου** στέλνει e-mail ή μηνύματα με το κινητό. **Της** αρέσουν τα γράμματα και **μου** γράφει συχνά. Κι εγώ **της** απαντάω με μια όμορφη κάρτα από την Ελλάδα. Δεν **τους** τηλεφωνώ συχνά … **Τους** στέλνω γράμματα και φωτογραφίες μου.\n\n### Упр. 6 — Σωστό ή λάθος по **A55** (стр. 113)\n\n| № | Ответ |\n|---|--------|\n| 1 | Σωστό |\n| 2 | Σωστό *(70 με την έκπτωση)* |\n| 3 | Λάθος *(νούμερο 32)* |\n| 4 | Σωστό |\n| 5 | Σωστό *(δοκιμάζει δεύτερο πουκάμισο)* |\n| 6 | Λάθος *(αγοράζει γαλάζιο πουκάμισο)* |\n\n### Упр. 8 — ключ (стр. 115)\n\nΗ Μελέκ θέλει ένα φόρεμα. Βλέπει ένα **μαύρο** φόρεμα στη **βιτρίνα**. Της **αρέσει** πολύ. Η Μαρίνα της λέει ότι το φόρεμα της **πάει** πολύ. Τα παπούτσια, όμως, δεν **της** **αρέσουν** **καθόλου**. Και τα χρώματά τους είναι **απαίσια**. Η Μελέκ **πληρώνει** το φόρεμα και **πάνε** αλλού για παπούτσια.\n\n### Упр. 7 — **έρχομαι / χρειάζομαι / βρίσκομαι** (стр. 114)\n\n2. **Χρειάζεστε** … **Χρειάζομαι** / **Χρειαζόμαστε** *(ανάλογα με το ποιος μιλάει)*  \n3. **βρίσκεται** … **Έρχομαι**  \n4. **σηκώνονται**  \n5. **Χρειάζεστε**  \n6. **Έρχεστε** … **Έρχομαι**\n\n### Связь «персона — подарок» (стр. 120)\n\n*(Παράδειγμα: Στέλιος — CD ροκ.)*\n\n| | Δώρο |\n|---|------|\n| **Λίλιαν** | μοντέρνα τσάντα *(5)* |\n| **Αντρέας** | αθλητικά παπούτσια *(2)* |\n| **Ινές** | DVD με ταινίες *(6)* |\n| **Σερχάτ** | βιβλίο ψυχολογίας *(7)* |\n| **Μάρθα** | τσάντα ταξιδιού *(8)* |\n\n## 📇 Словарь урока\n\n### Магазин и оплата\n\n| ελληνικά | по-русски |\n|----------|-----------|\n| το κατάστημα | магазин |\n| ο πωλητής / η πωλήτρια | продавец |\n| ο πελάτης | покупатель |\n| η βιτρίνα | витрина |\n| το δοκιμαστήριο | примерочная |\n| το νούμερο | размер |\n| η έκπτωση | скидка |\n| τα μετρητά | наличные |\n| η κάρτα | карта |\n| η ταυτότητα | удостоверение личности |\n| το διαβατήριο | паспорт |\n| η απόδειξη | чек |\n| η εγγύηση | гарантия |\n| η υπογραφή | подпись |\n\n### Одежда (опорно)\n\nπαντελόνι, τζιν, πουκάμισο, φόρεμα, μπλούζα, παπούτσια, φούστα, σακάκι …\n\n### Полезные выражения\n\n**Πόσο κοστίζει;** · **Πόσο έχει;** · **Θα ήθελα …** · **Χρειάζεστε βοήθεια;** · **Να ’σαι καλά.** · **Με γεια σας!**\n\n### Чеклист\n\n- [ ] **Πόσο κοστίζει** и **πόσο κάνει** (оба про цену)\n- [ ] **μου / σου / του** в просьбах и с **αρέσει**\n- [ ] **ακριβός / καινούριος** — согласование\n- [ ] **έρχομαι, χρειάζομαι, βρίσκομαι** — основные формы\n- [ ] **Σου πάει** / **μου κάνει**\n\n### Письменные задания (стр. 121)\n\n**2.3** — список подарков к **Πρωτοχρονιά**. **2.4** — что взять в поездку (**Σοφί** / **Ελένη**).\n";

    document.getElementById("prompt-block").textContent = VOICE_PROMPT;
    if (typeof marked !== "undefined") {
      document.getElementById("essence-render").innerHTML = marked.parse(ESSENCE_MD);
    } else {
      document.getElementById("essence-render").innerHTML = "<pre>" + ESSENCE_MD.replace(/</g, "&lt;") + "</pre>";
    }

    document.getElementById("copy-all").addEventListener("click", async () => {
      const text = VOICE_PROMPT + "\n\n---\n\n" + ESSENCE_MD;
      try {
        await navigator.clipboard.writeText(text);
        const el = document.getElementById("copy-feedback");
        el.textContent = "Скопировано.";
        setTimeout(() => { el.textContent = ""; }, 2500);
      } catch (e) {
        alert("Не удалось скопировать: " + e);
      }
    });
  </script>
