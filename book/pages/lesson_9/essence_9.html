  <script>
    const VOICE_PROMPT = "Ρόλος:\nΕίσαι ένας αυστηρός, λακωνικός και ενεργητικός καθηγητής ελληνικών για ηχητική εξάσκηση (Voice Mode). Ο μαθητής σου είναι ρωσόφωνος. Ο στόχος σου είναι να με βοηθήσεις να μάθω και να εμπεδώσω το υλικό από τις επισυναπτόμενες σημειώσεις. Πρέπει να υποθέσεις ότι δεν βλέπω τις σημειώσεις και δεν τις ξέρω απ' έξω. Το έργο σου είναι να μου υπενθυμίζεις τμηματικά λέξεις/κανόνες και να τους εξασκούμε αμέσως μέσω διαλόγου.\n\nПравила обучения (КРИТИЧЕСКИ ВАЖНО):\n\nОт простого к сложному: Фокусируйся на целых предложениях. Выбери конструкцию из конспекта (например, глагол έχω), попроси перевести простое предложение (например, У меня есть машина). Справился — дай предложение сложнее.\nКраткая обратная связь: Похвала допускается, но строго 1-2 слова (например, «Μπράβο», «Πολύ καλά»). Ответил верно — коротко подтверди («Ναι» / «Σωστά») или похвали, повтори правильную фразу, и сразу дай следующее задание.\nЖесткая отработка ошибок: Если я ошибся, алгоритм строго такой:\nСкажи «Όχι» (Нет) или «Λάθος» (Ошибка) и произнеси правильный вариант.\nСразу скажи «Επανάλαβε» (Повтори).\nДождись, пока я произнесу правильно.\nСразу после этого дай мне новое, похожее предложение на это же правило для закрепления.\nОтложенное повторение: Запомни предложение, в котором я допустил ошибку. Задай мне 2-3 других вопроса по конспекту, а затем внезапно снова попроси перевести то самое первоначальное предложение, чтобы проверить, не забыл ли я правильный вариант. Если я дал правильный ответ - больше не повторяем.\nПорционность: Не вываливай весь конспект. Напомнил одно правило/слово -> отработали на 3-4 предложениях -> перешли к следующему.\nНе говори за меня: Если я просто молчу или застрял, дай короткую подсказку (назови первое слово), но не выдавай ответ целиком, пока я не скажу: «Скажи ответ» или «Πες μου την απάντηση».\n\nГибкость к запросам: Ты всегда прислушиваешься к моим просьбам. Если в процессе урока я прошу изменить формат, объяснить, пропустить тему или делать что-то по-новому — ты должен сразу согласиться и подстроиться без лишних вопросов. \nСпецифика ГОЛОСОВОГО режима:\n- Ультра-краткость: Твои реплики должны состоять максимум из 1-2 предложений.\n- Один шаг за один раз: Никогда не задавай два вопроса подряд. Задал вопрос на перевод — замолчи и жди моего ответа.\n- Никакого форматирования в твоих ответах: Не генерируй списки, тире, скобки. Твоя речь должна быть абсолютно естественной для восприятия на слух.\n- Бесшовность: Никаких мета-фраз вроде «Идем дальше?», «Давай продолжим».\n\n\n\nВАЖНО: твой ученик говорит по русски. Формулируй задания, фразы, объяснения на русском языке. \nВАЖНО: активно используй слова из \"Итоговая таблица лексики урока\" при построении предложений.\nВАЖНО: когда ученик закрепит отдельные фразы - переходи к общению по ролям. Проведи с учеником диалог и проверь как он импровизирует с использованием выученных слов и фраз. Используй предложенные диалоги как каркас для отрбаотки.\nВАЖНО: не подсказывай перевод перед заданием.";
    const SOURCE_MD = "# 💎 Урок 9 — суть: «Πάμε για ψώνια;» — магазин, мнение, прилагательные (стр. 108–121)\n\n**[🏠 Readme](../../../../Readme.md) → [📘 book/pages](../../) → [📚 content_9.md](../content_9.md) → 📄 `essence_9/essence_9.md`**\n\n*Девятая единица **«Ελληνικά Α'»** («**Πάμε για ψώνια;**»). Материал **самодостаточен** для повторения: правила, фразы, эталоны, словарь. **Порядок:** цели → грамматика → фразы и диалоги → эталоны → словарь.*\n\n| ⚡ Быстрые ссылки       |                                                                                                                       |\n|------------------------|-----------------------------------------------------------------------------------------------------------------------|\n| 📚 Страницы со сканами | [content_9.md](../content_9.md)                                                                                          |\n| 🖼 Диапазон            | стр. 108–121                                                                                                          |\n| 📘 Рядом по курсу      | [essence_8](../../lesson_8/essence_8/essence_8.md) · [essence_10](../../lesson_10/essence_10/essence_10.md)                                    |\n\n## 📌 Тема и цели\n\n- В магазине: **Πόσο κοστίζει;**, цвет (**Τι χρώμα θέλετε;**), мнение (**Σου αρέσει;** / **Σ’ αρέσει;**).\n- Одежда: **σου πάει**, **δε μου κάνει**, **μου είναι στενό**, размер (**τι νούμερο φοράτε;**).\n- Оплата: **μετρητά ή με κάρτα;**, **ταυτότητα**, **απόδειξη**, **εγγύηση**.\n- **Косвенное дополнение** (**μου, σου, του, της …**); прилагательные **-ος -η -ο** (**ακριβός**, **καινούριος**); глаголы **μέσης/παθητικής** (**έρχομαι, χρειάζομαι, βρίσκομαι** …).\n\n*Ориентир перед практикой:* **Πόσο κοστίζει;** · **Πόσο έχει;** · **Μετρητά ή με κάρτα;** · **ταυτότητα / διαβατήριο / απόδειξη / εγγύηση** · **Σου αρέσει / μου αρέσει** · **Σου πάει / μου κάνει** · **τι νούμερο φοράτε** · **έρχομαι / χρειάζομαι / βρίσκομαι** · **ακριβός / καινούριος**.\n\n### Сводка темы (стр. 108)\n\n| Слева | Справа |\n|-------|--------|\n| **Σ’ αρέσει;** | **Τι χρώμα θέλετε;** |\n| **Σου πάει!** | **ακριβός, ακριβή, ακριβό** |\n| **Δε μου κάνει.** | **καινούριος, καινούρια, καινούριο** |\n| **Πόσο κοστίζει;** | **έρχομαι, χρειάζομαι, βρίσκομαι** |\n\n## 🧠 Грамматика и правила\n\n### Косвенные местоимения (кому?)\n\n**μου, σου, του, της, μας, σας, τους** — стоят **перед** глаголом: **Μου δίνετε μια ταυτότητα;** **Σου αρέσει το κινητό;** **Τους αρέσει το χιπ χοπ.**\n\n### Прилагательные **-ος, -η, -ο** — **ακριβός**\n\nПолная таблица: [digitized/110.md](../digitized/110.md). Опора: **ο ακριβός υπολογιστής**, **την ακριβή μηχανή**, **το ακριβό κινητό**; мн. ч. **ακριβοί / ακριβές / ακριβά**.\n\n### Прилагательные **-ος, -α, -ο** — **καινούριος**\n\n**καινούριος / καινούρια / καινούριο** — примеры со **υπολογιστής, μηχανή, κινητό** — [digitized/111.md](../digitized/111.md).\n\n### Антонимы (опора)\n\nκαλός ≠ κακός · μεγάλος ≠ μικρός · όμορφος ≠ άσχημος · φτηνός ≠ ακριβός · ψηλός ≠ κοντός · χοντρός ≠ λεπτός\n\n### **αυτός / εκείνος**\n\n**Αυτός ο υπολογιστής** … **Εκείνος ο υπολογιστής** … — [digitized/111.md](../digitized/111.md).\n\n### Тип Γ1 — **έρχομαι** (и рядом **βρίσκομαι**, **χρειάζομαι**)\n\n| | έρχομαι |\n|---|---------|\n| εγώ | έρχομαι |\n| εσύ | έρχεσαι |\n| αυτός/ή/ό | έρχεται |\n| εμείς | ερχόμαστε |\n| εσείς | έρχεστε / ερχόσαστε |\n| αυτοί/ές/ά | έρχονται |\n\n*Примеры:* **Έρχομαι αμέσως.** **Βρίσκομαι στα μαγαζιά.** **Χρειάζομαι καινούρια ρούχα.**\n\n### **αρέσει / αρέσουν**\n\n**Μου αρέσει** … (ед.) · **Μας αρέσουν** … (мн.) — [digitized/118.md](../digitized/118.md).\n\n### **Σου πάει / μου κάνει** (одежда)\n\nЕд. ч.: **μου πάει** / **μου κάνει** · Мн. ч.: **μου πάνε** / **μου κάνουν**.\n\n### **Υπάρχει κανένας / καμία / κανένα;**\n\nВопросы о наличии товара — [digitized/118.md](../digitized/118.md).\n\n### Цвета и род (стр. 116)\n\n**άσπρος σκούφος** / **άσπρη μπλούζα** / **άσπρο πουκάμισο** — многие названия цветов **одинаковы** для всех родов (**μπλε, καφέ, γκρι** …) — [digitized/116.md](../digitized/116.md).\n\n## 💬 Готовые фразы и диалоги\n\n### Диалог **A54** — магазин электроники (стр. 109)\n\n**Υπάλληλος:** Παρακαλώ;\n\n**Πάμπλο:** Γεια σας. Θα ήθελα ένα κινητό.\n\n**Υπάλληλος:** Με σύνδεση ή με κάρτα;\n\n**Πάμπλο:** Ε, δεν είμαι σίγουρος. Νίκο, τι λες;\n\n**Νίκος:** Ξέρω ’γω; Καρτοκινητό, νομίζω.\n\n**Υπάλληλος:** Θέλετε μια συγκεκριμένη μάρκα;\n\n**Πάμπλο:** Δε με πειράζει.\n\n**Υπάλληλος:** Αυτό σας αρέσει; Είναι καινούριο μοντέλο, πολύ μοντέρνο, με φωτογραφική μηχανή…\n\n**Πάμπλο:** Ναι, ωραίο είναι. Και μικρό. Πόσο κοστίζει;\n\n**Υπάλληλος:** 175 ευρώ.\n\n**Πάμπλο:** Εντάξει, δεν είναι πολύ ακριβό. Εδώ πληρώνω;\n\n**Υπάλληλος:** Μάλιστα. Μετρητά;\n\n**Πάμπλο:** Όχι, με κάρτα. Ορίστε.\n\n**Υπάλληλος:** Μου δίνετε μια ταυτότητα;\n\n**Πάμπλο:** Έχω διαβατήριο.\n\n**Υπάλληλος:** Ωραία. Μια υπογραφή εδώ. Είστε έτοιμος. Με την απόδειξή σας έχετε έναν χρόνο εγγύηση.\n\n**Νίκος:** Πάμπλο, πάμε και στους υπολογιστές; Χρειάζομαι καινούριο κομπιούτερ και θέλω τη γνώμη σου…\n\n### «Πώς το λένε;» — A54 (стр. 109)\n\n**Δεν είμαι σίγουρος.** · **Τι λες;** · **Ξέρω ’γω;** · **Δε με πειράζει.** · **Πόσο κοστίζει;** · **Μετρητά ή με κάρτα;** · **Μου δίνετε μια ταυτότητα;** · **Θέλω τη γνώμη σου.**\n\n### Диалог **A55** — **κατάστημα ρούχων** (стр. 113)\n\n**Πωλητής:** Καλημέρα. Χρειάζεστε βοήθεια;\n\n**Φοίβος:** Ναι. Θα ήθελα ένα παντελόνι τζιν.\n\n**Πωλητής:** Βεβαίως. Τι νούμερο φοράτε;\n\n**Φοίβος:** Το 32, νομίζω.\n\n**Πωλητής:** Μάλιστα. Αυτό εδώ σας αρέσει; Είναι καταπληκτικό τζιν.\n\n**Φοίβος:** Πόσο έχει;\n\n**Πωλητής:** 85 ευρώ. 70 με την έκπτωση.\n\n**Φοίβος:** Μμμ, είναι ακριβό. Δεν έχετε άλλο, πιο φτηνό;\n\n**Πωλητής:** Αυτό εδώ. Είναι στα 50 ευρώ.\n\n**Φοίβος:** Ωραία, το δοκιμάζω και βλέπουμε.\n\n**Πωλητής:** Πώς είναι;\n\n**Φοίβος:** Εντάξει, μια χαρά. Μου κάνει. Τα πουκάμισα πού βρίσκονται;\n\n**Πωλητής:** Έρχεστε μαζί μου; Τι ακριβώς ψάχνετε;\n\n**Φοίβος:** Θέλω ένα απλό πουκάμισο σε άσπρο ή γαλάζιο χρώμα.\n\n**Πωλητής:** Τι λέτε για αυτό;\n\n**Φοίβος:** Ωραίο είναι.\n\n**Πωλητής:** Σας κάνει;\n\n**Φοίβος:** Ένα λεπτάκι. Μπα, μου είναι λίγο στενό.\n\n**Πωλητής:** Ναι, ναι, το βλέπω. Δοκιμάζετε αυτό εδώ; Υπάρχει σε γαλάζιο, πράσινο και μπεζ.\n\n**Φοίβος:** Το προτιμώ σε γαλάζιο… Ναι. Αυτό είναι το νούμερό μου.\n\n**Πωλητής:** Εντάξει. Θέλετε κάτι άλλο;\n\n**Φοίβος:** Όχι, αυτά.\n\n**Πωλητής:** Πληρώνετε στο ταμείο. Με γεια σας!\n\n**Φοίβος:** Ευχαριστώ.\n\n### Диалог **A56** — платье (стр. 115)\n\n**Πωλήτρια:** Καλησπέρα. Τι θα θέλατε;\n\n**Μαρίνα:** Ρίχνουμε μια ματιά στα φορέματα.\n\n**Πωλήτρια:** Σας αρέσει κανένα;\n\n**Μελέκ:** Ναι, εκείνο το μαύρο φόρεμα στη βιτρίνα. Το έχετε στο νούμερό μου;\n\n**Πωλήτρια:** Μάλλον αυτό είναι το νούμερό σας. Το δοκιμαστήριο είναι στο βάθος.\n\n*δύο λεπτά μετά*\n\n**Μελέκ:** Μαρίνα, πώς είναι;\n\n**Μαρίνα:** Τέλειο. Σου πάει πολύ!\n\n**Μελέκ:** Εντάξει, το παίρνω. Μ’ αρέσει. Η σειρά σου τώρα.\n\n**Μαρίνα:** Εγώ θέλω παπούτσια, αλλά αυτά που έχουν εδώ δε μου αρέσουν καθόλου.\n\n**Μελέκ:** Έχεις δίκιο. Και τα χρώματα είναι απαίσια. Πληρώνω και πάμε αλλού.\n\n### «Πώς το λένε;» — продавец / клиент (стр. 113–115)\n\n**Χρειάζεστε βοήθεια;** · **Τι νούμερο φοράτε;** · **Δοκιμάζετε αυτό εδώ;** · **Σας κάνει;** · **Με γεια σας!**\n\n**Είναι ακριβό / φτηνό.** · **Μου είναι στενό.** · **Μου κάνει.** · **Το προτιμώ σε γαλάζιο.**\n\n**Ρίχνω μια ματιά.** · **Σου πάει πολύ.** · **Έχεις δίκιο.**\n\n## 📖 Эталоны для самопроверки\n\n*Готовые формы для сверки — не полный ключ ко всем аудио (**A57, A58**) и творческим спискам.*\n\n### Упр. 1 — Σωστό ή λάθος по **A54** (стр. 109)\n\n| № | Ответ |\n|---|--------|\n| 1 | Σωστό |\n| 2 | Σωστό *(καρτοκινητό)* |\n| 3 | Λάθος *(ο Νίκος λέει «καρτοκινητό»)* |\n| 4 | Σωστό |\n| 5 | Λάθος *(η φωτογραφική μηχανή είναι στο κινητό, όχι ξεχωριστή αγορά)* |\n| 6 | Λάθος *(με κάρτα)* |\n| 7 | Σωστό |\n| 8 | Λάθος *(έχετε έναν χρόνο εγγύηση)* |\n| 9 | Σωστό |\n\n### Упр. 3 — местоимения (стр. 110)\n\n… **Του** τηλεφωνώ συχνά και **του** λέω τα νέα μου. Αυτός συνήθως **μου** στέλνει e-mail ή μηνύματα με το κινητό. **Της** αρέσουν τα γράμματα και **μου** γράφει συχνά. Κι εγώ **της** απαντάω με μια όμορφη κάρτα από την Ελλάδα. Δεν **τους** τηλεφωνώ συχνά … **Τους** στέλνω γράμματα και φωτογραφίες μου.\n\n### Упр. 6 — Σωστό ή λάθος по **A55** (стр. 113)\n\n| № | Ответ |\n|---|--------|\n| 1 | Σωστό |\n| 2 | Σωστό *(70 με την έκπτωση)* |\n| 3 | Λάθος *(νούμερο 32)* |\n| 4 | Σωστό |\n| 5 | Σωστό *(δοκιμάζει δεύτερο πουκάμισο)* |\n| 6 | Λάθος *(αγοράζει γαλάζιο πουκάμισο)* |\n\n### Упр. 8 — ключ (стр. 115)\n\nΗ Μελέκ θέλει ένα φόρεμα. Βλέπει ένα **μαύρο** φόρεμα στη **βιτρίνα**. Της **αρέσει** πολύ. Η Μαρίνα της λέει ότι το φόρεμα της **πάει** πολύ. Τα παπούτσια, όμως, δεν **της** **αρέσουν** **καθόλου**. Και τα χρώματά τους είναι **απαίσια**. Η Μελέκ **πληρώνει** το φόρεμα και **πάνε** αλλού για παπούτσια.\n\n### Упр. 7 — **έρχομαι / χρειάζομαι / βρίσκομαι** (стр. 114)\n\n2. **Χρειάζεστε** … **Χρειάζομαι** / **Χρειαζόμαστε** *(ανάλογα με το ποιος μιλάει)*  \n3. **βρίσκεται** … **Έρχομαι**  \n4. **σηκώνονται**  \n5. **Χρειάζεστε**  \n6. **Έρχεστε** … **Έρχομαι**\n\n### Связь «персона — подарок» (стр. 120)\n\n*(Παράδειγμα: Στέλιος — CD ροκ.)*\n\n| | Δώρο |\n|---|------|\n| **Λίλιαν** | μοντέρνα τσάντα *(5)* |\n| **Αντρέας** | αθλητικά παπούτσια *(2)* |\n| **Ινές** | DVD με ταινίες *(6)* |\n| **Σερχάτ** | βιβλίο ψυχολογίας *(7)* |\n| **Μάρθα** | τσάντα ταξιδιού *(8)* |\n\n## 📇 Словарь урока\n\n### Магазин и оплата\n\n| ελληνικά | по-русски |\n|----------|-----------|\n| το κατάστημα · κατάστημα ρούχων | магазин · магазин одежды |\n| ο πωλητής / η πωλήτρια · ο υπάλληλος | продавец |\n| ο πελάτης | покупатель; клиент |\n| η βιτρίνα | витрина |\n| το δοκιμαστήριο · το ταμείο | примерочная · касса |\n| το νούμερο | размер |\n| η έκπτωση | скидка |\n| τα μετρητά · η κάρτα · με κάρτα | наличные · карта · картой |\n| η ταυτότητα · το διαβατήριο | удостоверение · паспорт |\n| η απόδειξη · η εγγύηση · η υπογραφή | чек · гарантия · подпись |\n\n### Одежда и мнение\n\n| ελληνικά | по-русски |\n|----------|-----------|\n| παντελόνι τζιν · πουκάμισο · φόρεμα · μπλούζα | джинсы · рубашка · платье · блузка |\n| παπούτσια · μπότες · σακάκι · πουλόβερ | обувь · сапоги · пиджак · свитер |\n| Σου πάει! · Μου κάνει. · μου είναι στενό | тебе идёт · мне подходит · мне узко |\n| Τι νούμερο φοράτε; · δοκιμάζω | какой размер носите? · примеряю |\n\n### Полезные связки\n\n**Πόσο κοστίζει;** · **Πόσο έχει;** · **Θα ήθελα …** · **Χρειάζεστε βοήθεια;** · **Μετρητά ή με κάρτα;** · **Μου δίνετε μια ταυτότητα;** · **Πληρώνετε στο ταμείο.** · **Με γεια σας!** — **подробнее в итоговой таблице** ниже.\n\n### Глаголы (опорный список)\n\n**αρέσει / αρέσουν**, **δοκιμάζω**, **κοστίζω**, **πληρώνω**, **ψωνίζω**, **έρχομαι**, **χρειάζομαι**, **βρίσκομαι**, **προτιμώ**, **ρίχνω μια ματιά** … — **формы и примеры** в **итоговой таблице** ниже.\n\n### Итоговая таблица лексики урока (стр. 108–121)\n\n*Алфавитный перечень (`casefold`) уникальных слов и устойчивых выражений материала единицы, **включая заголовки заданий**.*\n\n| ελληνικά | по-русски |\n|----------|-----------|\n| 1. Σωστό ή λάθος; | 1 верно или неверно? |\n| 1.0 Τι χρώμα θέλω; | 1.0 какой цвет хочу? |\n| 1.1 Συνδυάζω και γράφω. | 1.1 сочетаю и пишу |\n| 1.2 Τι ρούχα έχω; | 1.2 какая у меня одежда? |\n| 1.3 Ρωτάω κάποιον. | 1.3 спрашиваю кого-то |\n| 1.4 Τι αγοράζουν; | 1.4 что покупают? |\n| 1.5 Συμπληρώνω: | 1.5 дополняю: |\n| 1.6 Τι τους αρέσει; | 1.6 что им нравится? |\n| 1.7 Συμπληρώνω: | 1.7 дополняю: |\n| 1.8 | 1.8 пишу что нравится / не нравится |\n| 2. Απαντάω: | 2 отвечаю: |\n| 2. Απαντάω: *(μικρόφωνο)* | 2 отвечаю (микрофон) |\n| 2.0 | 2.0 покупаю подарки к Новому году |\n| 2.1 | 2.1 цвет, размер, цена, покупают ли |\n| 2.2 τσ ή τζ; | 2.2 тс или τζ? |\n| 2.2 τσ ή τζ; *(A58)* | 2.2 тс или τζ? (A58) |\n| 2.3 | 2.3 список подарков к Πρωτοχρονιά |\n| 2.4 | 2.4 что взять в поез
