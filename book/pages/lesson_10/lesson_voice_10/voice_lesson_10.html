  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" crossorigin="anonymous"></script>
  <script>
    const VOICE_PROMPT = "Λειτούργησε ως αυστηρός δάσκαλος ελληνικών και συνεργάτης μου για πρακτική εξάσκηση.\n\nЯ новичок в греческом языке, поэтому мета-общение со мной веди на русском. У тебя две основные задачи: разыгрывать со мной диалоги по ролям и строго контролировать мою речь.\n\nПРАВИЛА ИСПРАВЛЕНИЯ ОШИБОК (КРИТИЧЕСКИ ВАЖНО):\n1. Будь максимально краток. Никакой вежливости, похвалы и лишних слов.\n2. Если в моей реплике нет ошибок — ничего не говори вне роли (просто ответь «ОК» или сразу продолжай диалог своей репликой).\n3. Если ты видишь ошибку (в грамматике, лексике, порядке слов) — прерви роль и скажи ТОЛЬКО исправленный вариант. Никаких вступлений вроде «Правильно будет так...» или объяснений.\n4. Переводи фразы на русский язык ТОЛЬКО если я скажу слово «Перевод» или «Translate».\n\nПРАВИЛА РОЛЕВОЙ ИГРЫ:\n1. Я пришлю тебе сценарии (Ситуации). Я всегда играю Роль А, ты всегда играешь Роль Б.\n2. Жди моей первой реплики, не начинай диалог сам (если по сценарию Роль А говорит первой).\n3. Так как я новичок, говори короткими репликами, удобными для восприятия на слух, и используй строго лексику из чек-листа к ситуации. Не усложняй грамматику.\n\nМы будем переходить от одной ситуации к другой по моей команде (например, \"Ситуация 1\").\n\nВот сценарии для нашей практики:\n";
    const SOURCE_MD = "# 🎙 Голосовой урок 10 (по оцифровке главы)\n\n**[🏠 Readme](../../../../Readme.md) → [📚 content_10.md](../content_10.md) → 📄 `lesson_voice_10/voice_lesson_10.md`**\n\n| ⚡ Быстрые ссылки |                                                                     |\n|------------------|---------------------------------------------------------------------|\n| 📚 Урок          | [content_10.md](../content_10.md)                                    |\n| 📄 Оцифровка     | [lesson_10_digitized.md](../lesson_digitized/lesson_10_digitized.md) |\n| 💎 Суть урока    | [essence_10/essence_10.md](../essence_10/essence_10.md)                                    |\n| 🎙 Voice (HTML)  | [voice_lesson_10.html](voice_lesson_10.html) · [essence_10.html](../essence_10.html)                                |\n\n### Блок 1: Коммуникативные ситуации (Ролевые игры)\n\n* **Ситуация 1: «Πάμε πάλι!» — куда еду, транспорт, время, магазин**\n* **Контекст:** Повторение опорных фраз: пункт назначения, вид транспорта, расписание, «как долго», вопросы в магазине.\n* **Роль А:** Расскажите, куда едете и как; назовите время отправления/прибытия; ответьте, как давно учите язык; спросите цену и оплату.\n* **Роль Б:** Уточните маршрут и транспорт; поддержите разговор о сроках; в роли продавца ответьте про цену, мелочь и чек.\n* 🎯 **Чек-лист для ситуации:**\n  - *Πάω στον Πειραιά* — Еду в Пирей.\n  - *στην Κυψέλη* — (В) Кипсели.\n  - *στο κέντρο* — В центр.\n  - *με τον ηλεκτρικό.* — На электричке (пригородной).\n  - *με το λεωφορείο.* — На автобусе.\n  - *με τα πόδια.* — Пешком.\n  - *Το λεωφορείο φεύγει στις τρεις και φτάνει στις τέσσερις παρά τέταρτο.* — Автобус уходит в три и прибывает в четверть пятого.\n  - *Πόσον καιρό είσαι εδώ;* — Как давно ты здесь?\n  - *Εδώ και δύο χρόνια.* — Уже два года.\n  - *Την Κυριακή* — В воскресенье (временной отрезок).\n  - *→ δε δουλεύω.* — …не работаю.\n  - *Πόσο κοστίζει / κοστίζουν;* — Сколько стоит / стоят?\n  - *Μετρητά ή με κάρτα;* — Наличные или карта?\n  - *Ορίστε τα ρέστα σας.* — Вот ваша сдача.\n\n---\n\n* **Ситуация 2: Записки «Πού πηγαίνουν;» — куда сходить за покупками**\n* **Контекст:** Короткие записки домашним: супермаркет, пекарня, обувь, киоск и т.д.\n* **Роль А:** Прочитайте записку и объясните, куда нужно зайти и что купить.\n* **Роль Б:** Уточните детали (время, количество, адрес).\n* 🎯 **Чек-лист для ситуации:**\n  - *Μιχάλη, δεν έχουμε τίποτα για φαγητό. Θέλουμε και απορρυπαντικά και χαρτί υγείας. Εγώ γυρίζω σήμερα αργά το βράδυ. Πάμε για ποτό μετά;* — Нет еды; нужны средства и туалетная бумага; поздно вечером; пойти выпить?\n  - *Αντώνη, φεύγω για τη δουλειά. Το απόγευμα έρχεται η Μαίρη για καφέ. Δεν παίρνεις μισό κιλό κουλουράκια και κανένα τσουρέκι ή μερικά κρουασάν; Φιλάκια. Τα λέμε το μεσημέρι.* — На работу; гость на кофе; купить полкило кулураки и т.д.\n  - *Χριστίνα, τα πέδιλα που μου έκανε δώρο η αδελφή σου είναι μικρά. Σε παρακαλώ, πηγαίνεις στο μαγαζί μήπως έχουν το 43; Είναι στην Τσιμισκή, δύο λεπτά από τη δουλειά σου.* — Сандалии малы; попросить сходить в магазин за размером 43 (улица Цимиски).\n  - *Λεωνίδα, πάω στο γυμναστήριο. Ο πατέρας χρειάζεται τσιγάρα και την εφημερίδα του. Δεν παίρνεις και παγωτά για τα παιδιά;* — В спортзал; отцу сигареты и газета; мороженое детям.\n  - *Δημήτρη, αρχίζουν οι εκπτώσεις αύριο! Πάμε για εκείνο το φόρεμα που θέλω για το καλοκαίρι; Κι εσύ χρειάζεσαι ένα δυο μπλουζάκια. Στον σταθμό στο Μοναστηράκι κατά τις 5:00;* — Распродажи; платье на лето; футболки; встреча у станции Монастираки.\n\n---\n\n* **Ситуация 3: Мини-диалоги «Πού βρίσκεται η Μαίρη;» (упражнение 9)**\n* **Контекст:** На рынке, в кассе, в киоске, у автобуса, в мясном отделе, в магазине одежды.\n* **Роль А:** Покупатель / пассажир — спрашивайте вес, билеты, салфетки, маршрут автобуса, отбивные, размер.\n* **Роль Б:** Продавец / водитель — отвечайте по тексту оцифровки.\n* 🎯 **Чек-лист для ситуации:**\n  - *Πόσα βάζω;* / *Ένα κιλό περίπου.* — Сколько положить? / Около кило.\n  - *Ορίστε. Θέλετε τίποτα άλλο;* / *Μάλιστα. Και δύο κιλά μανταρίνια.* — Вот. Ещё что-нибудь? / Два кило мандаринов.\n  - *Γεια σας. Ψάχνω ένα εισιτήριο με επιστροφή για την Αθήνα.* — Ищу билет туда-обратно в Афины.\n  - *Μάλιστα. Για πότε ακριβώς;* / *Για σήμερα το βράδυ.* — На когда именно? / На сегодня вечером.\n  - *Με συγχωρείτε, αυτό το λεωφορείο περνάει από το Σύνταγμα;* / *Ναι. Κάνει στάση εκεί.* — Этот автобус идёт через Синтагма? / Да, там останавливается.\n  - *Μου δίνετε τέσσερις μπριζόλες, παρακαλώ;* / *Χοιρινές ή μοσχαρίσιες;* — Четыре отбивные… / Свиные или говяжьи?\n  - *Σας πάει πάρα πολύ.* / *Σίγουρα; Μήπως μου είναι λίγο στενό;* — Вам очень идёт. / Может, мне тесно?\n  - *Πώς σας είναι;* / *Εντάξει. Είναι το νούμερό μου. Μ’ αρέσουν. Θα τα πάρω.* — Как сидит? / Нормально, мой размер, беру.\n\n---\n\n* **Ситуация 4: «Έχω τον λόγο» — монолог на заданную тему**\n* **Контекст:** Ответьте на вопросы из раздела как на мини-собеседовании.\n* **Роль А:** Расскажите о буднях и досуге, покупках, предпочтениях в поездках и транспорте на работу/в школу.\n* **Роль Б:** Задайте уточняющие вопросы по темам оцифровки.\n* 🎯 **Чек-лист для ситуации:**\n  - *Τι κάνετε συνήθως κάθε μέρα; Τι κάνετε στον ελεύθερο χρόνο σας;* — Что делаете каждый день? Чем занимаетесь в свободное время?\n  - *Πηγαίνετε συχνά στα μαγαζιά; Τι αγοράζετε συνήθως;* — Часто ли ходите по магазинам? Что обычно покупаете?\n  - *Προτιμάτε να ταξιδεύετε με τρένο ή με αεροπλάνο;* — Предпочитаете путешествовать поездом или самолётом?\n  - *Με ποιο μεταφορικό μέσο πηγαίνετε στη δουλειά ή στο σχολείο σας; Παίρνετε συχνά λεωφορείο, μετρό κτλ. ή προτιμάτε το αυτοκίνητο;* — На чём добираетесь на работу/в школу? Автобус, метро или машина?\n\n---\n\n* **Ситуация 5: «Παίζω έναν ρόλο» — такси и овощной**\n* **Контекст:** Готовые роли: разговор с таксистом; покупка на лавке с овощами и фруктами.\n* **Роль А (такси / манавис):** Следуйте тексту роли пассажира или покупателя.\n* **Роль Б:** Таксист или продавец на лавке — по сценарию оцифровки.\n* 🎯 **Чек-лист для ситуации:**\n  - *Μπαίνω σε ένα ταξί. Ο / η οδηγός με ρωτάει πολλά πράγματα για τη ζωή μου. Τον / την ρωτάω και εγώ για την οικογένειά του, τη δουλειά του και ό,τι άλλο θέλω.* — Таксист: сценарий А (входите в такси, задаёте вопросы).\n  - *Είμαι οδηγός ταξί. Ένας κύριος / μια κυρία μπαίνει στο ταξί μου. Καταλαβαίνω ότι δεν είναι από την Ελλάδα και τον / την ρωτάω από πού είναι, για τη χώρα του / της και ό,τι άλλο θέλω.* — Таксист: сценарий Б (водитель, интерес к стране пассажира).\n  - *Είμαι στο μανάβικο και αγοράζω φρούτα και λαχανικά για το τραπέζι που έχω το Σάββατο το βράδυ. Θέλω πολλά πράγματα, αλλά είναι ακριβά.* — Манавис: покупатель фруктов и овощей на субботний стол.\n  - *Δουλεύω στο μανάβικο. Ο πελάτης / η πελάτισσα ζητάει πολλά πράγματα. Μερικά από αυτά νομίζει ότι είναι ακριβά. Απαντώ στις ερωτήσεις και του / της δίνω αυτά που θέλει.* — Манавис: продавец, цены, ответы на вопросы.\n\n---\n\n### Блок 2: Универсальная шпаргалка (Фразы-клише)\n\n**Пункт назначения и транспорт**\n\n* **Πάω στον Πειραιά** — *Еду в Пирей.*\n* **στην Κυψέλη** — *(В район) Кипсели.*\n* **στο κέντρο** — *В центр.*\n* **με τον ηλεκτρικό.** — *На электричке (пригородной).*\n* **με τη μηχανή.** — *На мотоцикле.*\n* **με το λεωφορείο.** — *На автобусе.*\n* **με τα πόδια.** — *Пешком.*\n\n**Расписание и длительность**\n\n* **Το λεωφορείο φεύγει στις τρεις και φτάνει στις τέσσερις παρά τέταρτο.** — *Автобус в три, прибытие в 4:45.*\n* **Πόσον καιρό είσαι εδώ;** — *Как давно ты здесь?*\n* **Μόνο πέντε μέρες.** — *Только пять дней.*\n* **Εδώ και δύο χρόνια.** — *Уже два года.*\n* **Τον Αύγουστο** — *В августе.*\n* **Στις έξι το απόγευμα** — *В шесть вечера.*\n\n**В магазине**\n\n* **Πόσο κάνει / κάνουν;** — *Сколько стоит?*\n* **Ψιλά δεν έχετε;** — *Мелочи нет?*\n* **Μετρητά ή με κάρτα;** — *Наличные или карта?*\n* **Ορίστε τα ρέστα σας.** — *Вот сдача.*\n* **Ορίστε η απόδειξή σας.** — *Вот чек.*\n\n**Числа (фрагмент таблицы 100–1000)**\n\n* **100** — *εκατό*\n* **101** — *εκατόν ένα*\n* **199** — *εκατόν ενενήντα εννιά*\n* **1000** — *χίλια*\n\n---\n\n### Блок 3: Тематический словарь\n\n**Транспорт и передвижение**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| ο ηλεκτρικός | пригородная электричка |\n| το λεωφορείο | автобус |\n| η μηχανή | мотоцикл |\n| το μετρό | метро |\n| τα πόδια | пешком (букв. «ноги») |\n| το τρένο | поезд |\n| το αεροπλάνο | самолёт |\n| το αυτοκίνητο | автомобиль |\n| το ταξί | такси |\n\n**Места и организации**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| ο Πειραιάς | Пирей |\n| η Κυψέλη | Кипсели (район) |\n| το κέντρο | центр (города) |\n| το σούπερ μάρκετ | супермаркет |\n| ο φούρνος | пекарня |\n| το περίπτερο | киоск |\n| το κατάστημα | магазин |\n| το μανάβικο | овощная лавка |\n| το τουριστικό γραφείο | туристическое бюро |\n\n**Время и сроки**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| Πόσον καιρό …; | Как долго …? |\n| μία εβδομάδα | одна неделя |\n| ένας μήνας | один месяц |\n| ένας χρόνος | один год |\n| εδώ και … | уже … (о сроке) |\n| τώρα | сейчас |\n| το απόγευμα | вечер, после полудня |\n| η Κυριακή | воскресенье |\n\n**Покупки и вежливость**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| το εισιτήριο | билет |\n| η στάση | остановка |\n| τα ρέστα | сдача |\n| η απόδειξη | чек |\n| το κιλό | килограмм |\n| Με συγχωρείτε; | Извините? |\n| Βεβαίως. | Конечно. / Да. |\n| Μάλιστα. | Хорошо. / Слушаю. |\n\n**Числительные (из таблицы урока)**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| εκατό | сто |\n| εκατόν ένα | сто один |\n| χίλια | тысяча |\n| διακόσια … εννιακόσια | двести … девятьсот |\n\n";

    document.getElementById("prompt-block").textContent = VOICE_PROMPT;
    if (typeof marked !== "undefined") {
      document.getElementById("essence-render").innerHTML = marked.parse(SOURCE_MD);
    } else {
      document.getElementById("essence-render").innerHTML = "<pre>" + SOURCE_MD.replace(/</g, "&lt;") + "</pre>";
    }

    document.getElementById("copy-all").addEventListener("click", async () => {
      const text = VOICE_PROMPT + "\n\n---\n\n" + SOURCE_MD;
      try {
        await navigator.clipboard.writeText(text);
        const el = document.getElementById("copy-feedback");
        el.textContent = "Скопировано.";
        setTimeout(() => { el.textContent = ""; }, 2500);
      } catch (e) {
        alert("Не удалось скопировать: " + e);
      }
    });
  </script>
