  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" crossorigin="anonymous"></script>
  <script>
    const VOICE_PROMPT = "Ρόλος:\n\nΕίσαι ένας αυστηρός, λακωνικός και ενεργητικός καθηγητής ελληνικών για ηχητική εξάσκηση (Voice Mode). Ο μαθητής σου είναι ρωσόφωνος. Ο στόχος σου είναι να με βοηθήσεις να μάθω και να εμπεδώσω το υλικό από τις επισυναπτόμενες σημειώσεις (αρχείο essence — κονσπέκτο του μαθήματος). Πρέπει να υποθέσεις ότι δεν βλέπω τις σημειώσεις και δεν τις ξέρω απ' έξω. Το έργο σου είναι να μου υποενθυμίζεις τμηματικά λέξεις, κανόνες και έτοιμες φράσεις και να τα εξασκούμε αμέσως μέσω διαλόγου.\n\nΠρόσθετη προτεραιότητα — διάλογοι:\n\nΟι πλήρεις διάλογοι στις σημειώσεις (γραμμές με ονόματα, σκηνές) είναι για την επόμενη φάση. Πρώτα εξασκούμε ξεχωριστά τις φράσεις, τα μοτίβα και τις κατασκευές του μαθήματος (3–4 μικρά βήματα ανά θέμα). Μόνο όταν τα κατακτήσω σε απλές προτάσεις και μεταφράσεις, περνάμε σε σύντομο διάλογο: εσύ λες μία γραμμή από το κείμενο των σημειώσεων και περιμένεις τη δική μου — όχι ανάγνωση ολόκληρου του διαλόγου σε μία ροή χωρίς παύση.\n\nΚανόνες διδασκαλίας (ΚΡΙΣΙΜΑ):\n\nΑπό το απλό στο σύνθετο: Εστίασε σε ολόκληρες προτάσεις. Διάλεξε μία κατασκευή από τις σημειώσεις — π.χ. ένα ρήμα σε συγκεκριμένο χρόνο, ένα ερώτημα από πίνακα ερωτήσεων, ένα μοτίβο με άρθρο και προθέσεις —, θύμισέ το πολύ σύντομα και ζήτα μετάφραση απλής πρότασης από τα ρωσικά στα ελληνικά (ή το αντίστροφο, αν ταιριάζει στο μάθημα). Όταν απαντήσω σωστά — δώσε λίγο πιο δύσκολη πρόταση με την ίδια κατασκευή.\n\nΣύντομο feedback: Επιδοκιμασία επιτρέπεται, αλλά αυστηρά 1–2 λέξεις («Μπράβο», «Πολύ καλά»). Σωστή απάντηση — σύντομη επιβεβαίωση («Ναι» / «Σωστά») και αμέσως επόμενη άσκηση.\n\nΣκληρή διόρθωση λαθών: Αν έκανα λάθος, η ροή είναι σταθερή:\n\nΠες «Όχι» ή «Λάθος» και πες το σωστό.\n\nΑμέσως «Επανάλαβε».\n\nΠερίμενε να το πω σωστά.\n\nΑμέσως μετά δώσε νέα, παρόμοια πρόταση για τον ίδιο κανόνα, για ενίσχυση.\n\nΚαθυστερημένη επανάληψη: Θυμήσου την πρόταση όπου έσφαλα. Κάνε 2–3 άλλες ερωτήσεις από τις σημειώσεις και μετά ξαφνικά ξανά την ίδια αρχική πρόταση.\n\nΔόση: Μην ξεχύνεις όλο το υλικό των σημειώσεων. Ένας κανόνας ή μία λέξη — 3–4 προτάσεις — μετά επόμενο θέμα.\n\nΜη μιλάς για λογαριασμό μου: Αν σωπαίνω ή κολλάω, δώσε κοντή υπόδειξη (πρώτη λέξη), όχι ολόκληρη την απάντηση, εκτός αν πω ρητά «Πες μου την απάντηση» / «Скажи ответ».\n\nΕυελιξία: Αν ζητήσω να αλλάξει μορφή, να παραλείψω θέμα ή να κάνουμε αλλιώς — συμφώνησε αμέσως και προσαρμόσου.\n\nΕιδικά για ΦΩΝΗ:\n\nΥπερ-συντομία: Μέχρι 1–2 προτάσεις ανά ρεπλίκα σου.\n\nΈνα βήμα τη φορά: Ποτέ δύο ερωτήσεις στη σειρά. Έκανες ερώτηση — σώπασε και περίμενε.\n\nΧωρίς μορφοποίηση στη φωνή: Όχι λίστες, παύλες, αγκύλες στην ομιλία σου — φυσική προφορική γλώσσα.\n\nΧωρίς μετα-φράσεις τύπου «Πάμε παρακάτω;» — συνέχισε αθόρυβα στο επόμενο βήμα.\n\n---\n\nΣυνημμένο: σημειώσεις μαθήματος (essence_N.md) — ακολούθα αυστηρά το περιεχόμενό τους για λεξιλόγιο, γραμματική και διάλογους.";
    const ESSENCE_MD = "# 💎 Урок 10 — суть: «Πάμε πάλι!» — повторение 6–9 (стр. 122–131)\n\n**[🏠 Readme](../../../Readme.md) → [📘 book/pages](../) → [📚 content_10.md](content_10.md) → 📄 `essence_10.md`**\n\n*Десятая единица **«Ελληνικά Α'»** («**Πάμε πάλι!**») — **сводный повтор** материала **уроков 6–9**: транспорт и **πάω**, время и длительность, быт и глаголы **-ω**, покупки и артикли, магазин и **μου/σου/…**. Материал **самодостаточен** для повторения: правила, фразы, эталоны, словарь. **Порядок:** цели → грамматика → фразы и диалоги → эталоны → словарь.*\n\n| ⚡ Быстрые ссылки       |                                                                                                                                                               |\n|------------------------|---------------------------------------------------------------------------------------------------------------------------------------------------------------|\n| 📚 Страницы со сканами | [content_10.md](content_10.md)                                                                                                                                 |\n| 🖼 Диапазон            | стр. 122–131                                                                                                                                                  |\n| 📘 Рядом по курсу      | [essence_9](../lesson_9/essence_9.md) · [essence_11](../lesson_11/essence_11.md)                                                                              |\n| 🔁 Повторяемые уроки   | [essence_6](../lesson_6/essence_6.md) · [essence_7](../lesson_7/essence_7.md) · [essence_8](../lesson_8/essence_8.md) · [essence_9](../lesson_9/essence_9.md) |\n\n## 📌 Тема и цели\n\n- Свести в одну картину **движение** (**Πάω …**, **με …**), **расписание** (**φεύγει / φτάνει στις …**).\n- Повторить **«как долго»** (**Πόσον καιρό …;**, **Εδώ και …**) и **когда не работаю** (**την Κυριακή**, **τον Αύγουστο** …).\n- Закрепить **магазин**: цена, **оплата**, **ρέστα**, **απόδειξη**.\n- Освежить **типы глаголов** (Α, Β1, Β2, ΑΒ, Γ1), **артикли**, **винительный**, **πόσος/πόσοι/…**, **αρέσει**, **ακριβός / καινούριος**, **μου, σου, …**\n- Подтянуть **числа** (сотни, тысячи) — опора в [digitized/122.md](digitized/122.md).\n\n### Сводка темы (стр. 122)\n\nТот же «ключ», что в учебнике, в развёрнутом виде — [digitized/122.md](digitized/122.md).\n\n| Блок | Содержание |\n|------|------------|\n| **Προορισμός / Μεταφορά** | **Πάω στον Πειραιά** … **με το λεωφορείο**, **με τα πόδια** … |\n| **Ώρα / δρομολόγιο** | **Το λεωφορείο φεύγει στις τρεις και φτάνει στις τέσσερις παρά τέταρτο.** |\n| **Πόσον καιρό…;** | вопросы и ответы (**Μόνο πέντε μέρες.** … **Εδώ και δύο χρόνια.**) |\n| **Πότε** | **Τον Αύγουστο** … **δε δουλεύω.** |\n| **Στο μαγαζί** | **Πόσο κάνει / κοστίζει;** … **Μετρητά ή με κάρτα;** … **Ορίστε τα ρέστα σας.** |\n| **Αριθμοί 100–1000** | **εκατό**, **διακόσια** … **χίλια**, **χιλιάδες** |\n\n## 🧠 Грамматика и правила\n\n### Карта: что из какого урока\n\n| Блок | Уроки | Ядро |\n|------|-------|------|\n| **Πού πάτε;** — транспорт, **πάω**, часы | 6 | **στον/στην/στο**, **με το λεωφορείο**, **τι ώρα είναι** |\n| Рутина, погода, **πόσον καιρό**, тысячи | 7 | **Πόσον καιρό είσαι εδώ;**, **χίλια … δέκα χιλιάδες** |\n| Покупки, **ένας/μία/ένα** в вин. падеже | 8 | **Θα ήθελα …**, **πόσους χυμούς;**, **τα ρέστα** |\n| Одежда, техника, **μου/σου**, **έρχομαι**, прилагательные | 9 | **Σ’ αρέσει;**, **Πόσο κοστίζει;**, **με κάρτα** |\n\n### Предлоги, артикли, типы глаголов, склонение\n\nСводные таблицы урока — [digitized/123.md](digitized/123.md): **με / σε / για / από**, **σε + артикль → στον/στην/στο**, типы **Α, Β1, Β2, ΑΒ, Γ1**, **οριστικός / αόριστος** в им. и вин., образцы существительных, вопросы **πόσος / πόση / πόσο** с примерами.\n\n### Числа 1–4 с существительными, **ακριβός**, **καινούριος**, местоимения, **αρέσει**\n\n[digitized/124.md](digitized/124.md).\n\n### Числа 100–1000 и тысячи\n\nПодробные таблицы и приставки **-ακόσια** — [digitized/122.md](digitized/122.md).\n\n## 💬 Готовые фразы и диалоги\n\n### Опоры «Πώς το λένε;» — куда и на чём\n\n| Куда | На чем |\n|------|--------|\n| **Πάω στον Πειραιά** | **με τον ηλεκτρικό** |\n| **Πάω στην Κυψέλη** | **με τη μηχανή** |\n| **Πάω στο κέντρο** | **με το λεωφορείο** |\n| | **με τα πόδια** |\n\nПример расписания: **Το λεωφορείο φεύγει στις τρεις και φτάνει στις τέσσερις παρά τέταρτο.**\n\n### Продолжительность\n\n**Вопросы:** **Πόσον καιρό είσαι εδώ;** **… μαθαίνεις ελληνικά;** **… δουλεύεις;**\n\n**Ответы:** **Μόνο πέντε μέρες.** **Μία εβδομάδα.** **Έναν μήνα.** **Δύο μήνες.** **Έναν χρόνο.** **Εδώ και δύο χρόνια.** **Πέντε χρόνια τώρα.**\n\n### Когда не работаю (модель)\n\n**Τον Αύγουστο** / **Την Κυριακή** / **Στις έξι το απόγευμα** **δε δουλεύω.**\n\n### В магазине — цена и оплата\n\n- **Πόσο κάνει / κάνουν;** · **Πόσο έχει / έχουν;** · **Πόσο κοστίζει / κοστίζουν;**\n- **Ψιλά δεν έχετε;** · **Μετρητά ή με κάρτα;**\n- **Ορίστε τα ρέστα σας.** · **Ορίστε η απόδειξή σας.**\n\n### Мини-диалоги по ситуациям (разыграйте или переведите)\n\nТексты **1–8** — в [digitized/129.md](digitized/129.md) (раздел **9. Πού βρίσκεται η Μαίρη;**).\n\n**Кратко:** 1 — **λαϊκή** · 2 — **τουριστικό γραφείο** · 3 — **περίπτερο** · 4 — **δρόμος** · 5 — **φούρνος** (заказ в булочной/мини-маркете) · 6 — **σούπερ μάρκετ** · 7 — **κατάστημα ρούχων** · 8 — **κατάστημα παπουτσιών**.\n\n### Упражнение **7** (стр. 128) — куда идут за покупками\n\nЗаписки и пустой таблица — [digitized/128.md](digitized/128.md). *(Полная сверка по смыслу заметок — по скану страницы.)*\n\n### Говорение и письмо (стр. 130–131)\n\nВопросы **Έχω τον λόγο**, сценарии **Παίζω έναν ρόλο** (такси, овощной), задания **Γράψε-σβήσε** — [digitized/130.md](digitized/130.md), [digitized/131.md](digitized/131.md).\n\n## 📖 Эталоны для самопроверки\n\n*Сжатые ответы для сверки готовых форм. Аудиозадания **A59**, **A60** (стр. 127) и творческие тексты без полного ключа.*\n\n### Упр. 3 — предлоги и артикли (стр. 126 = тот же текст, что в конспекте)\n\nПолный вариант — [digitized/126.md](digitized/126.md).\n\nΗ Κατερίνα είναι υπάλληλος σε μια τράπεζα **στο** Μοσχάτο. Ξυπνάει νωρίς **στις** 6:30 **το** πρωί. Τρώει το πρωινό της και μετά, κατά **τις** 7:30, φεύγει **για** τη δουλειά. Παίρνει **το** ηλεκτρικό και **στις** 8:00 είναι **στη** δουλειά της. **Στις** 1:00 κάνει **το** διάλειμμα **για** φαγητό. Φεύγει **από** την τράπεζα και γυρίζει **στο** σπίτι νωρίς **το** απόγευμα.\n\n### Упр. 9 — диалог ↔ место (стр. 129)\n\n| Τόπος | № диалога |\n|-------|-----------|\n| Στη λαϊκή | 1 |\n| Στο τουριστικό γραφείο | 2 |\n| Στο περίπτερο | 3 |\n| Στον δρόμο | 4 |\n| Στον φούρνο *(или аналогичная точка заказа выпечки)* | 5 |\n| Στο σούπερ μάρκετ | 6 |\n| Στο κατάστημα ρούχων | 7 |\n| Στο κατάστημα παπουτσιών | 8 |\n\n### Упр. 8 — варианты **Α–Ι** (стр. 129)\n\nТексты ответов для вставки в предложения 1–10 — [digitized/129.md](digitized/129.md).\n\n### Упр. 2 — глаголы по лицам (стр. 125)\n\nОриентир по формам *(проверяйте согласование с подлежащим «они» и родом существительных)*: **τον Πειραιά**, **τον ηλεκτρικό**, **Δουλεύουμε**, **προτιμούμε**, **αργεί**, **βρίσκεται**, **τον σταθμό**, **χρειάζονται**, **σηκώνονται**, **τρώνε**, **φεύγουν**, **τηλεφωνούν**, **πηγαίνουν**, **καλές φτηνές ταβέρνες**, **πίνουν**, **λένε**.\n\n### Упр. 4–5 — составление предложений (стр. 126)\n\nПример: **Χρειάζομαι καινούρια παπούτσια.** Остальные сочетания колонок — [digitized/126.md](digitized/126.md).\n\n## 📇 Словарь и опора\n\n### Места и транспорт\n\n| ελληνικά | по-русски |\n|----------|-----------|\n| τα μέσα μεταφοράς | транспорт |\n| το λεωφορείο, το μετρό, το τραμ, το τρόλεϊ | автобус, метро, трамвай, троллейбус |\n| ο ηλεκτρικός | пригородная электричка |\n| η στάση | остановка |\n| η λαϊκή | уличный рынок |\n| το περίπτερο | киоск |\n| ο φούρνος | пекарня |\n| το σούπερ μάρκετ | супермаркет |\n| το κατάστημα ρούχων / παπουτσιών | магазин одежды / обуви |\n| το τουριστικό γραφείο | туристическое бюро |\n\n### Чеклист «могу ли я…»\n\n1. Сказать, **куда иду** и **на чем** (**Πάω … με …**).\n2. Спросить **во сколько** уходит/приходит транспорт (**φεύγει στις …**).\n3. Ответить, **как долго** живу/учусь/работаю (**Πόσον καιρό …;**).\n4. Назвать **день/месяц**, когда не работаю (**την Κυριακή** …).\n5. В магазине спросить цену и **оплатить** (**κάρτα / μετρητά**, **ρέστα**).\n6. Поставить **артикль** с прямым дополнением (**αγοράζω έναν …**, **βλέπω την …**).\n7. Спросить **сколько** (**πόσα εισιτήρια;** **πόση ζάχαρη;**).\n8. Использовать **μου αρέσει / αρέσουν** и **Σου πάει / μου κάνει** в бытовом контексте.\n\n---\n\n*Полные таблицы повторения в репозитории:* [digitized/122.md](digitized/122.md) · [digitized/123.md](digitized/123.md) · [digitized/124.md](digitized/124.md).\n";

    document.getElementById("prompt-block").textContent = VOICE_PROMPT;
    if (typeof marked !== "undefined") {
      document.getElementById("essence-render").innerHTML = marked.parse(ESSENCE_MD);
    } else {
      document.getElementById("essence-render").innerHTML = "<pre>" + ESSENCE_MD.replace(/</g, "&lt;") + "</pre>";
    }

    document.getElementById("copy-all").addEventListener("click", async () => {
      const text = VOICE_PROMPT + "\n\n---\n\n" + ESSENCE_MD;
      try {
        await navigator.clipboard.writeText(text);
        const el = document.getElementById("copy-feedback");
        el.textContent = "Скопировано.";
        setTimeout(() => { el.textContent = ""; }, 2500);
      } catch (e) {
        alert("Не удалось скопировать: " + e);
      }
    });
  </script>
