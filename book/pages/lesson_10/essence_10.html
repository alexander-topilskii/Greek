  <script>
    const VOICE_PROMPT = "Ρόλος:\nΕίσαι ένας αυστηρός, λακωνικός και ενεργητικός καθηγητής ελληνικών για ηχητική εξάσκηση (Voice Mode). Ο μαθητής σου είναι ρωσόφωνος. Ο στόχος σου είναι να με βοηθήσεις να μάθω και να εμπεδώσω το υλικό από τις επισυναπτόμενες σημειώσεις. Πρέπει να υποθέσεις ότι δεν βλέπω τις σημειώσεις και δεν τις ξέρω απ' έξω. Το έργο σου είναι να μου υπενθυμίζεις τμηματικά λέξεις/κανόνες και να τους εξασκούμε αμέσως μέσω διαλόγου.\n\nПравила обучения (КРИТИЧЕСКИ ВАЖНО):\n\nОт простого к сложному: Фокусируйся на целых предложениях. Выбери конструкцию из конспекта (например, глагол έχω), коротко напомни перевод и попроси перевести простое предложение (например, У меня есть машина). Справился — дай предложение сложнее.\nКраткая обратная связь: Похвала допускается, но строго 1-2 слова (например, «Μπράβο», «Πολύ καλά»). Ответил верно — коротко подтверди («Ναι» / «Σωστά») или похвали, повтори правильную фразу, и сразу дай следующее задание.\nЖесткая отработка ошибок: Если я ошибся, алгоритм строго такой:\nСкажи «Όχι» (Нет) или «Λάθος» (Ошибка) и произнеси правильный вариант.\nСразу скажи «Επανάλαβε» (Повтори).\nДождись, пока я произнесу правильно.\nСразу после этого дай мне новое, похожее предложение на это же правило для закрепления.\nОтложенное повторение: Запомни предложение, в котором я допустил ошибку. Задай мне 2-3 других вопроса по конспекту, а затем внезапно снова попроси перевести то самое первоначальное предложение, чтобы проверить, не забыл ли я правильный вариант. Если я дал правильный ответ - больше не повторяем.\nПорционность: Не вываливай весь конспект. Напомнил одно правило/слово -> отработали на 3-4 предложениях -> перешли к следующему.\nНе говори за меня: Если я просто молчу или застрял, дай короткую подсказку (назови первое слово), но не выдавай ответ целиком, пока я не скажу: «Скажи ответ» или «Πες μου την απάντηση».\n\nГибкость к запросам: Ты всегда прислушиваешься к моим просьбам. Если в процессе урока я прошу изменить формат, объяснить, пропустить тему или делать что-то по-новому — ты должен сразу согласиться и подстроиться без лишних вопросов. \nСпецифика ГОЛОСОВОГО режима:\n- Ультра-краткость: Твои реплики должны состоять максимум из 1-2 предложений.\n- Один шаг за один раз: Никогда не задавай два вопроса подряд. Задал вопрос на перевод — замолчи и жди моего ответа.\n- Никакого форматирования в твоих ответах: Не генерируй списки, тире, скобки. Твоя речь должна быть абсолютно естественной для восприятия на слух.\n- Бесшовность: Никаких мета-фраз вроде «Идем дальше?», «Давай продолжим».\n\n\n\nВАЖНО: твой ученик говорит по русски. Формулируй задания, фразы, объяснения на русском языке. \nВАЖНО: активно используй слова из \"Итоговая таблица лексики урока\" при построении предложений.\nВАЖНО: когда ученик закрепит отдельные фразы - переходи к общению по ролям. Проведи с учеником диалог и проверь как он импровизирует с использованием выученных слов и фраз. Используй предложенные диалоги как каркас для отрбаотки.";
    const ESSENCE_MD = "# 💎 Урок 10 — суть: «Πάμε πάλι!» — повторение 6–9 (стр. 122–131)\n\n**[🏠 Readme](../../../Readme.md) → [📘 book/pages](../) → [📚 content_10.md](content_10.md) → 📄 `essence_10.md`**\n\n*Десятая единица **«Ελληνικά Α'»** («**Πάμε πάλι!**») — **сводный повтор** материала **уроков 6–9**: транспорт и **πάω**, время и длительность, быт и глаголы **-ω**, покупки и артикли, магазин и **μου/σου/…**. Материал **самодостаточен** для повторения: правила, фразы, эталоны, словарь. **Порядок:** цели → грамматика → фразы и диалоги → эталоны → словарь.*\n\n| ⚡ Быстрые ссылки       |                                                                                                                                                               |\n|------------------------|---------------------------------------------------------------------------------------------------------------------------------------------------------------|\n| 📚 Страницы со сканами | [content_10.md](content_10.md)                                                                                                                                 |\n| 🖼 Диапазон            | стр. 122–131                                                                                                                                                  |\n| 📘 Рядом по курсу      | [essence_9](../lesson_9/essence_9.md) · [essence_11](../lesson_11/essence_11.md)                                                                              |\n| 🔁 Повторяемые уроки   | [essence_6](../lesson_6/essence_6.md) · [essence_7](../lesson_7/essence_7.md) · [essence_8](../lesson_8/essence_8.md) · [essence_9](../lesson_9/essence_9.md) |\n\n## 📌 Тема и цели\n\n- Свести в одну картину **движение** (**Πάω …**, **με …**), **расписание** (**φεύγει / φτάνει στις …**).\n- Повторить **«как долго»** (**Πόσον καιρό …;**, **Εδώ και …**) и **когда не работаю** (**την Κυριακή**, **τον Αύγουστο** …).\n- Закрепить **магазин**: цена, **оплата**, **ρέστα**, **απόδειξη**.\n- Освежить **типы глаголов** (Α, Β1, Β2, ΑΒ, Γ1), **артикли**, **винительный**, **πόσος/πόσοι/…**, **αρέσει**, **ακριβός / καινούριος**, **μου, σου, …**\n- Подтянуть **числа** (сотни, тысячи) — опора в [digitized/122.md](digitized/122.md).\n\n*Ориентир перед практикой:* **Πάω / με …** · **φεύγει / φτάνει στις …** · **Πόσον καιρό / Εδώ και …** · **Πόσο κάνει / κοστίζει** · **Μετρητά / κάρτα / ρέστα** · **τύποι Α · Β1 · Β2 · ΑΒ · Γ1** · **πόσος / πόση / πόσο** · **χίλια / χιλιάδες** · **αρέσει · ακριβός / καινούριος**.\n\n### Сводка темы (стр. 122)\n\nОпорные блоки повторения — в развёрнутом виде: [digitized/122.md](digitized/122.md).\n\n| Блок | Содержание |\n|------|------------|\n| **Προορισμός / Μεταφορά** | **Πάω στον Πειραιά** … **με το λεωφορείο**, **με τα πόδια** … |\n| **Ώρα / δρομολόγιο** | **Το λεωφορείο φεύγει στις τρεις και φτάνει στις τέσσερις παρά τέταρτο.** |\n| **Πόσον καιρό…;** | вопросы и ответы (**Μόνο πέντε μέρες.** … **Εδώ και δύο χρόνια.**) |\n| **Πότε** | **Τον Αύγουστο** … **δε δουλεύω.** |\n| **Στο μαγαζί** | **Πόσο κάνει / κοστίζει;** … **Μετρητά ή με κάρτα;** … **Ορίστε τα ρέστα σας.** |\n| **Αριθμοί 100–1000** | **εκατό**, **διακόσια** … **χίλια**, **χιλιάδες** |\n\n## 🧠 Грамматика и правила\n\n### Карта: что из какого урока\n\n| Блок | Уроки | Ядро |\n|------|-------|------|\n| **Πού πάτε;** — транспорт, **πάω**, часы | 6 | **στον/στην/στο**, **με το λεωφορείο**, **τι ώρα είναι** |\n| Рутина, погода, **πόσον καιρό**, тысячи | 7 | **Πόσον καιρό είσαι εδώ;**, **χίλια … δέκα χιλιάδες** |\n| Покупки, **ένας/μία/ένα** в вин. падеже | 8 | **Θα ήθελα …**, **πόσους χυμούς;**, **τα ρέστα** |\n| Одежда, техника, **μου/σου**, **έρχομαι**, прилагательные | 9 | **Σ’ αρέσει;**, **Πόσο κοστίζει;**, **με κάρτα** |\n\n### Предлоги, артикли, типы глаголов, склонение\n\nСводные таблицы урока — [digitized/123.md](digitized/123.md): **με / σε / για / από**, **σε + артикль → στον/στην/στο**, типы **Α, Β1, Β2, ΑΒ, Γ1**, **οριστικός / αόριστος** в им. и вин., образцы существительных, вопросы **πόσος / πόση / πόσο** с примерами.\n\n### Числа 1–4 с существительными, **ακριβός**, **καινούριος**, местоимения, **αρέσει**\n\n[digitized/124.md](digitized/124.md).\n\n### Числа 100–1000 и тысячи\n\nПодробные таблицы и приставки **-ακόσια** — [digitized/122.md](digitized/122.md).\n\n## 💬 Готовые фразы и диалоги\n\n### Опоры «Πώς το λένε;» — куда и на чём\n\n| Куда | На чем |\n|------|--------|\n| **Πάω στον Πειραιά** | **με τον ηλεκτρικό** |\n| **Πάω στην Κυψέλη** | **με τη μηχανή** |\n| **Πάω στο κέντρο** | **με το λεωφορείο** |\n| | **με τα πόδια** |\n\nПример расписания: **Το λεωφορείο φεύγει στις τρεις και φτάνει στις τέσσερις παρά τέταρτο.**\n\n### Продолжительность\n\n**Вопросы:** **Πόσον καιρό είσαι εδώ;** **… μαθαίνεις ελληνικά;** **… δουλεύεις;**\n\n**Ответы:** **Μόνο πέντε μέρες.** **Μία εβδομάδα.** **Έναν μήνα.** **Δύο μήνες.** **Έναν χρόνο.** **Εδώ και δύο χρόνια.** **Πέντε χρόνια τώρα.**\n\n### Когда не работаю (модель)\n\n**Τον Αύγουστο** / **Την Κυριακή** / **Στις έξι το απόγευμα** **δε δουλεύω.**\n\n### В магазине — цена и оплата\n\n- **Πόσο κάνει / κάνουν;** · **Πόσο έχει / έχουν;** · **Πόσο κοστίζει / κοστίζουν;**\n- **Ψιλά δεν έχετε;** · **Μετρητά ή με κάρτα;**\n- **Ορίστε τα ρέστα σας.** · **Ορίστε η απόδειξή σας.**\n\n### Мини-диалоги по ситуациям (разыграйте или переведите)\n\nТексты **1–8** — в [digitized/129.md](digitized/129.md) (раздел **9. Πού βρίσκεται η Μαίρη;**).\n\n**Кратко:** 1 — **λαϊκή** · 2 — **τουριστικό γραφείο** · 3 — **περίπτερο** · 4 — **δρόμος** · 5 — **φούρνος** (заказ в булочной/мини-маркете) · 6 — **σούπερ μάρκετ** · 7 — **κατάστημα ρούχων** · 8 — **κατάστημα παπουτσιών**.\n\n### Упражнение **7** (стр. 128) — куда идут за покупками\n\nЗаписки и пустой таблица — [digitized/128.md](digitized/128.md). *(Полная сверка по смыслу заметок — по скану страницы.)*\n\n### Говорение и письмо (стр. 130–131)\n\nВопросы **Έχω τον λόγο**, сценарии **Παίζω έναν ρόλο** (такси, овощной), задания **Γράψε-σβήσε** — [digitized/130.md](digitized/130.md), [digitized/131.md](digitized/131.md).\n\n## 📖 Эталоны для самопроверки\n\n*Сжатые ответы для сверки готовых форм. Аудиозадания **A59**, **A60** (стр. 127) и творческие тексты без полного ключа.*\n\n### Упр. 3 — предлоги и артикли (стр. 126 = тот же текст, что в конспекте)\n\nПолный вариант — [digitized/126.md](digitized/126.md).\n\nΗ Κατερίνα είναι υπάλληλος σε μια τράπεζα **στο** Μοσχάτο. Ξυπνάει νωρίς **στις** 6:30 **το** πρωί. Τρώει το πρωινό της και μετά, κατά **τις** 7:30, φεύγει **για** τη δουλειά. Παίρνει **το** ηλεκτρικό και **στις** 8:00 είναι **στη** δουλειά της. **Στις** 1:00 κάνει **το** διάλειμμα **για** φαγητό. Φεύγει **από** την τράπεζα και γυρίζει **στο** σπίτι νωρίς **το** απόγευμα.\n\n### Упр. 9 — диалог ↔ место (стр. 129)\n\n| Τόπος | № диалога |\n|-------|-----------|\n| Στη λαϊκή | 1 |\n| Στο τουριστικό γραφείο | 2 |\n| Στο περίπτερο | 3 |\n| Στον δρόμο | 4 |\n| Στον φούρνο *(или аналогичная точка заказа выпечки)* | 5 |\n| Στο σούπερ μάρκετ | 6 |\n| Στο κατάστημα ρούχων | 7 |\n| Στο κατάστημα παπουτσιών | 8 |\n\n### Упр. 8 — варианты **Α–Ι** (стр. 129)\n\nТексты ответов для вставки в предложения 1–10 — [digitized/129.md](digitized/129.md).\n\n### Упр. 2 — глаголы по лицам (стр. 125)\n\nОриентир по формам *(проверяйте согласование с подлежащим «они» и родом существительных)*: **τον Πειραιά**, **τον ηλεκτρικό**, **Δουλεύουμε**, **προτιμούμε**, **αργεί**, **βρίσκεται**, **τον σταθμό**, **χρειάζονται**, **σηκώνονται**, **τρώνε**, **φεύγουν**, **τηλεφωνούν**, **πηγαίνουν**, **καλές φτηνές ταβέρνες**, **πίνουν**, **λένε**.\n\n### Упр. 4–5 — составление предложений (стр. 126)\n\nПример: **Χρειάζομαι καινούρια παπούτσια.** Остальные сочетания колонок — [digitized/126.md](digitized/126.md).\n\n## 📇 Словарь урока\n\n### Транспорт и «куда / на чём»\n\n| ελληνικά | по-русски |\n|----------|-----------|\n| τα μέσα μεταφοράς | транспорт |\n| το λεωφορείο · το μετρό · το τραμ · το τρόλεϊ | автобус · метро · трамвай · троллейбус |\n| ο ηλεκτρικός · ο προαστιακός | пригородная электричка · пригородный поезд |\n| η στάση · ο σταθμός | остановка · станция |\n| Πάω στον Πειραιά · με το λεωφορείο · με τα πόδια | иду в Пирей · на автобусе · пешком |\n| φεύγει στις … · φτάνει στις … | уходит в … · приходит в … |\n\n### Время, длительность, магазин (повтор)\n\n| ελληνικά | по-русски |\n|----------|-----------|\n| Πόσον καιρό …; · Εδώ και … | как долго …; · уже … (лет/месяцев) |\n| την Κυριακή · τον Αύγουστο | в воскресенье · в августе |\n| Πόσο κάνει; · Μετρητά ή με κάρτα; | сколько стоит? · наличные или карта? |\n| τα ρέστα · η απόδειξη | сдача · чек |\n| εκατό … χίλια · χιλιάδες | сто … тысяча · тысячи |\n\n### Полезные связки\n\n**Πάω … με …** · **Το λεωφορείο φεύγει …** · **Πόσον καιρό είσαι εδώ;** · **Πόσο κάνει / κοστίζει;** · **Ψιλά δεν έχετε;** · **Ορίστε τα ρέστα σας** — **подробнее в итоговой таблице** ниже.\n\n### Глаголы и грамматика (опорный список)\n\n**πάω**, **φεύγω**, **φτάνω**, **δουλεύω**, **αγοράζω**, **πληρώνω**, **αρέσει**, **έρχομαι**, **χρειάζομαι** · типы **Α / Β1 / Β2 / ΑΒ / Γ1**, **άρθρα**, **πόσος / πόση / πόσο** — **формы и примеры** в **итоговой таблице** ниже.\n\n### Итоговая таблица лексики урока (стр. 122–131)\n\n*Алфавитный перечень (`casefold`) уникальных слов и устойчивых выражений материала единицы, **включая заголовки заданий**.*\n\n| ελληνικά | по-русски |\n|----------|-----------|\n| ## Γράψε-σβήσε *(μολύβι και γόμα)* | ## пиши-стирай (карандаш и ластик) |\n| ## Είμαι όλος αυτιά | ## весь во внимании |\n| ## Ενότητα 10 — Πάμε πάλι! | ## единица 10 — поехали снова! |\n| ## Έχω τον λόγο *(μικρόφωνο)* | ## слово за мной (микрофон) |\n| ## Παίζω έναν ρόλο *(μάσκες)* | ## играю роль (маски) |\n| ### 1. Διορθώνω τα λάθη. | 1 исправляю ошибки |\n| ### 1.1 Στο ταξί | 1.1 в такси |\n| ### 1.2 Στον μανάβη | 1.2 у овощника |\n| ### 1.3 | 1.3 |\n| ### 1.4 | 1.4 |\n| ### 10. Απαντώ: | 10 отвечаю: |\n| ### 2. Βάζω τη λέξη στον σωστό τύπο. | 2
