  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" crossorigin="anonymous"></script>
  <script>
    const VOICE_PROMPT = "Λειτούργησε ως αυστηρός δάσκαλος ελληνικών και συνεργάτης μου για πρακτική εξάσκηση.\n\nЯ новичок в греческом языке, поэтому мета-общение со мной веди на русском. У тебя две основные задачи: разыгрывать со мной диалоги по ролям и строго контролировать мою речь.\n\nПРАВИЛА ИСПРАВЛЕНИЯ ОШИБОК (КРИТИЧЕСКИ ВАЖНО):\n1. Будь максимально краток. Никакой вежливости, похвалы и лишних слов.\n2. Если в моей реплике нет ошибок — ничего не говори вне роли (просто ответь «ОК» или сразу продолжай диалог своей репликой).\n3. Если ты видишь ошибку (в грамматике, лексике, порядке слов) — прерви роль и скажи ТОЛЬКО исправленный вариант. Никаких вступлений вроде «Правильно будет так...» или объяснений.\n4. Переводи фразы на русский язык ТОЛЬКО если я скажу слово «Перевод» или «Translate».\n\nПРАВИЛА РОЛЕВОЙ ИГРЫ:\n1. Я пришлю тебе сценарии (Ситуации). Я всегда играю Роль А, ты всегда играешь Роль Б.\n2. Жди моей первой реплики, не начинай диалог сам (если по сценарию Роль А говорит первой).\n3. Так как я новичок, говори короткими репликами, удобными для восприятия на слух, и используй строго лексику из чек-листа к ситуации. Не усложняй грамматику.\n\nМы будем переходить от одной ситуации к другой по моей команде (например, \"Ситуация 1\").\n\nВот сценарии для нашей практики:\n";
    const SOURCE_MD = "# 🎙 Голосовой урок 13 (по оцифровке главы)\n\n**[🏠 Readme](../../../../Readme.md) → [📚 content_13.md](../content_13.md) → 📄 `lesson_voice_13/voice_lesson_13.md`**\n\n| ⚡ Быстрые ссылки |                                                                     |\n|------------------|---------------------------------------------------------------------|\n| 📚 Урок          | [content_13.md](../content_13.md)                                    |\n| 📄 Оцифровка     | [lesson_13_digitized.md](../lesson_digitized/lesson_13_digitized.md) |\n| 💎 Суть урока    | [essence_13/essence_13.md](../essence_13/essence_13.md)                                    |\n| 🎙 Voice (HTML)  | [essence_13.html](../essence_13.html)                                |\n\n### Блок 1: Коммуникативные ситуации (Ролевые игры)\n\n* **Ситуация 1: «Μεγάλη ιστορία!» — день рождения Пабло (начало)**\n* **Контекст:** Панайотис поздравляет Пабло; гости из школы; как познакомились с кафенейоном; здоровье; биографии Элени, Димитры, Войцеха.\n* **Роль А:** Панайотис / Элени / Хамидт — по очереди ведите диалог.\n* **Роль Б:** Пабло и остальные — отвечайте по оцифровке.\n* 🎯 **Чек-лист для ситуации:**\n  - *Καλησπέρα. Χρόνια πολλά, Πάμπλο. Να ζήσεις.* — Добрый вечер. С праздником, Пабло. Чтобы жил(а).\n  - *Να ’σαι καλά, Παναγιώτη μου.* — Будь здоров, Панайотис.\n  - *Χίλια ευχαριστώ. Από ’δώ οι φίλοι μου α’ το σχολείο: η Ελένη, ο Χαμίντ, η Δήμητρα και ο Βόιτσεκ. Παιδιά, ο Παναγιώτης. Έχει το καφενείο που σας είπα.* — Спасибо! Представляю друзей из школы…\n  - *Ναι, κάνουμε μάθημα οχτώ μήνες τώρα. Εσύ, πώς τον γνώρισες;* — Вы вместе учитесь? Как ты его познал?\n  - *Από τον φίλο μου, τον Νίκο. Ο Πάμπλο δούλεψε δυο μήνες στο καφενείο, όταν ήμουν στην Αγγλία. Αλήθεια, ο Νίκος δεν ήρθε;* — Через друга Никоса; Пабло подменял в кафенейоне…\n  - *Έρχεται με τη Μελέκ. Είναι στον δρόμο. Πήγες δυο μήνες διακοπές στην Αγγλία;* — (Никос) Едет с Мелек. В пути. Ты был в Англии на каникулах?\n  - *Ευτυχώς. Τέλος καλό, όλα καλά, που λένε. Εσύ, Ελένη, είσαι καιρό στην Ελλάδα;* — К счастью. Конец благой — всё благо… Давно в Греции, Элени?\n  - *Ουου! Έξι χρόνια σχεδόν. Μεγάλη ιστορία! Γνώρισα τον Γιάννη, τον άντρα μου, στη Σερβία. Αυτός ήταν δημοσιογράφος κι εγώ στους Γιατρούς του Κόσμου. Όταν γύρισε στην Ελλάδα, ήρθα και τον βρήκα. Ταξιδέψαμε πολύ μαζί. Κάποια στιγμή παντρευτήκαμε και μείναμε εδώ.* — Шесть лет… Большая история! Муж из Сербии…\n  - *Περίπου. Γεννήθηκα στην Αθήνα, αλλά μεγάλωσα στην Αυστραλία. Μιλάω καλά, αλλά γράφω χάλια! Ήρθα, λοιπόν, στην Ελλάδα για μαθήματα και πρακτική. Αλλά ο Βόιτσεκ έμαθε τα πρώτα ελληνικά μόνος του!* — Родилась в Афинах, выросла в Австралии…\n  - *Ε, όχι και μόνος μου! Στη δουλειά. Ήταν εδώ πριν ο αδελφός μου και με βοήθησε…* — Не сам на работе учил греческий — помог брат…\n  - *Γεννήθηκα στην Αθήνα, αλλά μεγάλωσα στην Αυστραλία.* — Родился(ась)… вырос(ла)… (вводная рамка).\n\n---\n\n* **Ситуация 2: «Πώς το λένε» — праздник, подарки, биография**\n* **Контекст:** Цветные блоки с готовыми фразами после первого диалога.\n* **Роль А / Б:** Произносите реплики по цветовым группам; переводите смысл на русский вслух.\n* 🎯 **Чек-лист для ситуации:**\n  - *Χρόνια πολλά! · Να ζήσεις! · Να ’σαι καλά!*\n  - *Έρχεται. Είναι στον δρόμο.*\n  - *Αυτό για σένα. · Χίλια ευχαριστώ.*\n  - *Τέλος καλό, όλα καλά.*\n  - *Γεννήθηκα στην Αθήνα, αλλά μεγάλωσα στην Αυστραλία.*\n\n---\n\n* **Ситуация 3: «Να ζήσεις, Πάμπλο!» — тосты, пожелания, гости (B11)**\n* **Контекст:** Тосты, «да проживёшь сто/тысячу лет», история Хаминта, приход Мелек, Никоса, Марины с собакой Куклой, паэлья.\n* **Роль А:** Ведущий за столом — тосты и объяснение формул; Хамидт — коротко о себе; Марина — о собаке.\n* **Роль Б:** Пабло приносит напитки и блюдо; гости отвечают.\n* 🎯 **Чек-лист для ситуации:**\n  - *Έφερα τα ποτά.* — Принёс напитки.\n  - *Στην υγειά σου! Χρόνια σου πολλά!* — За твоё здоровье! С праздником!\n  - *Παιδιά, όταν κάποιος έχει γενέθλια, λέμε: «Να τα εκατοστήσεις», δηλαδή να ζήσεις 100 χρόνια!* — «Да проживёшь сотню» — сто лет…\n  - *Ή «Να τα χιλιάσεις», δηλαδή να ζήσεις 1.000 χρόνια!* — Или «да наживёшь тысячу»…\n  - *Τρία χρόνια. Ξέρεις, στη χώρα μου είχαμε πόλεμο. Κάποιοι μπορέσαμε και φύγαμε. Όταν ήρθα εδώ δεν ήξερα λέξη ελληνικά.* — Три года в Греции; война на родине…\n  - *Καλησπέρα.* — Мелек, Никос, Марина: добрый вечер.\n  - *Α, ήρθε και η Κούκλα! Κούκλα, Κούκλα μου, καλώς την!* — Пришла и Кукла! Добро пожаловать!\n  - *Έλα, Χαμίντ. Έμαθες και την ιστορία της Κούκλας. Πάμε τώρα στο τραπέζι. Έφτιαξα ένα ισπανικό φαγητό. Το λένε παέγια.* — Паэлья; идём к столу.\n  - *Ωωω!* — Общий отклик гостей.\n\n---\n\n* **Ситуация 4: «Παίζω έναν ρόλο» — на перемене и про вчерашний праздник**\n* **Контекст:** Упр. 8 — знакомство в классе на перемене; упр. 1.6 — разговор о вчерашней вечеринке у Пабло.\n* **Роль А / Б:** Сначала сценарий «перемена», затем — звонок/разговор о празднике.\n* 🎯 **Чек-лист для ситуации:**\n  - *Είμαι πρώτη μέρα στο μάθημα των ελληνικών. Στο διάλειμμα κάποιος / κάποια από την τάξη με ρωτάει από πού είμαι, πού μεγάλωσα, πότε ήρθα εδώ και διάφορα άλλα πράγματα. Τον / τη ρωτάω κι εγώ για τη ζωή του / της.* — Роль А (новичок в классе).\n  - *Σήμερα ήρθε μια καινούρια μαθήτρια / ένας καινούριος μαθητής στην τάξη. Δεν ξέρω τίποτε γι’ αυτήν / αυτόν. Στο διάλειμμα μιλάμε και την / τον ρωτάω ό,τι θέλω (από πού είναι, πού μεγάλωσε, τι σπούδασε, πότε ήρθε εδώ, τι έκανε πριν κτλ.)* — Роль Б (старый ученик задаёт вопросы).\n  - *Ένας φίλος / Μια φίλη χθες ήταν στο πάρτι του Πάμπλο για τα γενέθλιά του. Του / της τηλεφωνώ και ρωτάω πώς πέρασε και ποιοι άλλοι ήταν εκεί.* — Роль А: звоню другу с вопросами о празднике.\n  - *Χθες πήγα στο σπίτι του Πάμπλο. Ένας φίλος / Μια φίλη μου με παίρνει τηλέφωνο και με ρωτάει πώς πέρασε, τι κάναμε και ποιοι άλλοι ήταν εκεί.* — Роль Б: вчера был(а) у Пабло, отвечаю на вопросы.\n\n---\n\n* **Ситуация 5: «Η ιστορία της ζωής μου» — интервью и опоры**\n* **Контекст:** Упр. 2.6 — интервью с 90-летним; вопросы из «Η σειρά μου τώρα» (§2) для монолога о жизни.\n* **Роль А:** Журналист — вопросы по сценарию; **Роль Б:** рассказ о жизни или ответы по чек-листу §2.\n* 🎯 **Чек-лист для ситуации:**\n  - *Είμαι 90 χρονών. Μια / ένας δημοσιογράφος μου παίρνει συνέντευξη και με ρωτάει διάφορα πράγματα για τη ζωή μου (πού γεννήθηκα, πού και πώς μεγάλωσα, πότε άρχισα τη δουλειά μου, αν παντρεύτηκα, αν έκανα παιδιά και διάφορες άλλες ερωτήσεις).* — Роль Б: интервьюируемый 90 лет.\n  - *Είμαι δημοσιογράφος και παίρνω συνέντευξη από έναν άνθρωπο 90 χρονών. Τον ρωτάω διάφορα πράγματα για τη ζωή του (πού γεννήθηκε, πού και πώς μεγάλωσε, πότε άρχισε τη δουλειά του, αν παντρεύτηκε, αν έκανε παιδιά και ό,τι άλλο θέλω).* — Роль А: журналист.\n  - *Πότε και πού γεννήθηκες;* — Когда и где ты родился(ась)?\n  - *Πού μεγάλωσες;* — Где вырос(ла)?\n  - *Δουλεύεις; Αν ναι,* *α. Πότε άρχισες τη δουλειά σου;* · *β. Πού δούλεψες μέχρι τώρα;* — Работа (условный блок).\n  - *Είσαι παντρεμένος / παντρεμένη; Αν ναι,* *α. Πότε και πού γνώρισες τον άντρα σου / τη γυναίκα σου;* · *β. Πότε και πού παντρεύτηκες;* · *γ. Έχεις παιδιά;* — Брак и дети.\n  - *Μένεις στην Ελλάδα; Αν ναι,* *α. Πότε ήρθες στην Ελλάδα;* · *β. Πού έμαθες ελληνικά;* — Жизнь в Греции и язык.\n\n---\n\n### Блок 2: Универсальная шпаргалка (Фразы-клише)\n\n**Вводная рамка «Η ιστορία της ζωής μου»**\n\n* **Γεννήθηκα στην Αθήνα, αλλά μεγάλωσα στην Αυστραλία.** — *Родился(ась) в Афинах, но вырос(ла) в Австралии.*\n* **Ήρθα στην Ελλάδα πέρυσι.** — *Приехал(а) в Грецию в прошлом году.*\n* **Βρήκα μια δουλειά στη Θεσσαλονίκη.** — *Нашёл(ла) работу в Салониках.*\n* **Χρόνια πολλά! Να ζήσεις!** — *С праздником! Чтобы жил(а)!*\n\n**«Πώς το λένε» — после первого диалога**\n\n* **Χρόνια πολλά! · Να ζήσεις! · Να ’σαι καλά!** — *С праздником! · Чтобы жил(а)! · Будь здоров!*\n* **Έρχεται. Είναι στον δρόμο.** — *Едет. В пути.*\n* **Αυτό για σένα. · Χίλια ευχαριστώ.** — *Это тебе. · Тысяча благодарностей.*\n* **Τέλος καλό, όλα καλά.** — *Конец благой — всё благо.*\n* **Γεννήθηκα στην Αθήνα, αλλά μεγάλωσα στην Αυστραλία.** — *Родился(ась) в Афинах, вырос(ла) в Австралии.*\n\n**Тосты и пожелания (фрагмент B11 + список 2.5)**\n\n* **Στην υγειά σου!** — *За твоё здоровье!*\n* **Να τα εκατοστήσεις** — *Да проживёшь сотню (лет).*\n* **Να τα χιλιάσεις** — *Да наживёшь тысячу (лет).*\n* **Να τα εκατοστήσεις · Με γεια · Συλλυπητήρια · Καλορίζικο** — *из списка слов упр. 2.5 (пожелания и соболезнования).*\n\n---\n\n### Блок 3: Тематический словарь\n\n**Жизнь и биография**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| γεννιέμαι / γεννήθηκα | родиться / родился(ась) |\n| μεγαλώνω | расту, воспитываюсь |\n| η ιστορία | история |\n| τα γενέθλια | день рождения |\n| οι Γιατροί του Κόσμου | «Врачи мира» (организация) |\n| ο πόλεμος | война |\n\n**Праздник и вежливость**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| Χρόνια πολλά! | С праздником! (много лет!) |\n| Να ζήσεις! | Чтобы жил(а)! |\n| Να ’σαι καλά! | Будь здоров! |\n| Χίλια ευχαριστώ! | Большое спасибо! (тысяча благодарностей) |\n| Καλώς την! | Добро пожаловать (к ней)! |\n\n**Учёба и быт**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| το μάθημα | урок |\n| το διάλειμμα | перемена |\n| το Πανεπιστήμιο | университет |\n| το καφενείο | кафенейон |\n| το παέγια | паэлья (блюдо) |\n| ο κτηνίατρος | ветеринар |\n\n**Глаголы (формы из текста урока)**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| ταξιδεύω | путешествую |\n| γνωρίζω | знакомлюсь |\n| παντρεύομαι | женюсь / выхожу замуж |\n| φέρνω | приношу |\n| έμαθα (μαθαίνω) | узнал(а) / выучил(а) |\n\n";

    document.getElementById("prompt-block").textContent = VOICE_PROMPT;
    if (typeof marked !== "undefined") {
      document.getElementById("essence-render").innerHTML = marked.parse(SOURCE_MD);
    } else {
      document.getElementById("essence-render").innerHTML = "<pre>" + SOURCE_MD.replace(/</g, "&lt;") + "</pre>";
    }

    document.getElementById("copy-all").addEventListener("click", async () => {
      const text = VOICE_PROMPT + "\n\n---\n\n" + SOURCE_MD;
      try {
        await navigator.clipboard.writeText(text);
        const el = document.getElementById("copy-feedback");
        el.textContent = "Скопировано.";
        setTimeout(() => { el.textContent = ""; }, 2500);
      } catch (e) {
        alert("Не удалось скопировать: " + e);
      }
    });
  </script>
