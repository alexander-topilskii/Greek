  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" crossorigin="anonymous"></script>
  <script>
    const VOICE_PROMPT = "Λειτούργησε ως αυστηρός δάσκαλος ελληνικών και συνεργάτης μου για πρακτική εξάσκηση.\n\nЯ новичок в греческом языке, поэтому мета-общение со мной веди на русском. У тебя две основные задачи: разыгрывать со мной диалоги по ролям и строго контролировать мою речь.\n\nПРАВИЛА ИСПРАВЛЕНИЯ ОШИБОК (КРИТИЧЕСКИ ВАЖНО):\n1. Будь максимально краток. Никакой вежливости, похвалы и лишних слов.\n2. Если в моей реплике нет ошибок — ничего не говори вне роли (просто ответь «ОК» или сразу продолжай диалог своей репликой).\n3. Если ты видишь ошибку (в грамматике, лексике, порядке слов) — прерви роль и скажи ТОЛЬКО исправленный вариант. Никаких вступлений вроде «Правильно будет так...» или объяснений.\n4. Переводи фразы на русский язык ТОЛЬКО если я скажу слово «Перевод» или «Translate».\n\nПРАВИЛА РОЛЕВОЙ ИГРЫ:\n1. Я пришлю тебе сценарии (Ситуации). Я всегда играю Роль А, ты всегда играешь Роль Б.\n2. Жди моей первой реплики, не начинай диалог сам (если по сценарию Роль А говорит первой).\n3. Так как я новичок, говори короткими репликами, удобными для восприятия на слух, и используй строго лексику из чек-листа к ситуации. Не усложняй грамматику.\n\nМы будем переходить от одной ситуации к другой по моей команде (например, \"Ситуация 1\").\n\nВот сценарии для нашей практики:\n";
    const SOURCE_MD = "# 🎙 Голосовой урок 2 (по оцифровке главы)\n\n### Блок 1: Коммуникативные ситуации и ролевые игры\n\n#### Ситуация 1 — У периптера: где живёте\n\n*Контекст:* Улица у **περίπτερο**, диалог **A13** в оцифровке. Цель — цепочка «приветствие → дела → где живёшь → адрес».\n\n```text\n**Φου:** Γεια σου, Παναγιώτη!  \n**Παναγιώτης:** Α, καλησπέρα, Φου. Τι κάνεις;  \n**Φου:** Καλά, εσύ; Πώς είσαι;  \n**Παναγιώτης:** Μια χαρά! Μένεις εδώ κοντά;  \n**Φου:** Ναι, μένω στην Κυψέλη.  \n**Παναγιώτης:** Πού ακριβώς;  \n**Φου:** Κυκλάδων 29. Εσύ πού μένεις;  \n**Παναγιώτης:** Στον Πειραιά, στο Πασαλιμάνι.\n```\n\n*Роль А (линия Φου):* Отработайте все реплики Φου из цитаты: приветствие, ответы на вопросы о делах, ответ «мне отлично», фраза с μένω и районом, уточнение адреса, встречный вопрос «а ты где живёшь?» — строго по тексту.\n\n*Роль Б (линия Παναγιώτης):* Отработайте реплики Παναγιώτης из цитаты: вечернее приветствие, вопрос «живёшь рядом?», «где именно?», ответ с Пиреем и Пасалимани.\n\n*Чек-фразы:* опирайтесь на диалог выше; ключ — пара вопросов про «рядом» и «где именно», плюс обмен районом и улицей.\n\n---\n\n#### Ситуация 2 — Неформально и официально\n\n*Контекст:* Таблица **ανεπίσημο / επίσημο** и второй пример диалога.\n\n```text\n| Ανεπίσημο *(μπλουζάκι)* | Επίσημο *(γραβάτα)* |\n|-------------------------|---------------------|\n| Τι κάνεις; | Τι κάνετε; |\n| Πώς είσαι; | Πώς είστε; |\n| Πώς πάει; | |\n| Τι γίνεται; | |\n| Τι νέα; | |\n\n– Καλημέρα, Παναγιώτη. Τι κάνεις;  \n– Καλημέρα, Μαρίνα. Τι κάνει ο Παναγιώτης;\n```\n\n*Роль А:* Сначала говорите форму **Τι κάνεις;** / **Πώς είσαι;**, затем переключитесь на **Τι κάνετε;** / **Πώς είστε;**.\n\n*Роль Б:* Ответьте по цепочке второго примера в цитате (утреннее приветствие и взаимные Τι κάνεις / Τι κάνει ο …).\n\n*Чек-фразы:* «Τι κάνεις;», «Τι κάνετε;», «Πώς πάει;», «Τι γίνεται;», «Τι νέα;», «Τι κάνει ο Παναγιώτης;».\n\n---\n\n#### Ситуация 3 — Настроение и прощание\n\n*Контекст:* Жёлтый блок **χαιρετισμοί και αποχαιρετισμοί** и таблица **διάθεση**.\n\n```text\n**Πάνω μέρος**\n\n- Καλημέρα. / Χαίρετε.  \n- Καλησπέρα. / Γεια χαρά. / Γεια.\n\n**Κάτω μέρος**\n\n- Τα λέμε.  \n- Καλό βράδυ.  \n- Καληνύχτα.  \n- Χαίρετε.  \n- Γεια χαρά.  \n- Άντε, γεια.  \n- Αντίο.\n\n| Φράση | Σημείωση |\n|-------|----------|\n| Μια χαρά. | πολύ χαρούμενο πρόσωπο |\n| Πολύ καλά. | |\n| Καλά. | |\n| Έτσι κι έτσι. | ουδέτερο |\n| Τα ίδια. | |\n| Καλούτσικα. | |\n| Όχι και τόσο καλά. | |\n| Χάλια. | |\n```\n\n*Роль А:* Спросите «Τι κάνεις;» или «Πώς είσαι;» → получите ответ из таблицы настроения → завершите прощанием из списка.\n\n*Роль Б:* Ответьте одной строкой из таблицы настроения в цитате → попрощайтесь фразой из нижнего списка в цитате.\n\n*Чек-фразы:* см. два списка в цитате.\n\n---\n\n#### Ситуация 4 — Район, улица, уточнение\n\n*Контекст:* Сначала короткий пример с Καλαμαριά и Πόντου 16, затем образец 1.2 (Каллифея / κέντρο / Μενάνδρου 10) из оцифровки.\n\n```text\n– Τι κάνεις;  \n– Καλά.  \n– Πού μένεις;  \n– Μένω στην Καλαμαριά.  \n– Πού ακριβώς;  \n– Πόντου 16.\n\n**Στοιχεία:** Καλλιθέα / κέντρο / Μενάνδρου 10\n\n— Πού μένεις;  \n— Στην Καλλιθέα. Εσύ;  \n— Στο κέντρο.  \n— Πού ακριβώς;  \n— Μενάνδρου 10.\n```\n\n*Роль А:* Задайте цепочку из образца 1.2: где живёшь → «а ты?» → где именно.\n\n*Роль Б:* Ответьте по строкам образца: район → κέντρο → улица и номер (как Μενάνδρου 10).\n\n*Чек-фразы:* повторите формулировки из второй цитаты; не выходите за пределы оцифровки.\n\n---\n\n#### Ситуация 5 — Телефон\n\n*Контекст:* **A16** и зелёный блок «Πώς το λένε;» про телефон.\n\n```text\n**Φου:** Έχεις το τηλέφωνό μου;  \n**Παναγιώτης:** Όχι.  \n**Φου:** Είναι το 210 8230987. Εσύ έχεις τηλέφωνο;  \n**Παναγιώτης:** Ναι. Το κινητό μου είναι 6974567033 και το σταθερό 210 4578690.\n\n– Έχεις τηλέφωνο;  \n– Ναι, το κινητό μου είναι **6974567033** και το σταθερό μου **210 4578690**.  \n*(Μικροί αριθμοί σε παρένθεση δείχνουν ομαδοποίηση ψηφίων: **(69-74-56-70-33)** και **(2-10-45-78-6-90)**.)*  \n– Όχι, δεν έχω.  \n– Τι τηλέφωνο έχεις;  \n– Το τηλέφωνό μου είναι **22920 25566**.\n```\n\n*Роль А:* Реплики Φου из первой цитаты: есть ли номер → продиктуйте номер → встречный вопрос про телефон.\n\n*Роль Б:* Реплики Παναγιώτης: короткий отрицательный ответ → ответ с κινητό и σταθερό, как в тексте.\n\n*Чек-фразы:* используйте вторую цитату (типовые вопросы и отрицание «δεν έχω»).\n\n### Блок 2: Шпаргалка для диалогов (фразы-клише)\n\n*Ниже — готовые опоры из раздела «Πώς το λένε;» (жильё) и телефонного блока оцифровки.*\n\n```text\n- Πού μένεις;  \n- Μένω στον Πειραιά.  \n- στην Κυψέλη.  \n- στο Πασαλιμάνι.  \n- Πού ακριβώς;  \n- (Μένω) Κυκλάδων 23.\n\n– Έχεις τηλέφωνο;  \n– Ναι, το κινητό μου είναι **6974567033** και το σταθερό μου **210 4578690**.  \n*(Μικροί αριθμοί σε παρένθεση δείχνουν ομαδοποίηση ψηφίων: **(69-74-56-70-33)** και **(2-10-45-78-6-90)**.)*  \n– Όχι, δεν έχω.  \n– Τι τηλέφωνο έχεις;  \n– Το τηλέφωνό μου είναι **22920 25566**.\n```\n\n*Дополнительно:* в оцифровке есть раздел **1.1** с вопросами «Πού είναι …;» — используйте те же формулировки, если нужен географический круг.\n\n### Блок 3: Тематический словарь (таблицы)\n\n*Словарные группы ниже приведены как срезы оцифровки: подписи к иллюстрации, окончания по родам, примеры **μένω**, упражнение на **ο, η, το**.*\n\n#### Подписи к иллюстрации «Για δες» (город)\n\n```text\n\n- ΤΟ ΑΕΡΟΔΡΟΜΙΟ  \n- ΤΟ ΛΙΜΑΝΙ  \n- ΤΟ ΜΕΤΡΟ  \n- Η ΤΡΑΠΕΖΑ  \n- ΤΟ ΛΕΩΦΟΡΕΙΟ  \n- Η ΣΤΑΣΗ  \n- Η ΠΛΑΤΕΙΑ  \n- Ο ΚΙΝΗΜΑΤΟΓΡΑΦΟΣ  \n- ΤΟ ΤΡΕΝΟ  \n- ΤΟ ΠΑΙΔΙ  \n- ΤΟ ΓΡΑΜΜΑ  \n\n**Πρόσωπα:** Ο ΓΙΩΡΓΟΣ, Ο ΚΩΣΤΑΣ, Ο ΓΙΑΝΝΗΣ · Η ΜΑΡΙΑ, Η ΕΛΕΝΗ\n```\n\n#### Примеры с **μένω**\n\n```text\n- Εγώ μένω στο Γουδί.  \n- Εσύ πού μένεις;  \n- Ο Παναγιώτης μένει στον Πειραιά.  \n- Η Αρλέτα μένει Μουσών 23.  \n- Το σκυλάκι μένει στο σπίτι.  \n- Εμείς μένουμε στην Καισαριανή.  \n- Εσείς μένετε εδώ;  \n- Ο Φου και ο Παναγιώτης δε μένουν κοντά.  \n- Η Αρλέτα και η Άννα μένουνε στη Φιλοθέη.  \n- Τα παιδιά μένουνε στην Κίνα τώρα.\n```\n\n#### Окончания и род (фрагмент таблицы)\n\n```text\n\n**Αρσενικό (ο)**  \n- ο Γιώργ**ος** · ο Κώστ**ας** · ο Γιάννη**ς**  \n- **ο** → **-ος**, **-ας**, **-ης** *(οι καταλήξεις σε κόκκινο στο βιβλίο)*\n\n**Θηλυκό (η)**  \n- η Μαρί**α** · η Ελέν**η**  \n- **η** → **-α**, **-η**\n\n**Ουδέτερο (το)**  \n- το τρέν**ο** · το παιδ**ί** · το γράμ**μα**  \n- **το** → **-ο**, **-ι**, **-μα**\n```\n\n#### Упражнение «ο, η, το» (список слов)\n\n```text\n## 7 Συμπληρώνω ο, η, το.\n\n*Τα άρθρα στο πρωτότυπο είναι χρωματικά: **ο** μπλε, **η** ροζ, **το** μωβ. Είκοσι σχέδια με γραμμή για το άρθρο + ουσιαστικό.*\n\n1. **ο** δρόμος *(δρόμος με δέντρα — το «ο» χειρόγραφο ως παράδειγμα)*  \n2. \\_\\_\\_ θάλασσα  \n3. \\_\\_\\_ σπίτι  \n4. \\_\\_\\_ Ευρώπη  \n\n5. \\_\\_\\_ σχολείο  \n6. \\_\\_\\_ φαρμακείο  \n7. \\_\\_\\_ ήλιος  \n8. \\_\\_\\_ ουρανός  \n9. \\_\\_\\_ όνομα  \n\n10. \\_\\_\\_ Αθήνα  \n11. \\_\\_\\_ Θεσσαλονίκη  \n12. \\_\\_\\_ μουσείο  \n13. \\_\\_\\_ εστιατόριο  \n\n14. \\_\\_\\_ περίπτερο  \n15. \\_\\_\\_ ταβέρνα  \n16. \\_\\_\\_ νοσοκομείο  \n17. \\_\\_\\_ φούρνος  \n\n18. \\_\\_\\_ μαγαζί  \n19. \\_\\_\\_ θέατρο  \n20. \\_\\_\\_ ξενοδοχείο\n```\n";

    document.getElementById("prompt-block").textContent = VOICE_PROMPT;
    if (typeof marked !== "undefined") {
      document.getElementById("essence-render").innerHTML = marked.parse(SOURCE_MD);
    } else {
      document.getElementById("essence-render").innerHTML = "<pre>" + SOURCE_MD.replace(/</g, "&lt;") + "</pre>";
    }

    document.getElementById("copy-all").addEventListener("click", async () => {
      const text = VOICE_PROMPT + "\n\n---\n\n" + SOURCE_MD;
      try {
        await navigator.clipboard.writeText(text);
        const el = document.getElementById("copy-feedback");
        el.textContent = "Скопировано.";
        setTimeout(() => { el.textContent = ""; }, 2500);
      } catch (e) {
        alert("Не удалось скопировать: " + e);
      }
    });
  </script>
