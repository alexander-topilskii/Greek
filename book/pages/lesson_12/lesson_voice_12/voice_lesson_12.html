  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" crossorigin="anonymous"></script>
  <script>
    const VOICE_PROMPT = "Λειτούργησε ως αυστηρός δάσκαλος ελληνικών και συνεργάτης μου για πρακτική εξάσκηση.\n\nЯ новичок в греческом языке, поэтому мета-общение со мной веди на русском. У тебя две основные задачи: разыгрывать со мной диалоги по ролям и строго контролировать мою речь.\n\nПРАВИЛА ИСПРАВЛЕНИЯ ОШИБОК (КРИТИЧЕСКИ ВАЖНО):\n1. Будь максимально краток. Никакой вежливости, похвалы и лишних слов.\n2. Если в моей реплике нет ошибок — ничего не говори вне роли (просто ответь «ОК» или сразу продолжай диалог своей репликой).\n3. Если ты видишь ошибку (в грамматике, лексике, порядке слов) — прерви роль и скажи ТОЛЬКО исправленный вариант. Никаких вступлений вроде «Правильно будет так...» или объяснений.\n4. Переводи фразы на русский язык ТОЛЬКО если я скажу слово «Перевод» или «Translate».\n\nПРАВИЛА РОЛЕВОЙ ИГРЫ:\n1. Я пришлю тебе сценарии (Ситуации). Я всегда играю Роль А, ты всегда играешь Роль Б.\n2. Жди моей первой реплики, не начинай диалог сам (если по сценарию Роль А говорит первой).\n3. Так как я новичок, говори короткими репликами, удобными для восприятия на слух, и используй строго лексику из чек-листа к ситуации. Не усложняй грамматику.\n\nМы будем переходить от одной ситуации к другой по моей команде (например, \"Ситуация 1\").\n\nВот сценарии для нашей практики:\n";
    const SOURCE_MD = "# 🎙 Голосовой урок 12 (по оцифровке главы)\n\n**[🏠 Readme](../../../../Readme.md) → [📚 content_12.md](../content_12.md) → 📄 `lesson_voice_12/voice_lesson_12.md`**\n\n| ⚡ Быстрые ссылки |                                                                     |\n|------------------|---------------------------------------------------------------------|\n| 📚 Урок          | [content_12.md](../content_12.md)                                    |\n| 📄 Оцифровка     | [lesson_12_digitized.md](../lesson_digitized/lesson_12_digitized.md) |\n| 💎 Суть урока    | [essence_12/essence_12.md](../essence_12/essence_12.md)                                    |\n| 🎙 Voice (HTML)  | [essence_12.html](../essence_12.html)                                |\n\n### Блок 1: Коммуникативные ситуации (Ролевые игры)\n\n* **Ситуация 1: По телефону — «Πού ήσουν;» (B5)**\n* **Контекст:** Арлета звонит Мелек: где была в выходные, телефон был выключен; поездка в Турцию к семье, билеты, встреча в кафенейоне.\n* **Роль А (Арлета):** Поздоровайтесь; спросите, где была; удивитесь; похвалите; уточните транспорт и время; договоритесь о встрече.\n* **Роль Б (Мелек):** Ответьте; объясните импульсивную поездку; опишите перелёт и сроки; завершите звонок.\n* 🎯 **Чек-лист для ситуации:**\n  - *Λέγετε.* — Алло / слушаю.\n  - *Έλα, Μελέκ. Τι κάνεις, παιδάκι μου; Πού ήσουν όλο το Σαββατοκύριακο; Το κινητό σου ήταν συνέχεια κλειστό.* — Привет… Где ты была всё выходные? Телефон был выключен.\n  - *Πού ήμουν; Στο σπίτι μου.* — Где я была? Дома.\n  - *Ναι, στο σπίτι μου στην Τουρκία.* — Да, дома в Турции.\n  - *Τελευταία στιγμή το αποφάσισα. Έψαξα στο Ίντερνετ κι έκλεισα πολύ φτηνά εισιτήρια.* — В последний момент решила. Нашла в интернете дешёвые билеты.\n  - *Με αεροπλάνο πήγα. Έφτασα την Παρασκευή το μεσημέρι και γύρισα χτες το απόγευμα. Λοιπόν, σε κλείνω τώρα, γιατί πάω για μάθημα. Τα λέμε το βράδυ από κοντά;* — Летала самолётом. Прибыла в пятницу днём, вернулась вчера вечером…\n  - *Εντάξει. Στο «Καφενείο» κατά τις 9:00;* — В «Кафенейон» около 21:00?\n  - *Έγινε. Γεια.* — Договорились. Пока.\n  - *Πού ήσουν το Σαββατοκύριακο;* — Где ты была в выходные? (вводная рамка).\n  - *Πώς περάσατε χτες;* — Как провели вчера?\n\n---\n\n* **Ситуация 2: Ключ «Πώς το λένε» после звонка**\n* **Контекст:** Короткие реплики для разговора о поездке и прощания по телефону.\n* **Роль А / Б:** Попеременно произносите фразы из оранжевого, синего и зелёного блоков.\n* 🎯 **Чек-лист для ситуации:**\n  - *Τι κάνεις, παιδάκι μου;* — Как дела, дочка?\n  - *Πού ήσουν το Σαββατοκύριακο;* — Где ты была в выходные?\n  - *Τι λες;* — Что говоришь?!\n  - *Μα πώς;* — Как так?!\n  - *Άντε ρε, μπράβο!* — Ну давай, браво!\n  - *Σε κλείνω τώρα.* — Сейчас закончу разговор (букв. «закрываю тебя»).\n  - *Τα λέμε από κοντά.* — Увидимся лично.\n\n---\n\n* **Ситуация 3: В кафенейоне — «Πώς περάσατε;» (B7)**\n* **Контекст:** Мелек рассказывает о поездке домой: родители, друзья, стол, музыка до утра; остальные делятся новостями за выходные.\n* **Роль А (Мелек):** Расскажите о поездке, семье и вечере; спросите, как провели выходные собеседники.\n* **Роль Б (Панайотис, Арлета, Эрвин):** Поприветствуйте; задавайте вопросы; комментируйте.\n* 🎯 **Чек-лист для ситуации:**\n  - *Καλώς την! Καλώς την! Τι κάνεις; Ακούμε τα νέα σου.* — Добро пожаловать! Как дела? Ждём новостей.\n  - *Όλα καλά. Πήγα σπίτι μου ύστερα από έναν χρόνο σχεδόν. Δέκα μήνες.* — Была дома почти через год, десять месяцев.\n  - *Με τα μαθήματα και τις εξετάσεις στο Πανεπιστήμιο δεν μπόρεσα.* — Из-за занятий и экзаменов в университете не смогла (летом).\n  - *Πολύ ωραία! Φανταστικά!* — Отлично! Фантастика!\n  - *Ναι, βέβαια! Την Παρασκευή ήμουν με τους δικούς μου. Την άλλη μέρα συνάντησα τους φίλους μου. Το πρωί πήγαμε για καφέ, βόλτα στα μαγαζιά, περπατήσαμε στο κέντρο. Το βράδυ οι γονείς μου έκαναν ένα μεγάλο τραπέζι.* — Пятница с родными, в субботу встретила друзей… вечером большой стол.\n  - *Ε ρε, γλέντια!* — Ого, гулянка!\n  - *Ναι! Κάλεσαν όλη την οικογένεια. Η μάνα μου μαγείρεψε κι ο πατέρας μου έφτιαξε τα γλυκά. Φάγαμε και ήπιαμε. Έχω κι έναν θείο που παίζει κιθάρα καταπληκτικά. Άρχισε τα τραγούδια με την κιθάρα… Τραγουδήσαμε και χορέψαμε μέχρι το πρωί.* — Вся семья; мама готовила, папа сладости; дядя играл на гитаре…\n  - *Καλά ήταν, αλλά πολύ λίγο! Εσείς πώς περάσατε; Τι κάνατε;* — Хорошо, но мало времени! А вы как провели выходные?\n  - *Εμείς… τα ίδια, όπως τα ξέρεις. Δεν άλλαξε τίποτα σ’ ένα Σαββατοκύριακο.* — Мы… по-старому, без перемен за одни выходные (Арлета).\n\n---\n\n* **Ситуация 4: Таблица «Πώς το λένε» (после B7) и вопросы «Η σειρά μου τώρα»**\n* **Контекст:** Готовые пары фраз для приветствия гостьи и рассказа о досуге; монолог о последней поездке.\n* **Роль А:** Используйте левую колонку таблицы; **Роль Б:** правую — в диалоге.\n* 🎯 **Чек-лист для ситуации:**\n  - *Καλώς την!* — *Έκαναν (το) τραπέζι.*\n  - *Πώς πέρασες;* — *Ε ρε, γλέντια!*\n  - *Φανταστικά!* — *Τα ίδια, όπως τα ξέρεις.*\n  - *Πότε πήγες ταξίδι τελευταία φορά; Πού ακριβώς πήγες; Τι έκανες; Πώς πέρασες;* — Вопросы: когда последний раз ездила, куда, что делала, как прошло.\n\n---\n\n* **Ситуация 5: «Παίζω έναν ρόλο» — как прошла поездка; ориентиры Пароса (B9)**\n* **Контекст:** Ролевая 2.5: друг вернулся из поездки — расспрос / жалоба на плохой отдых. Дополнительно — названия мест на Паросе из упр. 2.6 для устной мини-презентации.\n* **Роль А / Б:** Следуйте тексту в таблице ролей; затем назовите 2–3 пункта с подписей к фото (Парос).\n* 🎯 **Чек-лист для ситуации:**\n  - *Ο φίλος / η φίλη μου γύρισε από ένα ταξίδι. Ρωτάω πώς πέρασε.* — Роль А: расспросить вернувшегося друга.\n  - *Γύρισα χτες από ένα ταξίδι. Δεν πέρασα καθόλου καλά. Ο φίλος / η φίλη μου με ρωτάει πώς πέρασα.* — Роль Б: вернуться вчера, отдых прошёл плохо.\n  - *1. Πειραιάς — Σάββατο πρωί (παράδειγμα)* — Пример подписи к фото (2.6).\n  - *Νάουσα · Εκατονταπυλιανή · Χρυσή Ακτή · Κολυμπήθρες · Παροικιά · Λεύκες* — топонимы из подписей к коллажу (2.6).\n\n---\n\n### Блок 2: Универсальная шпаргалка (Фразы-клише)\n\n**Вводная рамка «Ένα ταξίδι»**\n\n* **Πού ήσουν το Σαββατοκύριακο;** — *Где ты была в выходные?*\n* **Πώς περάσατε χτες;** — *Как вы провели вчера?*\n* **Προχτές ξύπνησα αργά.** — *Позавчера проснулся(ась) поздно.*\n* **Τους είδα την περασμένη εβδομάδα.** — *Видел(а) их на прошлой неделе.*\n\n**«Πώς το λένε» — после телефонного диалога**\n\n* **Τι κάνεις, παιδάκι μου;** — *Как дела, детка?*\n* **Πού ήσουν το Σαββατοκύριακο;** — *Где была в выходные?*\n* **Τι λες;** — *Что говоришь?!*\n* **Σε κλείνω τώρα.** — *Заканчиваю разговор (сейчас).*\n* **Τα λέμε από κοντά.** — *Поговорим при встрече.*\n\n**В кафенейоне (фрагмент таблицы)**\n\n* **Καλώς την!** — *Добро пожаловать (о приходе гостьи)!*\n* **Έκαναν (το) τραπέζι.** — *Устроили (большой) стол.*\n* **Πώς πέρασες;** — *Как у тебя прошло? / Как провела время?*\n* **Ε ρε, γλέντια!** — *О-о, гулянка!*\n* **Φανταστικά!** — *Фантастика!*\n* **Τα ίδια, όπως τα ξέρεις.** — *По-старому, как ты знаешь…*\n\n---\n\n### Блок 3: Тематический словарь\n\n**Поездки и время**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| το ταξίδι | поездка, путешествие |\n| το Σαββατοκύριακο | выходные |\n| χτες | вчера |\n| προχτές | позавчера |\n| το αεροπλάνο | самолёт |\n| το εισιτήριο | билет |\n| η Τουρκία | Турция |\n| ο Πειραιάς | Пирей (порт) |\n| η Πάρος | остров Парос |\n\n**Люди и быт**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| οι γονείς | родители |\n| οι φίλοι | друзья |\n| η οικογένεια | семья |\n| το τραπέζι | стол (застолье) |\n| η κιθάρα | гитара |\n| το Πανεπιστήμιο | университет |\n\n**Глаголы и выражения (аорист / разговор)**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| ταξιδεύω | путешествую |\n| έκλεισα (κλείνω) | забронировал(а) |\n| έφτασα (φτάνω) | прибыл(а) |\n| γύρισα (γυρίζω) | вернулся(ась) |\n| πώς πέρασες; | как провёл(а) время? |\n| Καλώς την! | добро пожаловать (к женщине)! |\n| Έγινε. | Договорились. / Принято. |\n\n";

    document.getElementById("prompt-block").textContent = VOICE_PROMPT;
    if (typeof marked !== "undefined") {
      document.getElementById("essence-render").innerHTML = marked.parse(SOURCE_MD);
    } else {
      document.getElementById("essence-render").innerHTML = "<pre>" + SOURCE_MD.replace(/</g, "&lt;") + "</pre>";
    }

    document.getElementById("copy-all").addEventListener("click", async () => {
      const text = VOICE_PROMPT + "\n\n---\n\n" + SOURCE_MD;
      try {
        await navigator.clipboard.writeText(text);
        const el = document.getElementById("copy-feedback");
        el.textContent = "Скопировано.";
        setTimeout(() => { el.textContent = ""; }, 2500);
      } catch (e) {
        alert("Не удалось скопировать: " + e);
      }
    });
  </script>
