  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" crossorigin="anonymous"></script>
  <script>
    const VOICE_PROMPT = "Λειτούργησε ως αυστηρός δάσκαλος ελληνικών και συνεργάτης μου για πρακτική εξάσκηση.\n\nЯ новичок в греческом языке, поэтому мета-общение со мной веди на русском. У тебя две основные задачи: разыгрывать со мной диалоги по ролям и строго контролировать мою речь.\n\nПРАВИЛА ИСПРАВЛЕНИЯ ОШИБОК (КРИТИЧЕСКИ ВАЖНО):\n1. Будь максимально краток. Никакой вежливости, похвалы и лишних слов.\n2. Если в моей реплике нет ошибок — ничего не говори вне роли (просто ответь «ОК» или сразу продолжай диалог своей репликой).\n3. Если ты видишь ошибку (в грамматике, лексике, порядке слов) — прерви роль и скажи ТОЛЬКО исправленный вариант. Никаких вступлений вроде «Правильно будет так...» или объяснений.\n4. Переводи фразы на русский язык ТОЛЬКО если я скажу слово «Перевод» или «Translate».\n\nПРАВИЛА РОЛЕВОЙ ИГРЫ:\n1. Я пришлю тебе сценарии (Ситуации). Я всегда играю Роль А, ты всегда играешь Роль Б.\n2. Жди моей первой реплики, не начинай диалог сам (если по сценарию Роль А говорит первой).\n3. Так как я новичок, говори короткими репликами, удобными для восприятия на слух, и используй строго лексику из чек-листа к ситуации. Не усложняй грамматику.\n\nМы будем переходить от одной ситуации к другой по моей команде (например, \"Ситуация 1\").\n\nВот сценарии для нашей практики:\n";
    const SOURCE_MD = "# 🎙 Голосовой урок 4 (по оцифровке главы)\n\n### Блок 1: Коммуникативные ситуации и ролевые игры\n\n#### Ситуация 1 — На улице: парк, языки, кинотеатр\n\n*Контекст:* Диалог **A27** и блок **Πώς το λένε;** сразу после него (списки фраз и синее σημείωμα — всё в цитате).\n\n```text\n### A27 — στον δρόμο\n\n**Βέρα:** Γεια σας. Ξέρετε το πάρκο Ελευθερίας;  \n**Πέδρο:** Συγνώμη, δεν καταλαβαίνω…  \n**Βέρα:** Α, δε μιλάτε ελληνικά;  \n**Πέδρο:** Όχι ελληνικά. Ισπανικά.  \n**Βέρα:** Εγώ δε μιλάω ισπανικά καθόλου. Αγγλικά;  \n**Πέδρο:** Εεε, λίγο. Ο Μάρκος μιλάει ελληνικά. Μάρκος!  \n**Μάρκος:** Ναι, τι θέλετε;  \n**Βέρα:** Το πάρκο Ελευθερίας;  \n**Μάρκος:** Ναι, εδώ είναι. Τι ψάχνετε;  \n**Βέρα:** Ψάχνω τον κινηματογράφο ΣΤΟΥΝΤΙΟ.  \n**Μάρκος:** Μάλιστα. Βλέπετε την Εθνική Τράπεζα; Εκεί είναι.  \n**Βέρα:** Ευχαριστώ.\n\n*Συννεφάκι δίπλα στον διάλογο:* **Ο Μάρκος μιλάει ελληνικά. Μάρκο!**\n\n---\n\n## Πώς το λένε;\n\n*Κίτρινο πλαίσιο, εικονίδιο κλειδιού.*\n\n- Ψάχνω τον κινηματογράφο.  \n- Βλέπετε την τράπεζα;  \n- Ξέρετε το πάρκο Ελευθερίας;\n\n---\n\n### Μπλε «σημείωμα»\n\n– Δεν καταλαβαίνω ελληνικά. Μιλάτε ισπανικά;  \n– Λίγο.  \n– Όχι, καθόλου.  \n– Ναι, μιλάω.\n\n---\n```\n\n*Роль А (первая линия в A27):* Дорога к парку, уточнение языков, кинотеатр — только реплики из цитаты.\n\n*Роль Б (вторая и третья линии):* Ответы и перевод на говорящего по-гречески — по репликам из цитаты.\n\n*Чек-фразы:* списки и синий блок во второй части цитаты; артикли в вопросах — как в оцифровке.\n\n---\n\n#### Ситуация 2 — Спряжение «говорю» и короткие обмены\n\n*Контекст:* Таблица **Για δες** со спряжением и цветные мини-диалоги про языки.\n\n```text\n## Για δες\n\n*Εικονίδιο μεγεθυντικού φακού.*\n\n### Τύπος Β1 — **μιλάω**\n\n| μιλάω (μιλώ) | -άω, -ώ |\n|--------------|---------|\n| μιλάς | -άς |\n| μιλάει (μιλά) | -άει, -ά |\n| μιλάμε | -άμε |\n| μιλάτε | -άτε |\n| μιλάνε (μιλούν) | -άνε, -ούν |\n\n---\n\n### Διάλογοι *(δύο χρωματιστά κουτιά)*\n\n**Κίτρινο**\n\n– Μιλάς ρωσικά;  \n– Ναι, είμαι Ρωσίδα. Εσύ μιλάς ιταλικά;  \n– Ναι, είμαι Ιταλός.\n\n**Πράσινο**\n\n– Μιλάς ισπανικά;  \n– Όχι.  \n– Όχι, δε μιλάω ισπανικά.\n\n---\n```\n\n*Роль А:* Вопросы «ты говоришь на …?» по жёлтому и зелёному блокам — дословно из цитаты.\n\n*Роль Б:* Короткие ответы и отрицания — только формы из цитаты.\n\n*Чек-фразы:* строки таблицы спряжения и обе цветные цепочки.\n\n---\n\n#### Ситуация 3 — После занятий: происхождение и языки\n\n*Контекст:* Диалог **A28**, три фразы **Πώς το λένε;** и таблицы национальностей и языков.\n\n```text\n### A28 — στο μάθημα\n\n**Νίκος:** Μιλάς πολύ καλά ελληνικά. Από πού είσαι;  \n**Μάρκος:** Είμαι Αυστραλός, αλλά η μητέρα μου είναι Ελληνίδα. Με λένε Μάρκο. Από 'δώ είναι ο Λαφάου. Είναι Ιρακινός.  \n**Νίκος:** Χαίρω πολύ, Λαφάου.  \n**Λαφάου:** Κι εγώ.  \n**Μάρκος:** Ο Λαφάου καταλαβαίνει ελληνικά, αλλά δε μιλάει τόσο καλά. Μιλάει αγγλικά, ιταλικά και αραβικά.\n\n---\n\n## Πώς το λένε;\n\n*Εικονίδιο κλειδιού· τρία ανοιχτό πράσινα/κίτρινα «συννεφάκια»:*\n\n1. Είμαι Αυστραλός και η μητέρα μου Ελληνίδα.\n2. Εγώ είμαι Ιρακινός.\n3. Μιλάω πολύ καλά ελληνικά. Καταλαβαίνω ελληνικά, αλλά δε μιλάω τόσο καλά.\n\n---\n\n## Για δες\n\n*Εικονίδιο μεγεθυντικού φακού· πράσινα φόντα, δομή «Είμαι» / «Μιλάω».*\n\n### Είμαι … (υπηκοότητα)\n\n| Ομάδα | Αρσενικό / θηλυκό                                                                                                    |\n|-------|----------------------------------------------------------------------------------------------------------------------|\n| 1     | Έλληνας / Ελληνίδα · Ισπανός / Ισπανίδα · Ρώσος / Ρωσίδα · Ελβετός / Ελβετίδα                                        |\n| 2     | Αυστραλός / Αυστραλέζα · Πολωνός / Πολωνή, Πολωνέζα · Σουηδός / Σουηδέζα · Κινέζος / Κινέζα · Γιαπωνέζος / Γιαπωνέζα |\n| 3     | Αλβανός / Αλβανή, Αλβανίδα · Ουκρανός / Ουκρανή · Ιρακινός / Ιρακινή                                                 |\n| 4     | Αιγύπτιος / Αιγύπτια · Βούλγαρος / Βουλγάρα · Τούρκος / Τουρκάλα                                                     |\n\n### Μιλάω … (γλώσσα)\n\n| Ομάδα | Γλώσσες                                                                |\n|-------|------------------------------------------------------------------------|\n| 1     | ελληνικά · ισπανικά · ρωσικά (ρώσικα) · γερμανικά, γαλλικά και ιταλικά |\n| 2     | αγγλικά · πολωνικά · σουηδικά · κινέζικα · γιαπωνέζικα                 |\n| 3     | αλβανικά · ουκρανικά · αραβικά                                         |\n| 4     | αραβικά · βουλγαρικά (βουλγάρικα) · τουρκικά                           |\n\n---\n```\n\n*Роль А (первая линия в A28):* Комплимент за греческий, вопрос об происхождении — по тексту.\n\n*Роль Б (остальные реплики):* Представление и комментарий о языках третьего лица — по цитате.\n\n*Чек-фразы:* три нумерованные фразы во второй части и обе зелёные таблицы.\n\n---\n\n#### Ситуация 4 — Насколько хорошо: пример, шкала, микрофон\n\n*Контекст:* Открытый пример предложения, шкала степеней и задание **3 Απαντώ**.\n\n```text\n### Παράδειγμα πρότασης *(ανοιχτό μπλε πλαίσιο)*\n\nΜιλάω ρωσικά **πολύ καλά**, γαλλικά **αρκετά καλά**, αγγλικά **καλά** και **λίγο** αραβικά. Ελληνικά **δε μιλάω τόσο\nκαλά** και γερμανικά **δε μιλάω καθόλου**.\n\n---\n\n### Κλίμακα επάρκειας *(έξι σκίτσα με βιβλία)*\n\n1. **πολύ καλά**\n2. **αρκετά καλά**\n3. **καλά**\n4. **λίγο**\n5. **όχι και τόσο καλά**\n6. **καθόλου**\n\n---\n\n## Η σειρά μου τώρα\n\n### 3 Απαντώ:\n\n*Εικονίδιο μικροφώνου.*\n\nΕίσαι Έλληνας / Ελληνίδα; Μιλάς ελληνικά / αλβανικά / γερμανικά / αγγλικά / κινέζικα;\n\n---\n```\n\n*Роль А:* Вопросы из списка с пиктограммой микрофона — как в цитате.\n\n*Роль Б:* Краткие ответы; при необходимости добавляйте ступень ясности из нумерованной шкалы в цитате.\n\n*Чек-фразы:* нумерация шкалы и строки задания **3**.\n\n---\n\n#### Ситуация 5 — Кто это: пример и таблица профилей\n\n*Контекст:* Пример **4 Μιλάω για κάποιον** (Σβέτα) и блок **8** с образцом диалога и таблицей **Προφίλ**.\n\n```text\n### 4 Μιλάω για κάποιον, όπως στο παράδειγμα:\n\n*Εικονίδιο τριών προσώπων.*\n\n**Παράδειγμα:** Η Σβέτα είναι Ουκρανή. Μιλάει ουκρανικά και ρωσικά πολύ καλά, γερμανικά αρκετά καλά και λίγο ελληνικά.\n\n---\n\n## 8 Ποιος είναι; Τι δουλειά κάνει; Τι γλώσσα μιλάει;\n\n### Παράδειγμα διαλόγου\n\n– Ποια είναι αυτή;  \n– Είναι η Βέρα.  \n– Είναι Ελληνίδα;  \n– Όχι. Είναι Βουλγάρα.  \n– Τι γλώσσα μιλάει;  \n– Μιλάει βουλγαρικά, αγγλικά και ελληνικά.  \n– Δουλεύει;  \n– Ναι. Είναι κομμώτρια.\n\n### Προφίλ *(κουτιά με εικόνες)*\n\n| Όνομα                           | Στοιχεία                                                         |\n|---------------------------------|------------------------------------------------------------------|\n| **Βέρα** *(ανοιχτό πράσινο)*    | Βουλγάρα · βουλγαρικά / αγγλικά / ελληνικά · κομμώτρια           |\n| **Νίκος** *(ανοιχτό μπλε)*      | Έλληνας · ελληνικά / αγγλικά / γαλλικά / ισπανικά · καθηγητής    |\n| **Μελέκ**                       | Τουρκάλα · τουρκικά / ελληνικά / αγγλικά / γερμανικά · φοιτήτρια |\n| **Πάμπλο** *(κίτρινο)*          | Ισπανός · ισπανικά / αραβικά / λίγο ελληνικά · άνεργος           |\n| **Φου** *(πορτοκαλί)*           | Κινέζος · κινέζικα / ελληνικά · μάγειρας                         |\n| **Λι** *(κόκκινο/ροζ)*          | Κινέζα · κινέζικα / αγγλικά / ελληνικά · πωλήτρια                |\n| **Μαρίνα** *(ανοιχτό τιρκουάζ)* | Ελληνίδα · ελληνικά / αγγλικά · κτηνίατρος                       |\n| **Ερβίν** *(ανοιχτό γκρι–μπλε)* | Αλβανός · αλβανικά / αγγλικά, λίγο ελληνικά · ξυλουργός          |\n| **Παναγιώτης** *(μπεζ)*         | Έλληνας · ελληνικά / αγγλικά · έχει ένα καφενείο                 |\n| **Αρλέτα** *(κίτρινο)*          | Αλβανίδα · αλβανικά / ελληνικά / ιταλικά · γυμνάστρια            |\n```\n\n*Роль А:* Опишите выбранного человека из таблицы: происхождение, языки, работа — только лексика из цитаты.\n\n*Роль Б:* Вопросы как в образцовом диалоге блока **8** — по формулировкам из цитаты.\n\n*Чек-фразы:* образец про Σβέτα, реплики **8** и строки таблицы **Προφίλ**.\n\n---\n\n#### Ситуация 6 — Винительный падеж в речи\n\n*Контекст:* Разворот **Για δες** с вопросами в αιτιατική и таблица местоимений объекта.\n\n```text\n## Για δες *(μεγεθυντικός φακός)*\n\n### Αρσενικά (-ος, -ης)\n\n| Ερωτήσεις (αιτιατική) | Προτάσεις (ονομαστική) |\n|------------------------|-------------------------|\n| Ξέρεις **τον** Πέτρο; **τον** Κώστα; **τον** Γιάννη; | **Ο** Πέτρος είναι φίλος μου. **Ο** Κώστας είναι φίλος μου. **Ο** Γιάννης είναι φίλος μου. |\n| Βλέπεις **τον** κινηματογράφο; Ψάχνεις **τον** σταθμό; Καταλαβαίνεις **τον** καθηγητή σου; | **Ο** κινηματογράφος είναι εκεί. **Ο** σταθμός είναι εδώ. **Ο** καθηγητής μου μιλάει ελληνικά. |\n\n### Θηλυκά (-α, -η)\n\n| Ερωτήσεις | Προτάσεις |\n|-----------|-----------|\n| Ξέρεις **την** Κατερίνα; **την** Ελένη; | **Η** Κατερίνα είναι φίλη μου. **Η** Ελένη είναι φίλη μου. |\n| Βλέπεις **την** τράπεζα; Ψάχνεις **τη** στάση; Καταλαβαίνεις **την** καθηγήτρια; | **Η** τράπεζα είναι εκεί. **Η** στάση είναι εδώ. **Η** καθηγήτρια μιλάει ελληνικά. |\n\n### Ουδέτερα (-ο, -ι, -μα)\n\n| Ερωτήσεις | Προτάσεις |\n|-----------|-----------|\n| Ξέρεις **το** Ηράκλειο; **το** Μοναστηράκι; **το** Πανόραμα; | **Το** Ηράκλειο είναι στην Κρήτη. **Το** Μοναστηράκι είναι στην Αθήνα. **Το** Πανόραμα είναι στη Θεσσαλονίκη. |\n| Ψάχνεις **το** μετρό; Βλέπεις **το** σπίτι μου; Καταλαβαίνεις **το** μάθημα; | **Το** μετρό είναι εκεί. **Το** σπίτι μου είναι εδώ. **Το** μάθημα είναι δύσκολο. |\n\n---\n\n### Αντωνυμίες αντικειμένου\n\n| Ερώτηση | Θετική απάντηση | Αρνητική απάντηση |\n|---------|-----------------|-------------------|\n| Ξέρεις τον Βασίλη; | Ναι, **τον** ξέρω. | Όχι, δεν **τον** ξέρω. |\n| Ξέρεις την Άννα; | Ναι, **την** ξέρω. | Όχι, δεν **την** ξέρω. |\n| Ξέρεις το τηλέφωνό μου; | Ναι, **το** ξέρω. | Όχι, δεν **το** ξέρω. |\n\n---\n```\n\n*Роль А:* Вопросы из левых колонок таблиц — дословно из цитаты.\n\n*Роль Б:* Утвердительные и отрицательные ответы — по нижней таблице в цитате.\n\n*Чек-фразы:* формы с артиклями и местоимениями, как выделено в оцифровке.\n\n\n### Блок 2: Шпаргалка для диалогов (фразы-клише)\n\n*Срезы: оба блока **Πώς το λένε;**, мини-диалоги про языки, шкала, задание **3**.*\n\n```text\n## Πώς το λένε;\n\n*Κίτρινο πλαίσιο, εικονίδιο κλειδιού.*\n\n- Ψάχνω τον κινηματογράφο.  \n- Βλέπετε την τράπεζα;  \n- Ξέρετε το πάρκο Ελευθερίας;\n\n---\n\n### Μπλε «σημείωμα»\n\n– Δεν καταλαβαίνω ελληνικά. Μιλάτε ισπανικά;  \n– Λίγο.  \n– Όχι, καθόλου.  \n– Ναι, μιλάω.\n\n---\n\n## Πώς το λένε;\n\n*Εικονίδιο κλειδιού· τρία ανοιχτό πράσινα/κίτρινα «συννεφάκια»:*\n\n1. Είμαι Αυστραλός και η μητέρα μου Ελληνίδα.\n2. Εγώ είμαι Ιρακινός.\n3. Μιλάω πολύ καλά ελληνικά. Καταλαβαίνω ελληνικά, αλλά δε μιλάω τόσο καλά.\n\n---\n\n### Διάλογοι *(δύο χρωματιστά κουτιά)*\n\n**Κίτρινο**\n\n– Μιλάς ρωσικά;  \n– Ναι, είμαι Ρωσίδα. Εσύ μιλάς ιταλικά;  \n– Ναι, είμαι Ιταλός.\n\n**Πράσινο**\n\n– Μιλάς ισπανικά;  \n– Όχι.  \n– Όχι, δε μιλάω ισπανικά.\n\n---\n\n### Κλίμακα επάρκειας *(έξι σκίτσα με βιβλία)*\n\n1. **πολύ καλά**\n2. **αρκετά καλά**\n3. **καλά**\n4. **λίγο**\n5. **όχι και τόσο καλά**\n6. **καθόλου**\n\n---\n\n## Η σειρά μου τώρα\n\n### 3 Απαντώ:\n\n*Εικονίδιο μικροφώνου.*\n\nΕίσαι Έλληνας / Ελληνίδα; Μιλάς ελληνικά / αλβανικά / γερμανικά / αγγλικά / κινέζικα;\n\n---\n```\n\n### Блок 3: Тематический словарь (таблицы и образцы)\n\n*Фрагменты оцифровки: спряжение, национальности и языки, профили, винительный падеж.*\n\n#### Личные формы глагола (таблица в **Για δες**)\n\n```text\n## Για δες\n\n*Εικονίδιο μεγεθυντικού φακού.*\n\n### Τύπος Β1 — **μιλάω**\n\n| μιλάω (μιλώ) | -άω, -ώ |\n|--------------|---------|\n| μιλάς | -άς |\n| μιλάει (μιλά) | -άει, -ά |\n| μιλάμε | -άμε |\n| μιλάτε | -άτε |\n| μιλάνε (μιλούν) | -άνε, -ούν |\n\n---\n```\n\n#### Ομάδες: национальности и языки\n\n```text\n## Για δες\n\n*Εικονίδιο μεγεθυντικού φακού· πράσινα φόντα, δομή «Είμαι» / «Μιλάω».*\n\n### Είμαι … (υπηκοότητα)\n\n| Ομάδα | Αρσενικό / θηλυκό                                                                                                    |\n|-------|----------------------------------------------------------------------------------------------------------------------|\n| 1     | Έλληνας / Ελληνίδα · Ισπανός / Ισπανίδα · Ρώσος / Ρωσίδα · Ελβετός / Ελβετίδα                                        |\n| 2     | Αυστραλός / Αυστραλέζα · Πολωνός / Πολωνή, Πολωνέζα · Σουηδός / Σουηδέζα · Κινέζος / Κινέζα · Γιαπωνέζος / Γιαπωνέζα |\n| 3     | Αλβανός / Αλβανή, Αλβανίδα · Ουκρανός / Ουκρανή · Ιρακινός / Ιρακινή                                                 |\n| 4     | Αιγύπτιος / Αιγύπτια · Βούλγαρος / Βουλγάρα · Τούρκος / Τουρκάλα                                                     |\n\n### Μιλάω … (γλώσσα)\n\n| Ομάδα | Γλώσσες                                                                |\n|-------|------------------------------------------------------------------------|\n| 1     | ελληνικά · ισπανικά · ρωσικά (ρώσικα) · γερμανικά, γαλλικά και ιταλικά |\n| 2     | αγγλικά · πολωνικά · σουηδικά · κινέζικα · γιαπωνέζικα                 |\n| 3     | αλβανικά · ουκρανικά · αραβικά                                         |\n| 4     | αραβικά · βουλγαρικά (βουλγάρικα) · τουρκικά                           |\n\n---\n```\n\n#### Προφίλ — имена, языки, работа\n\n```text\n### Προφίλ *(κουτιά με εικόνες)*\n\n| Όνομα                           | Στοιχεία                                                         |\n|---------------------------------|------------------------------------------------------------------|\n| **Βέρα** *(ανοιχτό πράσινο)*    | Βουλγάρα · βουλγαρικά / αγγλικά / ελληνικά · κομμώτρια           |\n| **Νίκος** *(ανοιχτό μπλε)*      | Έλληνας · ελληνικά / αγγλικά / γαλλικά / ισπανικά · καθηγητής    |\n| **Μελέκ**                       | Τουρκάλα · τουρκικά / ελληνικά / αγγλικά / γερμανικά · φοιτήτρια |\n| **Πάμπλο** *(κίτρινο)*          | Ισπανός · ισπανικά / αραβικά / λίγο ελληνικά · άνεργος           |\n| **Φου** *(πορτοκαλί)*           | Κινέζος · κινέζικα / ελληνικά · μάγειρας                         |\n| **Λι** *(κόκκινο/ροζ)*          | Κινέζα · κινέζικα / αγγλικά / ελληνικά · πωλήτρια                |\n| **Μαρίνα** *(ανοιχτό τιρκουάζ)* | Ελληνίδα · ελληνικά / αγγλικά · κτηνίατρος                       |\n| **Ερβίν** *(ανοιχτό γκρι–μπλε)* | Αλβανός · αλβανικά / αγγλικά, λίγο ελληνικά · ξυλουργός          |\n| **Παναγιώτης** *(μπεζ)*         | Έλληνας · ελληνικά / αγγλικά · έχει ένα καφενείο                 |\n| **Αρλέτα** *(κίτρινο)*          | Αλβανίδα · αλβανικά / ελληνικά / ιταλικά · γυμνάστρια            |\n```\n\n#### Αιτιατική — вопросы и местоимения объекта\n\n```text\n## Για δες *(μεγεθυντικός φακός)*\n\n### Αρσενικά (-ος, -ης)\n\n| Ερωτήσεις (αιτιατική) | Προτάσεις (ονομαστική) |\n|------------------------|-------------------------|\n| Ξέρεις **τον** Πέτρο; **τον** Κώστα; **τον** Γιάννη; | **Ο** Πέτρος είναι φίλος μου. **Ο** Κώστας είναι φίλος μου. **Ο** Γιάννης είναι φίλος μου. |\n| Βλέπεις **τον** κινηματογράφο; Ψάχνεις **τον** σταθμό; Καταλαβαίνεις **τον** καθηγητή σου; | **Ο** κινηματογράφος είναι εκεί. **Ο** σταθμός είναι εδώ. **Ο** καθηγητής μου μιλάει ελληνικά. |\n\n### Θηλυκά (-α, -η)\n\n| Ερωτήσεις | Προτάσεις |\n|-----------|-----------|\n| Ξέρεις **την** Κατερίνα; **την** Ελένη; | **Η** Κατερίνα είναι φίλη μου. **Η** Ελένη είναι φίλη μου. |\n| Βλέπεις **την** τράπεζα; Ψάχνεις **τη** στάση; Καταλαβαίνεις **την** καθηγήτρια; | **Η** τράπεζα είναι εκεί. **Η** στάση είναι εδώ. **Η** καθηγήτρια μιλάει ελληνικά. |\n\n### Ουδέτερα (-ο, -ι, -μα)\n\n| Ερωτήσεις | Προτάσεις |\n|-----------|-----------|\n| Ξέρεις **το** Ηράκλειο; **το** Μοναστηράκι; **το** Πανόραμα; | **Το** Ηράκλειο είναι στην Κρήτη. **Το** Μοναστηράκι είναι στην Αθήνα. **Το** Πανόραμα είναι στη Θεσσαλονίκη. |\n| Ψάχνεις **το** μετρό; Βλέπεις **το** σπίτι μου; Καταλαβαίνεις **το** μάθημα; | **Το** μετρό είναι εκεί. **Το** σπίτι μου είναι εδώ. **Το** μάθημα είναι δύσκολο. |\n\n---\n\n### Αντωνυμίες αντικειμένου\n\n| Ερώτηση | Θετική απάντηση | Αρνητική απάντηση |\n|---------|-----------------|-------------------|\n| Ξέρεις τον Βασίλη; | Ναι, **τον** ξέρω. | Όχι, δεν **τον** ξέρω. |\n| Ξέρεις την Άννα; | Ναι, **την** ξέρω. | Όχι, δεν **την** ξέρω. |\n| Ξέρεις το τηλέφωνό μου; | Ναι, **το** ξέρω. | Όχι, δεν **το** ξέρω. |\n\n---\n```\n";

    document.getElementById("prompt-block").textContent = VOICE_PROMPT;

      document.getElementById("essence-render").innerHTML = "<pre>" + SOURCE_MD.replace(/</g, "&lt;") + "</pre>";

    document.getElementById("copy-all").addEventListener("click", async () => {
      const text = VOICE_PROMPT + "\n\n---\n\n" + SOURCE_MD;
      try {
        await navigator.clipboard.writeText(text);
        const el = document.getElementById("copy-feedback");
        el.textContent = "Скопировано.";
        setTimeout(() => { el.textContent = ""; }, 2500);
      } catch (e) {
        alert("Не удалось скопировать: " + e);
      }
    });
