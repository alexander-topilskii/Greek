  <script>
    const VOICE_PROMPT = "Ρόλος:\nΕίσαι ένας αυστηρός, λακωνικός και ενεργητικός καθηγητής ελληνικών για ηχητική εξάσκηση (Voice Mode). Ο μαθητής σου είναι ρωσόφωνος. Ο στόχος σου είναι να με βοηθήσεις να μάθω και να εμπεδώσω το υλικό από τις επισυναπτόμενες σημειώσεις. Πρέπει να υποθέσεις ότι δεν βλέπω τις σημειώσεις και δεν τις ξέρω απ' έξω. Το έργο σου είναι να μου υπενθυμίζεις τμηματικά λέξεις/κανόνες και να τους εξασκούμε αμέσως μέσω διαλόγου.\n\nПравила обучения (КРИТИЧЕСКИ ВАЖНО):\n\nОт простого к сложному: Фокусируйся на целых предложениях. Выбери конструкцию из конспекта (например, глагол έχω), попроси перевести простое предложение (например, У меня есть машина). Справился — дай предложение сложнее.\nКраткая обратная связь: Похвала допускается, но строго 1-2 слова (например, «Μπράβο», «Πολύ καλά»). Ответил верно — коротко подтверди («Ναι» / «Σωστά») или похвали, повтори правильную фразу, и сразу дай следующее задание.\nЖесткая отработка ошибок: Если я ошибся, алгоритм строго такой:\nСкажи «Όχι» (Нет) или «Λάθος» (Ошибка) и произнеси правильный вариант.\nСразу скажи «Επανάλαβε» (Повтори).\nДождись, пока я произнесу правильно.\nСразу после этого дай мне новое, похожее предложение на это же правило для закрепления.\nОтложенное повторение: Запомни предложение, в котором я допустил ошибку. Задай мне 2-3 других вопроса по конспекту, а затем внезапно снова попроси перевести то самое первоначальное предложение, чтобы проверить, не забыл ли я правильный вариант. Если я дал правильный ответ - больше не повторяем.\nПорционность: Не вываливай весь конспект. Напомнил одно правило/слово -> отработали на 3-4 предложениях -> перешли к следующему.\nНе говори за меня: Если я просто молчу или застрял, дай короткую подсказку (назови первое слово), но не выдавай ответ целиком, пока я не скажу: «Скажи ответ» или «Πες μου την απάντηση».\n\nГибкость к запросам: Ты всегда прислушиваешься к моим просьбам. Если в процессе урока я прошу изменить формат, объяснить, пропустить тему или делать что-то по-новому — ты должен сразу согласиться и подстроиться без лишних вопросов. \nСпецифика ГОЛОСОВОГО режима:\n- Ультра-краткость: Твои реплики должны состоять максимум из 1-2 предложений.\n- Один шаг за один раз: Никогда не задавай два вопроса подряд. Задал вопрос на перевод — замолчи и жди моего ответа.\n- Никакого форматирования в твоих ответах: Не генерируй списки, тире, скобки. Твоя речь должна быть абсолютно естественной для восприятия на слух.\n- Бесшовность: Никаких мета-фраз вроде «Идем дальше?», «Давай продолжим».\n\n\n\nВАЖНО: твой ученик говорит по русски. Формулируй задания, фразы, объяснения на русском языке. \nВАЖНО: активно используй слова из \"Итоговая таблица лексики урока\" при построении предложений.\nВАЖНО: когда ученик закрепит отдельные фразы - переходи к общению по ролям. Проведи с учеником диалог и проверь как он импровизирует с использованием выученных слов и фраз. Используй предложенные диалоги как каркас для отрбаотки.\nВАЖНО: не подсказывай перевод перед заданием.";
    const SOURCE_MD = "# 💎 Урок 6 — суть: «Πού πάτε;» — транспорт, билеты, время (стр. 66–79)\n\n**[🏠 Readme](../../../../Readme.md) → [📘 book/pages](../../) → [📚 content_6.md](../content_6.md) → 📄 `essence_6/essence_6.md`**\n\n*Шестая единица **«Ελληνικά Α'»** («**Πού πάτε;**»). Материал **самодостаточен** для повторения: правила, фразы,\nэталоны, словарь. **Порядок:** цели → грамматика → фразы и диалоги → эталоны → словарь.*\n\n| ⚡ Быстрые ссылки       |                                                                               |\n|------------------------|-------------------------------------------------------------------------------|\n| 📚 Страницы со сканами | [content_6.md](../content_6.md)                                                  |\n| 🖼 Диапазон            | стр. 66–79                                                                    |\n| 📘 Рядом по курсу      | [essence_5](../../lesson_5/essence_5/essence_5.md) · [essence_7](../../lesson_7/essence_7/essence_7.md) |\n\n## 📌 Тема и цели\n\n- Спрашивать и отвечать, **куда идёт транспорт** (**Πού πάει το τρόλεϊ;**), **как часто** (**Κάθε πότε περνάει;**).\n- Говорить **на чём еду** (**Πάω με το μετρό / με το λεωφορείο** …) и **куда** (**Πάω στο κέντρο / στην Κυψέλη** …).\n- Покупать **εισιτήριο**, спрашивать цену (**Πόσο κάνει;** / **Κοστίζει …**), ориентироваться во **времени** (**Τι ώρα\n  είναι;**).\n- Повторить предлоги **με, σε, για, από** с артиклями; глаголы **θέλω**, **περνάω**, **αργώ** в теме урока.\n\n### Сводка темы (стр. 66)\n\n| Слева                               | Справа                           |\n|-------------------------------------|----------------------------------|\n| **Πάω με το λεωφορείο.**            | **Τι ώρα είναι;**                |\n| **Θέλω ένα εισιτήριο. Πόσο κάνει;** | **πάω**                          |\n|                                     | **με, σε, για, ως, μέχρι, παρά** |\n\n## 🧠 Грамматика и правила\n\n### Глагол **πηγαίνω / πάω** (настоящее)\n\n| лицо       | πηγαίνω    | πάω  |\n|------------|------------|------|\n| εγώ        | πηγαίνω    | πάω  |\n| εσύ        | πηγαίνεις  | πας  |\n| αυτός/ή/ό  | πηγαίνει   | πάει |\n| εμείς      | πηγαίνουμε | πάμε |\n| εσείς      | πηγαίνετε  | πάτε |\n| αυτοί/ές/ά | πηγαίνουν  | πάνε |\n\n*Примеры:* **Πάω στο κέντρο.** **Πάω στο περίπτερο για εισιτήριο.**\n\n### **σε + артикль → στον / στην / στο**\n\n**Πάω στον Πειραιά / στην Κυψέλη / στο κέντρο.**\n\n### Средство и маршрут\n\n- **με + το …** — **με το τρόλεϊ**, **με το μετρό**, **με το λεωφορείο**, **με το τραμ**, **με το ταξί**, **με το\n  αεροπλάνο**, **με το τρένο**, **με το ποδήλατο**, **με τη μηχανή**, **με τον ηλεκτρικό**, **με τα πόδια**.\n- **για + …** — остановка назначения: **για τη Δάφνη**, **για το Νέο Φάληρο**.\n- **από + …** — «проезжает мимо»: **περνάει από το Σύνταγμα**, **από την Ομόνοια**.\n- **Με ποιον / Με ποια μένεις;** — **Με τον Πέτρο.** **Με την Αγγελική.**\n\n### Глагол **θέλω** (тип Α)\n\nθέλω, θέλεις, θέλει, θέλουμε, θέλετε, θέλουν(ε) — **Θέλω ένα εισιτήριο με επιστροφή.**\n\n### Глагол **περνάω / περνώ** (тип Β1)\n\n**Το τρόλεϊ περνάει από το κέντρο.** **Κάθε πότε περνάει;**\n\n### Глагол **αργώ** (тип Β2)\n\n**Αργεί το επόμενο;** — **Τα λεωφορεία αργούν.**\n\n### Время\n\n**Типичные ответы (стр. 72):**\n\n| Время | По-гречески                   |\n|-------|-------------------------------|\n| 1:00  | **Είναι μία ακριβώς.**        |\n| 1:15  | **Είναι μία και τέταρτο.**    |\n| 3:30  | **Είναι τρεις και μισή.**     |\n| 2:45  | **Είναι τρεις παρά τέταρτο.** |\n| 2:55  | **Είναι τρεις παρά πέντε.**   |\n\n**«В … часов»:** **Στη μία …**, **στις τρεις …**, **στις τέσσερις …**  \nПример: **Στις τρεις είμαι στο μάθημα ελληνικών.**\n\n**Части суток** (часто с **το**): **το πρωί**, **το μεσημέρι**, **το απόγευμα**, **το βράδυ**, **τη νύχτα**  \nПример: **Φεύγει στις 7:00 το απόγευμα.**\n\n*(Ориентир по интервалам: πρωί ~5–12, μεσημέρι ~12–15, απόγευμα ~15–19, βράδυ ~19–24, νύχτα ~24–5.)*\n\n### Глаголы движения в репликах урока\n\n**φεύγω, φτάνω, ξεκινάω, σταματάω, κατεβαίνω, κοστίζω, προτιμώ** — встречаются в диалогах и упражнениях; спряжение по\nуже известным типам **Α** / **Β1** / **Β2**.\n\n## 💬 Готовые фразы и диалоги\n\n### «Πώς το λένε;» (стр. 67)\n\n|                                       |                                  |\n|---------------------------------------|----------------------------------|\n| **Με συγχωρείτε, εδώ είναι η στάση;** | **Κάθε πότε περνάει το τρόλεϊ;** |\n| **Πού πάει το τρόλεϊ;**               | **Μήπως έχετε εισιτήρια;**       |\n| **Πάω στο κέντρο.**                   | **Πόσο κάνει;**                  |\n| **Το τρόλεϊ περνάει από το κέντρο.**  | **Τι ώρα είναι;**                |\n| **Πάω με το τρόλεϊ.**                 |                                  |\n\n### Диалог **A35** — у остановки и в киоске (стр. 67)\n\n**Πάμπλο:** Με συγχωρείτε, εδώ είναι η στάση για το τρόλεϊ;  \n**Μια κυρία:** Ναι, εδώ.  \n**Πάμπλο:** Πού πηγαίνει;  \n**Μια κυρία:** Στην Κυψέλη.  \n**Πάμπλο:** Σίγουρα;  \n**Μια κυρία:** Σίγουρα. Κάθε μέρα πάω στην Κυψέλη με το τρόλεϊ.  \n**Πάμπλο:** Αλλά… Δεν περνάει από το κέντρο;  \n**Μια κυρία:** Ναι. Το 2 σταματάει στο Σύνταγμα.  \n**Πάμπλο:** Εντάξει λοιπόν. Πάω στο περίπτερο για εισιτήριο.\n\n**Πάμπλο:** Παρακαλώ, ένα εισιτήριο για το τρόλεϊ.  \n**Περιπτεράς:** Ορίστε.  \n**Πάμπλο:** Πόσο κάνει;  \n**Περιπτεράς:** Ένα ευρώ.  \n**Πάμπλο:** Μήπως έχετε και για το μετρό;  \n**Περιπτεράς:** Ναι. Είναι το ίδιο εισιτήριο για το μετρό, το λεωφορείο, το τρόλεϊ, το τραμ.  \n**Πάμπλο:** Ωχ, πάει το τρόλεϊ! Και τώρα; Αργεί το επόμενο; Κάθε πότε περνάει;  \n**Περιπτεράς:** Κάθε 10, 15, 20 λεπτά…  \n**Πάμπλο:** Κατάλαβα… Τι ώρα είναι τώρα;  \n**Περιπτεράς:** Οχτώ και δέκα.  \n**Πάμπλο:** Ευχαριστώ.\n\n### Диалог **A36** — в туристическом бюро (стр. 70)\n\n**Υπάλληλος:** Καλημέρα σας.\n\n**Μελέκ:** Καλημέρα. Θέλω ένα εισιτήριο με επιστροφή για Κωνσταντινούπολη.\n\n**Υπάλληλος:** Με αεροπλάνο, λεωφορείο ή τρένο;\n\n**Μελέκ:** Δεν ξέρω. Τι ώρα φεύγει το λεωφορείο από την Αθήνα;\n\n**Υπάλληλος:** Φεύγει στις 7:00 το απόγευμα και φτάνει στις 3:00 το μεσημέρι.\n\n**Μελέκ:** Και πόσο κάνει;\n\n**Υπάλληλος:** Κάνει… μισό λεπτό… 108 ευρώ με επιστροφή.\n\n**Μελέκ:** Και με τρένο;\n\n**Υπάλληλος:** Δεν έχει τρένο από Αθήνα για Κωνσταντινούπολη. Το τρένο ξεκινάει από τη Θεσσαλονίκη στις 8:00 το βράδυ\nκαι φτάνει στις 7:30 το πρωί. Το εισιτήριο έχει 48 ευρώ.\n\n**Μελέκ:** Το αεροπλάνο πόση ώρα κάνει;\n\n**Υπάλληλος:** Μία ώρα περίπου. Κοστίζει 300 ευρώ.\n\n**Μελέκ:** Μμμ, δεν ξέρω. Προτιμώ το λεωφορείο. Λοιπόν, ένα εισιτήριο με το λεωφορείο για την Πέμπτη.\n\n### «Πώς το λένε;» — билеты и время (стр. 70)\n\n- **Πόσο κάνει το εισιτήριο με το λεωφορείο;** / **με το τρένο;** / **με το αεροπλάνο;**\n- **Κοστίζει …**\n- **Ένα εισιτήριο με επιστροφή.**\n- **Το λεωφορείο ξεκινάει / φεύγει στις … και φτάνει στις …**\n- — **Τι ώρα είναι;** — **Είναι δύο παρά τέταρτο.**\n\n### Образец письма — как добраться до гостя (стр. 76)\n\nКратко: **Σε περιμένω … Η διεύθυνσή μου είναι …** — **πηγαίνει το λεωφορείο …** — **με τον ηλεκτρικό / το μετρό** — *\n*κατεβαίνεις στη στάση …** — **Περνάει κάθε 10–15 λεπτά.**\n\n*(Полный пример в оцифровке — письмо **Εύα** к **Κάρλος** с маршрутом через **Αττική / Ομόνοια**, **μετρό**\nдо **Δάφνη**, **λεωφορείο 111**, остановка **«Σουλίου»**.)*\n\n### Опора для ролей (стр. 75, 1.5)\n\n**Роль А** — клиент: **Θέλω εισιτήρια για …** Спрашивать: как добраться, во сколько отправление, сколько длится путь,\nсколько стоит билет.\n\n**Роль В** — сотрудник бюро: отвечать на вопросы о билетах и расписании.\n\n## 📖 Эталоны для самопроверки\n\n*Готовые формы для сверки — не полный ключ ко всем аудио и длинным цепочкам.*\n\n### Σωστό ή λάθος по **A35** (стр. 68)\n\n| № | Ответ                                                    |\n|---|----------------------------------------------------------|\n| 1 | Λάθος *(ο Πάμπλο περιμένει το τρόλεϊ, όχι το λεωφορείο)* |\n| 2 | Σωστό                                                    |\n| 3 | Σωστό                                                    |\n| 4 | Σωστό                                                    |\n| 5 | Λάθος *(το ίδιο εισιτήριο και για το μετρό)*             |\n| 6 | Λάθος *(ένα ευρώ)*                                       |\n| 7 | Λάθος *(οχτώ και δέκα)*                                  |\n\n### Упр. 6 — **Διαλέγω** по **A36** (стр. 71)\n\n| № | Ответ                         |\n|---|-------------------------------|\n| 2 | **β.** *(το απόγευμα — 7:00)* |\n| 3 | **β.** *(το μεσημέρι — 3:00)* |\n| 4 | **α.** *(300 ευρώ)*           |\n| 5 | **γ.** *(το λεωφορείο)*       |\n\n### Упр. 4 — **πάω** в репликах (стр. 69)\n\n2. **πάμε** *(το πρωί πάμε μαζί για καφέ)*\n3. **πάω** *(εγώ πάω στη δουλειά μου)*\n4. **πάτε** *(Πού πάτε;)*\n5. **πάμε** *(το βράδυ πάμε βόλτα)*\n\n### Упр. 1.3 — цена билета (стр. 74)\n\n*(Образец: **Το τρένο από την Αθήνα ως την Πάτρα κάνει δεκαπέντε ευρώ.**)*\n\n2. **Το αεροπλάνο από την Αθήνα ως την Αλεξανδρούπολη κάνει εκατό είκοσι ευρώ.**\n3. **Το τρένο από τη Θεσσαλονίκη ως τον Βόλο κάνει δεκατρία ευρώ.**\n4. **Το αεροπλάνο από την Αθήνα ως το Κάιρο κάνει διακόσια εβδομήντα τέσσερα ευρώ.**\n5. **Το πλοίο από την Ηγουμενίτσα ως το Μπάρι κάνει πενήντα εννέα ευρώ.**\n6. **Το λεωφορείο από την Πάτρα ως τον Πύργο κάνει οκτώ ευρώ.**\n\n### Упр. 1.9 — ответы по образцу (стр. 77)\n\n2. **Η Σάλι πάει στο σπίτι με τον ηλεκτρικό.**\n3. **Η Ναντίν είναι με τον Αντώνη στο ταξί.**\n4. **Η Μαρίνα μιλάει στον Κοσμά.**\n5. **Το λεωφορείο 856 περνάει από τον Βοτανικό.**\n\n### Упр. 2.0 — отрицательные ответы (стр. 77)\n\n2. **Όχι, περνάει από τον Άγιο Αντώνιο.**\n3. **Όχι, πάω στον Άγιο Δημήτριο.**\n4. **Όχι, περνάει από την πλατεία Δημοκρατίας.**\n5. **Όχι, πάει στο Βόλο.**\n\n## 📇 Словарь урока\n\n### Транспорт и инфраструктура\n\n| ελληνικά               | по-русски              |\n|------------------------|------------------------|\n| η στάση                | остановка              |\n| το τ
