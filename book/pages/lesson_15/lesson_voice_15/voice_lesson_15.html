  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" crossorigin="anonymous"></script>
  <script>
    const VOICE_PROMPT = "Λειτούργησε ως αυστηρός δάσκαλος ελληνικών και συνεργάτης μου για πρακτική εξάσκηση.\n\nЯ новичок в греческом языке, поэтому мета-общение со мной веди на русском. У тебя две основные задачи: разыгрывать со мной диалоги по ролям и строго контролировать мою речь.\n\nПРАВИЛА ИСПРАВЛЕНИЯ ОШИБОК (КРИТИЧЕСКИ ВАЖНО):\n1. Будь максимально краток. Никакой вежливости, похвалы и лишних слов.\n2. Если в моей реплике нет ошибок — ничего не говори вне роли (просто ответь «ОК» или сразу продолжай диалог своей репликой).\n3. Если ты видишь ошибку (в грамматике, лексике, порядке слов) — прерви роль и скажи ТОЛЬКО исправленный вариант. Никаких вступлений вроде «Правильно будет так...» или объяснений.\n4. Переводи фразы на русский язык ТОЛЬКО если я скажу слово «Перевод» или «Translate».\n\nПРАВИЛА РОЛЕВОЙ ИГРЫ:\n1. Я пришлю тебе сценарии (Ситуации). Я всегда играю Роль А, ты всегда играешь Роль Б.\n2. Жди моей первой реплики, не начинай диалог сам (если по сценарию Роль А говорит первой).\n3. Так как я новичок, говори короткими репликами, удобными для восприятия на слух, и используй строго лексику из чек-листа к ситуации. Не усложняй грамматику.\n\nМы будем переходить от одной ситуации к другой по моей команде (например, \"Ситуация 1\").\n\nВот сценарии для нашей практики:\n";
    const SOURCE_MD = "# 🎙 Голосовой урок 15 (по оцифровке главы)\n\n**[🏠 Readme](../../../../Readme.md) → [📚 content_15.md](../content_15.md) → 📄 `lesson_voice_15/voice_lesson_15.md`**\n\n| ⚡ Быстрые ссылки |                                                                     |\n|------------------|---------------------------------------------------------------------|\n| 📚 Урок          | [content_15.md](../content_15.md)                                    |\n| 📄 Оцифровка     | [lesson_15_digitized.md](../lesson_digitized/lesson_15_digitized.md) |\n\n### Блок 1: Коммуникативные ситуации (Ролевые игры)\n\n* **Ситуация 1: «Προθέσεις τόπου» — где что находится**\n* **Контекст:** Цветные блоки с примерами: пекарня, киоск, лампа, «вор» у дома.\n* **Роль А / Б:** По очереди произносите фразы; второй переводит или уточняет место на схеме вслух.\n* 🎯 **Чек-лист для ситуации:**\n  - *δίπλα στο καφενείο.* — Рядом с кафенейоном.\n  - *κοντά στο σχολείο, όχι μακριά από τη στάση.* — Рядом со школой, недалеко от остановки.\n  - *ανάμεσα στο καφενείο και στην ταβέρνα.* — Между кафенейоном и таверной.\n  - *απέναντι από το πάρκο.* — Напротив парка.\n  - *Το περίπτερο είναι **μπροστά από** τον φούρνο.* — Киоск перед пекарней.\n  - *Το σούπερ μάρκετ είναι **πίσω από** το σχολείο.* — Супермаркет за школой.\n  - *Η λάμπα είναι **πάνω από** το γραφείο.* — Лампа над столом.\n  - *Το τηλέφωνο είναι **πάνω στο** γραφείο.* — Телефон на столе.\n  - *Η γάτα είναι **κάτω από** το γραφείο.* — Кошка под столом.\n  - *Ο κλέφτης είναι **έξω από** το σπίτι.* — Вор снаружи дома.\n  - *Ο κλέφτης είναι **μέσα στο** σπίτι.* — Вор внутри дома.\n\n---\n\n* **Ситуация 2: «Ο Κυριάκος» — урок парковки**\n* **Контекст:** Инструктор объясняет Эрвину, как поставить машину; будущее время и команды.\n* **Роль А (Κυριάκος):** Ведите по тексту упражнения 3.\n* **Роль Б (Ερβίν):** Отвечайте коротко, как в оцифровке.\n* 🎯 **Чек-лист для ситуации:**\n  - *Σήμερα, Ερβίν, **θα μάθεις** *(μαθαίνω)* παρκαρίσματα.* — Сегодня выучишь манёвры парковки.\n  - *Όχι! Έφτασε η ώρα. Δύσκολο, ε;* — Уже время. Трудно?\n  - *Καθόλου. Άκου τι … *(κάνω)*. Βλέπεις το κόκκινο αυτοκίνητο δεξιά;* — Слушай, что сделаю… Видишь красную машину справа?\n  - *Το κόκκινο... δεξιά. Α, ναι.* — Красную… справа. А, да.\n  - *… *(σταματάω)* δίπλα του. Ωραία. … *(στρίβω)* το τιμόνι μια φορά δεξιά και … *(βάζω)* όπισθεν. Έτσι. … *(πατάω)* απαλά το γκάζι. Απαλά!* — Остановись рядом… Поверни руль… задняя передача… нажми газ.\n  - *Απαλά.* — Плавно.\n  - *Ναι. Εδώ σταματάς. Σταματάς! Έτσι. Τώρα … *(γυρίζω)* το τιμόνι τέρμα αριστερά. Τέρμα, τέρμα. Αυτό είναι. … *(βάζω)* πρώτη και … *(έρχομαι)* λίγο μπροστά και μετά πάλι όπισθεν και λίγο πίσω. Βλέπεις; Δεν είναι δύσκολο.* — Здесь останавливаешься… Поверни руль до конца влево… первая передача…\n  - *Με δέκα μέτρα χώρο και με τον δάσκαλο δίπλα μου σίγουρα δεν είναι δύσκολο!* — С десятью метрами и учителем рядом точно не сложно!\n  - *Καλά. Θα παρκάρεις μερικές φορές ακόμα και … *(βλέπω)* πόσο απλό είναι. Φύγαμε. Τώρα … *(δοκιμάζω)* αριστερό παρκάρισμα...* — Хорошо. Поставишь ещё несколько раз и увидишь, как это просто…\n\n---\n\n* **Ситуация 3: «Πού είναι τα γατάκια;» — коты и местоимения**\n* **Контекст:** Коты на кухне; подписи к рисунку; пример с личным местоимением в вин. падеже (упр. 5).\n* **Роль А:** Называйте, где кто сидит, по списку имён.\n* **Роль Б:** Отвечайте на вопросы с **τον/την/το**… как в примере.\n* 🎯 **Чек-лист для ситуации:**\n  - *1. Ο Σταχτούλης είναι **μέσα** στην κουζίνα.* — Стахтулис внутри кухни (пример).\n  - ***ΝΑΝΟΥ** — στο ψυγείο*\n  - ***ΜΑΡΔΟΥΚ** — στον νεροχύτη*\n  - ***ΛΟΛΟ** — στην κατσαρόλα*\n  - ***ΣΤΑΧΤΟΥΛΗΣ** — στον πάγκο κουζίνας*\n  - ***ΖΙΖΗΣ** — στα ντουλάπια*\n  - ***ΑΣΤΕΡΩ** — στον φούρνο*\n  - ***ΡΙΡΗ** — κάτω από την καρέκλα*\n  - ***ΠΑΧΟΥΜΗΣ** — στο τραπέζι (πιάτο, ποτήρι)*\n  - ***ΤΙΤΙΚΑ** — πίσω από την πόρτα*\n  - *1. – Απάντησες στον Φώτη; – Ναι, **τον** απάντησα.* — Ты ответил Фотису? — Да, ему ответил (пример).\n\n---\n\n* **Ситуация 4: «Απαντώ στα μηνύματα» — записки и письма**\n* **Контекст:** Электронные письма и записки: книжный магазин, банк, квартира, сюрприз, концерт.\n* **Роль А:** Прочитайте сообщение вслух.\n* **Роль Б:** Ответьте по смыслу или выберите готовый ответ из рамки «Απαντήσεις» (как в учебнике).\n* 🎯 **Чек-лист для ситуации:**\n  - *Μαρία, Από αύριο το βιβλιοπωλείο «Νούφαρο» στην οδό Κουντουριώτου θα έχει τις σημειώσεις για το μάθημα της Ιστορίας. Έχουν 15 ευρώ. Θα περάσω αύριο μετά τις 3:00 και θα πάρω και για σένα. Εντάξει; Νίκος* — Записки к уроку истории; зайду после 15:00; возьму и для тебя.\n  - *Τηλεφώνησε ο Σαμαράς και είπε ότι έβαλε τα λεφτά που περίμενες. Είναι στον λογαριασμό σου από χτες. Θα πας στην Τράπεζα σήμερα; Τα λέμε!* — Самарас положил деньги на счёт; сходить в банк сегодня?\n  - *Νάσο μου, πήρα τις «Μικρές Αγγελίες» και βρήκα ένα καλό διαμέρισμα στα Εξάρχεια. Δυάρι, ρετιρέ, με αυτόνομη θέρμανση και το ενοίκιο νομίζω ότι είναι λογικό. 500 ευρώ. Η αγγελία είναι στην αριστερή στήλη, πάνω πάνω. Τι λες; Θα τηλεφωνήσουμε; Αλίκη* — Квартира в Экзархии; позвоним?\n  - *Αντώνη, Βρήκα εισιτήρια για τη συναυλία. Έμειναν μόνο στα 70 ευρώ, αλλά δε με νοιάζει! Εγώ θα πάω σίγουρα. Τόσα χρόνια περίμενα τη μέρα που θα ’ρθουν. Λοιπόν, αν θέλεις, θα πάρω και για σένα. Περιμένω απάντηση γρήγορα! Ηλίας* — Билеты на концерт; куплю и для тебя.\n  - *1. Στα γενέθλια του καλύτερού μου φίλου; Φυσικά και θα έρθω. Θα φέρω και ποτά. Θέλετε κάτι άλλο;* — Пример ответа (1): на день рождения лучшего друга — конечно приду, принесу напитки.\n\n---\n\n* **Ситуация 5: Миконос, биография, роли**\n* **Контекст:** Статья о Миконосе; фразы из истории для устной перестановки; вопросы «Έχω τον λόγο»; роли гадалки и психолога.\n* **Роль А / Б:** Прочитайте абзацы статьи; расскажите по предложениям из облака; ответьте на вопросы 1.2; разыграйте один из сценариев 1.3 / 14.\n* 🎯 **Чек-лист для ситуации:**\n  - *Η Μύκονος έγινε διάσημη τη δεκαετία του 1950, όταν έφτασαν για διακοπές οι πρώτοι γνωστοί ηθοποιοί, σκηνοθέτες και επιχειρηματίες απ’ όλο τον κόσμο. Ενθουσιασμένοι από την ομορφιά του κυκλαδίτικου τοπίου και της αρχιτεκτονικής του νησιού, έγιναν αμέσως οι καλύτεροι διαφημιστές του.* — Миконос прославился в 1950-х…\n  - *Η Μύκονος έχει υπέροχες παραλίες, πανέμορφη φύση και μοναδική ατμόσφαιρα. Η Λιά, το Καλό Λιβάδι, το Σούπερ Παραντάιζ και ο Πάνορμος είναι μερικές παραλίες που τραβάνε σαν μαγνήτης δεκάδες χιλιάδες τουρίστες κάθε καλοκαίρι. Αν σας αρέσει η ηρεμία, θα βρείτε και ερημικές παραλίες, χωρίς μπαρ και κόσμο, και ήσυχα χωριά. Η Μύκονος είναι η βασίλισσα της νύχτας. Ένα ατελείωτο πάρτι αρχίζει όταν έρχεται ο ταξιδιώτης στο λιμάνι και τελειώνει όταν φεύγει. Αν πάτε καλοκαίρι:* — Пляжи, природа, атмосфера; названия пляжей.\n  - *Θα δείτε οπωσδήποτε το ηλιοβασίλεμα σε ένα από τα μπαρ της Μικρής Βενετίας ή τις παραθαλάσσιες ταβέρνες του Αϊ-Γιάννη στον Ορνό.* — Закат в Малой Венеции или у таверн…\n  - *Θα κάνετε μια ημερήσια εκδρομή στη Δήλο.* — Однодневная поездка на Дилос.\n  - *Η Δήλος είναι ένα μικρό νησάκι-αρχαιολογικό πάρκο. Μικρά καραβάκια φεύγουν καθημερινά από τη Χώρα, την Ελιά και την παραλία Παραντάιζ.* — Дилос — островок-археологический парк; кораблики из Хоры.\n  - *Δε θα κάνετε βόλτα στα σοκάκια της Χώρας Σάββατο βράδυ. Θα έχει τόσο κόσμο, που για 100 μέτρα θα περπατήσετε ίσως και μισή ώρα.* — В субботу вечером в Хоре толпа…\n  - *Θα παρκάρετε 500 μέτρα έξω από τη Χώρα. Δε θα βρείτε πάρκινγκ πιο κοντά στο κέντρο και θα περάσετε όλη την ώρα σας μέσα στο αυτοκίνητο!* — Парковка за 500 м…\n  - *Καλό σας ταξίδι!* — Счастливого пути!\n  - *Τελείωσα τις σπουδές μου το 1998.* — Фрагмент истории (упр. 1).\n  - *Σπούδασα οικονομικά στο Πανεπιστήμιο στη Μόσχα.* — Училась на экономическом в Москве.\n  - *Γεννήθηκα το 1975 στη Ρωσία, σε μια μικρή πόλη κοντά στη Μόσχα.* — Родился(ась) в 1975 в России…\n  - *1. Πού γεννηθήκατε και πού μεγαλώσατε;* — Где вы родились и выросли?\n  - *2. Πού πήγατε σχολείο;* — Где учились в школе?\n  - *3. Όταν τελειώσατε το σχολείο, σπουδάσατε κάτι ή δουλέψατε αμέσως;* — После школы учёба или сразу работа?\n  - *4. Θα αλλάξει κάτι στη ζωή σας σύντομα;* — Скоро что-то изменится в жизни?\n  - *5. Θα αλλάξετε, για παράδειγμα, τόπο κατοικίας; Θα αλλάξετε δουλειά;* — Смените ли город / работу?\n  - *Είμαι το γνωστό μέντιουμ Λάχεσις. Λέω τον καφέ, τα χαρτιά και το χέρι. Ξέρω τα πάντα για το μέλλον! Λέω σ’ όλους τα ίδια, αλλά με ωραίο τρόπο. Ένας κύριος / μια κυρία έρχεται στο γραφείο μου και με ρωτάει για τη ζωή του / της.* — Роль А: медиум Лахесис.\n  - *Τελευταία τα πράγματα στη ζωή μου δεν πάνε πολύ καλά. Έχω προβλήματα με την υγεία μου, ο / η σύζυγός μου ταξιδεύει συνέχεια για δουλειές, η κόρη μου θα δώσει εξετάσεις στο Πανεπιστήμιο και ανησυχώ, ο γιος μου δεν έχει ακόμα δουλειά. Ένας φίλος μου μίλησε για το γνωστό μέντιουμ Λάχεσις.* — Роль Б: клиент с заботами.\n  - *Τον τελευταίο καιρό νιώθω μελαγχολία και πηγαίνω στην / στον ψυχολόγο. Η / Ο ψυχολόγος κάνει διάφορες ερωτήσεις για τη ζωή μου.* — Роль А: меланхолия, визит к психологу.\n  - *Είμαι ψυχολόγος. Ένας κύριος / μια κυρία έρχεται σήμερα στο ιατρείο μου, γιατί νιώθει μελαγχολία. Κάνω ερωτήσεις για τη ζωή και τα προβλήματά του / της.* — Роль Б: психолог задаёт вопросы.\n\n---\n\n### Блок 2: Универсальная шпаргалка (Фразы-клише)\n\n**Предлоги места (фрагмент «Πράσινο» — «Κόκκινο»)**\n\n* **δίπλα στο καφενείο.** — *Рядом с кафенейоном.*\n* **ανάμεσα στο καφενείο και στην ταβέρνα.** — *Между кафенейоном и таверной.*\n* **Το περίπτερο είναι **μπροστά από** τον φούρνο.** — *Перед пекарней.*\n* **Το σούπερ μάρκετ είναι **πίσω από** το σχολείο.** — *За школой.*\n* **Η λάμπα είναι **πάνω από** το γραφείο.** — *Над столом (лампа).*\n* **Η γάτα είναι **κάτω από** το γραφείο.** — *Под столом (кошка).*\n\n**Парковка (Κυριάκος)**\n\n* **Σήμερα, Ερβίν, **θα μάθεις** *(μαθαίνω)* παρκαρίσματα.** — *Сегодня выучишь парковку.*\n* **Με δέκα μέτρα χώρο και με τον δάσκαλο δίπλα μου σίγουρα δεν είναι δύσκολο!** — *С местом и учителем рядом не сложно.*\n\n**Сообщения (θα …)**\n\n* **Θα περάσω αύριο μετά τις 3:00 και θα πάρω και για σένα.** — *Зайду завтра после 15:00 и возьму и для тебя.*\n* **Θα πας στην Τράπεζα σήμερα;** — *Сходишь в банк сегодня?*\n* **Θα τηλεφωνήσουμε;** — *Позвоним?*\n* **Θα πάρω και για σένα.** — *Куплю и для тебя (билеты).*\n\n**Миконос (фрагмент статьи)**\n\n* **Θα δείτε οπωσδήποτε το ηλιοβασίλεμα σε ένα από τα μπαρ της Μικρής Βενετίας ή τις παραθαλάσσιες ταβέρνες του Αϊ-Γιάννη στον Ορνό.** — *Закат, таверны…*\n* **Θα κάνετε μια ημερήσια εκδρομή στη Δήλο.** — *Экскурсия на Дилос.*\n* **Καλό σας ταξίδι!** — *Счастливого пути!*\n\n---\n\n### Блок 3: Тематический словарь\n\n**Предлоги и наречия места**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| δίπλα στο | рядом с |\n| κοντά στο · μακριά από | близко к · далеко от |\n| ανάμεσα στο … και στην | между … и |\n| απέναντι από | напротив |\n| μπροστά από · πίσω από | перед · позади |\n| πάνω από · πάνω στο · κάτω από | над · на (поверх) · под |\n| έξω από · μέσα στο | вне · внутри |\n| μέσα στην κουζίνα | на кухне (внутри) |\n| κάτω από την καρέκλα | под стулом |\n| πίσω από την πόρта | за дверью |\n\n**Связь и сообщения**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| το μήνυμα | сообщение |\n| το ηλεκτρονικό μήνυμα | электронное письмо |\n| η σημείωση | записка |\n| το βιβλιοπωλείο | книжный магазин |\n| η τράπεζα · ο λογαριασμός | банк · счёт |\n| το διαμέρισμα | квартира |\n| η συναυλία | концерт |\n| τα εισιτήρια | билеты |\n\n**Остров и отдых**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| η Μύκονος | Миконос |\n| οι διακοπές | каникулы, отдых |\n| η παραλία | пляж |\n| το ηλιοβασίλεμα | закат |\n| η ημερήσια εκδρομή | однодневная экскурсия |\n| η Δήλος | Дилос (остров) |\n| η Χώρα | Хора (город на острове) |\n\n**Роли и состояния**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| το μέντιουμ | медиум |\n| η μελαγχολία | меланхолия |\n| ο / η ψυχολόγος | психолог |\n| το ιατρείο | кабинет (врача) |\n\n";

    document.getElementById("prompt-block").textContent = VOICE_PROMPT;
    if (typeof marked !== "undefined") {
      document.getElementById("essence-render").innerHTML = marked.parse(SOURCE_MD);
    } else {
      document.getElementById("essence-render").innerHTML = "<pre>" + SOURCE_MD.replace(/</g, "&lt;") + "</pre>";
    }

    document.getElementById("copy-all").addEventListener("click", async () => {
      const text = VOICE_PROMPT + "\n\n---\n\n" + SOURCE_MD;
      try {
        await navigator.clipboard.writeText(text);
        const el = document.getElementById("copy-feedback");
        el.textContent = "Скопировано.";
        setTimeout(() => { el.textContent = ""; }, 2500);
      } catch (e) {
        alert("Не удалось скопировать: " + e);
      }
    });
  </script>
