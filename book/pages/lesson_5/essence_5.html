  <script>
    const VOICE_PROMPT = "Ρόλος:\n\nΕίσαι ένας αυστηρός, λακωνικός και ενεργητικός καθηγητής ελληνικών για ηχητική εξάσκηση (Voice Mode). Ο μαθητής σου είναι ρωσόφωνος. Ο στόχος σου είναι να με βοηθήσεις να μάθω και να εμπεδώσω το υλικό από τις επισυναπτόμενες σημειώσεις (αρχείο essence — κονσπέκτο του μαθήματος). Πρέπει να υποθέσεις ότι δεν βλέπω τις σημειώσεις και δεν τις ξέρω απ' έξω. Το έργο σου είναι να μου υποενθυμίζεις τμηματικά λέξεις, κανόνες και έτοιμες φράσεις και να τα εξασκούμε αμέσως μέσω διαλόγου.\n\nΠρόσθετη προτεραιότητα — διάλογοι:\n\nΟι πλήρεις διάλογοι στις σημειώσεις (γραμμές με ονόματα, σκηνές) είναι για την επόμενη φάση. Πρώτα εξασκούμε ξεχωριστά τις φράσεις, τα μοτίβα και τις κατασκευές του μαθήματος (3–4 μικρά βήματα ανά θέμα). Μόνο όταν τα κατακτήσω σε απλές προτάσεις και μεταφράσεις, περνάμε σε σύντομο διάλογο: εσύ λες μία γραμμή από το κείμενο των σημειώσεων και περιμένεις τη δική μου — όχι ανάγνωση ολόκληρου του διαλόγου σε μία ροή χωρίς παύση.\n\nΚανόνες διδασκαλίας (ΚΡΙΣΙΜΑ):\n\nΑπό το απλό στο σύνθετο: Εστίασε σε ολόκληρες προτάσεις. Διάλεξε μία κατασκευή από τις σημειώσεις — π.χ. ένα ρήμα σε συγκεκριμένο χρόνο, ένα ερώτημα από πίνακα ερωτήσεων, ένα μοτίβο με άρθρο και προθέσεις —, θύμισέ το πολύ σύντομα και ζήτα μετάφραση απλής πρότασης από τα ρωσικά στα ελληνικά (ή το αντίστροφο, αν ταιριάζει στο μάθημα). Όταν απαντήσω σωστά — δώσε λίγο πιο δύσκολη πρόταση με την ίδια κατασκευή.\n\nΣύντομο feedback: Επιδοκιμασία επιτρέπεται, αλλά αυστηρά 1–2 λέξεις («Μπράβο», «Πολύ καλά»). Σωστή απάντηση — σύντομη επιβεβαίωση («Ναι» / «Σωστά») και αμέσως επόμενη άσκηση.\n\nΣκληρή διόρθωση λαθών: Αν έκανα λάθος, η ροή είναι σταθερή:\n\nΠες «Όχι» ή «Λάθος» και πες το σωστό.\n\nΑμέσως «Επανάλαβε».\n\nΠερίμενε να το πω σωστά.\n\nΑμέσως μετά δώσε νέα, παρόμοια πρόταση για τον ίδιο κανόνα, για ενίσχυση.\n\nΚαθυστερημένη επανάληψη: Θυμήσου την πρόταση όπου έσφαλα. Κάνε 2–3 άλλες ερωτήσεις από τις σημειώσεις και μετά ξαφνικά ξανά την ίδια αρχική πρόταση.\n\nΔόση: Μην ξεχύνεις όλο το υλικό των σημειώσεων. Ένας κανόνας ή μία λέξη — 3–4 προτάσεις — μετά επόμενο θέμα.\n\nΜη μιλάς για λογαριασμό μου: Αν σωπαίνω ή κολλάω, δώσε κοντή υπόδειξη (πρώτη λέξη), όχι ολόκληρη την απάντηση, εκτός αν πω ρητά «Πες μου την απάντηση» / «Скажи ответ».\n\nΕυελιξία: Αν ζητήσω να αλλάξει μορφή, να παραλείψω θέμα ή να κάνουμε αλλιώς — συμφώνησε αμέσως και προσαρμόσου.\n\nΕιδικά για ΦΩΝΗ:\n\nΥπερ-συντομία: Μέχρι 1–2 προτάσεις ανά ρεπλίκα σου.\n\nΈνα βήμα τη φορά: Ποτέ δύο ερωτήσεις στη σειρά. Έκανες ερώτηση — σώπασε και περίμενε.\n\nΧωρίς μορφοποίηση στη φωνή: Όχι λίστες, παύλες, αγκύλες στην ομιλία σου — φυσική προφορική γλώσσα.\n\nΧωρίς μετα-φράσεις τύπου «Πάμε παρακάτω;» — συνέχισε αθόρυβα στο επόμενο βήμα.\n\n---\n\nΣυνημμένο: σημειώσεις μαθήματος (essence_N.md) — ακολούθα αυστηρά το περιεχόμενό τους για λεξιλόγιο, γραμματική και διάλογους.";
    const ESSENCE_MD = "# 💎 Урок 5 — суть: «Πάμε πάλι!» — повторение 1–4 (стр. 59–65)\n\n**[🏠 Readme](../../../Readme.md) → [📘 book/pages](../) → [📚 content_5.md](content_5.md) → 📄 `essence_5.md`**\n\n*Пятая единица **«Ελληνικά Α'»** («**Πάμε πάλι!**») — **обзор** материала уроков **0–4**, без новой грамматики как главной темы. Файл **самодостаточен** для повторения: карта тем, правила, фразы, эталоны, словарь. **Порядок:** цели → грамматика → фразы и диалоги → эталоны → словарь.*\n\n*Греческий в примерах: **ударения показаны** (τόνος), орфография **монотоник**.*\n\n| ⚡ Быстрые ссылки       |                                                                                                                       |\n|------------------------|-----------------------------------------------------------------------------------------------------------------------|\n| 📚 Страницы со сканами | [content_5.md](content_5.md)                                                                                          |\n| 🖼 Диапазон            | стр. 59–65                                                                                                            |\n| 📘 Конспекты 1–4, 6    | [essence_1](../lesson_1/essence_1.md) · [essence_2](../lesson_2/essence_2.md) · [essence_3](../lesson_3/essence_3.md) · [essence_4](../lesson_4/essence_4.md) · [essence_6](../lesson_6/essence_6.md) |\n\n## 📌 Тема и цели\n\n### После повторения я могу (проверяемые цели)\n\n- Вести **единый диалог знакомства**: имя, страна, город, адрес, телефон, «как дела», язык, работа — в типовых репликах уроков 1–4.\n- Уверенно использовать **άρθρα** и **τον/την/το** после **από / σε** и в **прямом дополнении** (**ξέρω τον …**).\n- Различать спряжение **типа Α** и **μιλάω** (**Β1**) в коротких предложениях.\n- При **фонетике** по топонимам отличать пары **μπ/β**, **π/φ**, **γ/γκ** (см. [digitized/65.md](digitized/65.md) для полного списка в оцифровке).\n\n### Содержание обзора\n\n- **Свести в одну картину** диалог знакомства: имя, страна, город, адрес, телефон, «как дела», язык, работа.\n- **Повторить** артикли **ο, η, το** и **винительный** (**τον, την, το**) после глаголов и в конструкциях **από / σε** (**από τον …**, **στην / στον / στο …**).\n- **Различать** глаголы **типа Α** (μένω, έχω, κάνω …) и **типа Β1** (μιλάω / μιλώ).\n- **Отработать** орфографию, пунктуацию и **фонетику** по географическим названиям (стр. 65).\n\n### Карта: что из какого урока\n\n| Блок | Уроки | Ядро |\n|------|-------|------|\n| Алфавит, чтение, заглавные | 0 | буквы, σ/ς, международные слова |\n| Приветствие, **είμαι**, страна, 0–10 | 1 | **Γεια σου/σας**, **από την/τον/το**, числа |\n| Где живёшь, **μένω**, телефон, **ο/η/το** | 2 | **Πού μένεις;**, **στην/στον/το**, **έχω** |\n| Семья, профессии | 3 | семья, «кто это», **Τι δουλειά κάνεις;** |\n| Языки, национальности, вин. падеж, числа | 4 | **μιλάω ελληνικά**, **Ξέρεις τον…;**, 10–1000 |\n\n### Сводка блоков раздела (стр. 59)\n\n| Раздел «Πώς το λένε;» |\n|------------------------|\n| χαιρετισμοί, πληροφορίες (ανεπίσημα / επίσημα) |\n| καλημέρα, αποχαιρετισμοί, πού μένεις |\n| τηλέφωνο |\n| ποιος / ποια / ποιο · εθνικότητα, γλώσσα, δουλειά |\n\n## 🧠 Грамматика и правила\n\n### **είμαι**\n\n| лицо | форма |\n|------|--------|\n| εγώ | είμαι |\n| εσύ | είσαι |\n| αυτός/ή/ό | είναι |\n| εμείς | είμαστε |\n| εσείς | είσαστε / είστε |\n| αυτοί/ές/ά | είναι |\n\n**Откуда:** **Είμαι από τον Καναδά. / από την Ισπανία. / από το Μεξικό.**\n\n### Тип **Α** (**μένω**) и тип **Β1** (**μιλάω / μιλώ**)\n\n| лицо | μένω | μιλάω / μιλώ |\n|------|------|----------------|\n| εγώ | μένω | μιλάω / μιλώ |\n| εσύ | μένεις | μιλάς |\n| αυτός/ή/ό | μένει | μιλάει / μιλά |\n| εμείς | μένουμε | μιλάμε |\n| εσείς | μένετε | μιλάτε |\n| αυτοί/ές/ά | μένουν(ε) | μιλάνε / μιλούν |\n\n**Тот же тип Α:** **έχω, κάνω, δουλεύω, μαθαίνω** — те же окончания, что у **μένω**.\n\n| Глагол | Пример |\n|--------|--------|\n| **έχω** | **Έχω δύο παιδιά.** **Δεν έχω κινητό.** |\n| **κάνω** | **Τι δουλειά κάνεις;** **Κάνω γυμναστική.** |\n| **δουλεύω** | **Δουλεύω σε τουριστικό γραφείο.** |\n| **μαθαίνω** | **Μαθαίνω ελληνικά.** |\n\n### Имена мест: именительный и **από / σε**\n\n| род | кто / что | από / σε + вин. |\n|-----|-----------|-----------------|\n| м | ο Πειραιάς | **από τον / στον** Πειραιά *(без -ς)* |\n| ж | η Καλαμαριά | **από την / στην** Καλαμαριά |\n| ср | το Πασαλιμάνι | **από το / στο** Πασαλιμάνι |\n\n**Прямое дополнение:** **Ξέρεις τον Πέτρο; την Κατερίνα; το μετρό;**\n\n### Притяжательные\n\n**μου, σου, του, της, μας, σας, τους** — **το τηλέφωνό μου**, **το σπίτι μας**, **η δουλειά τους**.\n\n### Город — страна — имя (модель)\n\n**Το Παρίσι είναι στη Γαλλία. Ο Γιάννης μένει στο Παρίσι.**\n\nРод города в греческом задаёт **το / η / ο** и предлог **στο / στη / στον**.\n\n## 💬 Готовые фразы и диалоги\n\n### «Πώς το λένε;» — со стр. 59\n\n**Приветствие и представление:** **Γεια σου / Γεια σας.** **Από ’δώ ο Ερβίν.** **Από ’δώ η Βέρα.**\n\n| Неформально | Вежливо |\n|-------------|---------|\n| **Πώς σε λένε;** | **Πώς λέγεστε;** (**Πώς σας λένε;**) |\n| **Από πού είσαι;** | **Από πού είστε;** |\n| **Είσαι από τον Καναδά; την Αλβανία; το Βέλγιο;** | **Είστε από τον Λίβανο; την Ισπανία; το Μεξικό;** |\n| **Όχι, δεν είμαι από…** | **Όχι, δεν είστε από…** |\n\n**Прощание:** **Αντίο**, **Γεια**, **Καληνύχτα**, **Τα λέμε.**\n\n**Где живёшь:** — **Πού μένεις;** — **Μένω στον Πειραιά. / στην Κυψέλη. / στο Πασαλιμάνι.**\n\n**Телефон:** — **Έχεις τηλέφωνο;** — **Ναι, το κινητό μου είναι …** / **Όχι, δεν έχω.**\n\n**Кто это + язык + работа**\n\n| Вопрос | Ответ |\n|--------|--------|\n| **Ποιος είναι αυτός;** | **Αυτός είναι ο …** |\n| **Μιλάς ελληνικά;** | **Ναι, μιλάω.** / **Όχι, δε μιλάω καλά.** |\n| **Τι δουλειά κάνεις;** | **Είμαι …** / **Δε δουλεύω.** |\n\n### Монолог «Ποιος είμαι;» — **Μάικ** (стр. 61)\n\n— **Γεια σας.**  \n— **Με λένε Μάικ. Είμαι από την Αγγλία, από το Λονδίνο. Μένω στην Αθήνα, στη Δάφνη, Αλεξάνδρας 42. Είμαι παντρεμένος και έχω δύο παιδιά. Δουλεύω σε ένα τουριστικό γραφείο.**  \n— **Καλημέρα. Εγώ είμαι η Γιούρι. Είμαι από την Ιαπωνία…**\n\n### Диалог **6** — разбор строки без пробелов (стр. 62)\n\nИсходник: **γιώργοτικάκάνειςκαλάεσύ…** (= **γιώργο** + **τι κάνεις** + …)\n\n— **Γιώργο, τι κάνεις;**  \n— **Καλά, εσύ;**  \n— **Πολύ καλά.**  \n— **Μένεις εδώ κοντά;**  \n— **Ναι, μένω στην οδό Κέρκυρας.**  \n— **Εσύ;**  \n— **Εγώ δε μένω εδώ. Μένω στο Κερατσίνι, Άργους 60.**\n\n### Сцена в кафенείο — **Φοίβος**, **Φου**, **Λι** (полный текст, стр. 63)\n\n*Условие с пропусками на странице скана — [digitized/63.md](digitized/63.md); ниже — **готовый диалог** для заучивания.*\n\n**Φοίβος:** Γεια σας! **Είμαι** ο Φοίβος, ο γιος του Παναγιώτη.  \n**Λι:** Χαίρω πολύ. Εγώ **είμαι** η Λι και αυτός **είναι** ο άντρας μου, ο Φου.  \n**Φοίβος:** **Είστε** από την Ιαπωνία;  \n**Φου:** Χα, όχι! **Είμαστε** από την Κίνα. …  \n**Λι:** Φοίβο, **είσαι** φοιτητής;  \n**Φοίβος:** Ναι, σπουδάζω Τουριστικά Επαγγέλματα. Εσείς τι δουλειά κάνετε;  \n**Φου:** Εγώ **είμαι** μάγειρας και η Λι **είναι** πωλήτρια. **Είμαστε** οχτώ χρόνια στην Ελλάδα.\n\n### Фонетика по топонимам (стр. 65)\n\nТри пары: **μπ / β**, **π / φ**, **γ / γκ** — читать **вслух** и сличать звук и букву. Полный список заданий **1.7–1.9** с пропусками — [digitized/65.md](digitized/65.md); в конспекте держим **цель** (отличать пары), а не заучивание всех названий.\n\n**Короткие опоры для тренировки:** Κούβα / βερμούδες, Αίγυπτος / Φιλιππίνες, Γιβραλτάρ / Γκαμπόν *(пары из разных строк оцифровки — для произношения, не как обязательный список к экзамену).*\n\n## 📖 Эталоны и сверка с оцифровкой\n\n*Ниже — **готовые ответы и связные тексты** для самопроверки. **Формулировки заданий** («найдите», «вставьте», «σωστό ή λάθος») — на соответствующих страницах оцифровки: [digitized/61.md](digitized/61.md), [digitized/62.md](digitized/62.md), [digitized/63.md](digitized/63.md), [digitized/64.md](digitized/64.md), [digitized/65.md](digitized/65.md). Аудиозадания и кроссворд здесь не воспроизводятся — только текстовая опора.*\n\n### Орфография: «SMS» по заглавным буквам (стр. 61)\n\n*Страница задания: [digitized/61.md](digitized/61.md).*\n\n| № | Слово |\n|---|--------|\n| 1 | **ΚΑΛΗΜΕΡΑ** |\n| 2 | **ΕΙΜΑΣΤΕ** |\n| 3 | **ΚΑΦΕΝΕΙΟ** |\n| 4 | **ΠΕΡΙΜΕΝΩ** |\n\n*Сообщение целиком (как в задании):* **ΚΑΛΗΜΕΡΑ ΕΙΜΑΣΤΕ ΚΑΦΕΝΕΙΟ ΚΑΙ ΠΕΡΙΜΕΝΩ.**\n\n### Упр. 3 — πόλη → χώρα → όνομα (стр. 61)\n\n*(Образец: **Το Παρίσι είναι στη Γαλλία. Ο Γιάννης μένει στο Παρίσι.**)*\n\n2. **Η Μόσχα είναι στη Ρωσία. Η Λίλια μένει στη Μόσχα.**  \n3. **Το Μόναχο είναι στη Γερμανία. Ο Ότο μένει στο Μόναχο.**  \n4. **Η Κρακοβία είναι στην Πολωνία. Η Γιολάντα μένει στην Κρακοβία.**  \n5. **Το Βελιγράδι είναι στη Σερβία. Η Αλεξάνδρα μένει στο Βελιγράδι.**  \n6. **Η Βαρκελώνη είναι στην Ισπανία. Η Σοφία μένει στη Βαρκελώνη.**  \n7. **Το Ταλίν είναι στην Εσθονία. Η Στέλλα μένει στο Ταλίν.**  \n8. **Η Μελβούρνη είναι στην Αυστραλία. Ο Τζιμ μένει στη Μελβούρνη.**  \n9. **Η Τεχεράνη είναι στο Ιράν. Ο Μοχάμετ μένει στην Τεχεράνη.**  \n10. **Το Ναϊρόμπι είναι στην Κένυα. Ο Βίκτορ μένει στο Ναϊρόμπι.**\n\n### Упр. 4 — малые и большие буквы (стр. 61)\n\n**Καλημέρα. Είμαι ο Αριάν, από την Αλβανία. Μιλάω αλβανικά, ελληνικά και αγγλικά πολύ καλά. Ψάχνω δουλειά.**\n\n### Упр. 5 — пунктуация и ударения (стр. 61)\n\nΓεια σας. Είμαι η Ιλιάνα και είμαι από τη Γεωργία.  \nΤώρα μένω στην Ελλάδα, στη Θεσσαλονίκη.  \nΜένω στο Πανόραμα, στην οδό Πόντου 24. Το τηλέφωνό μου είναι 2310 984653.  \nΔεν έχω κινητό. Εσείς από πού είστε;\n\n### Упр. 8 — местоимения (стр. 62)\n\n1. **Εμείς** · 2. **Αυτή** · 3. **Αυτοί** · 4. **Εσείς** · 5. **εσείς** · 6. **εσύ**\n\n### Упр. 9 — спряжение (стр. 62)\n\n1. **Δουλεύουν**  \n2. **Μαθαίνει**, **δουλεύει**  \n3. **δουλεύουμε**, **μαθαίνουμε**  \n4. **μένουν**, **δουλεύουν**\n\n### Упр. 10 — **είμαι** в диалоге (стр. 63)\n\n**Λι:** Χαίρω πολύ. Εγώ **είμαι** η Λι και αυτός **είναι** ο άντρας μου, ο Φου.  \n**Φοίβος:** **Είστε** από την Ιαπωνία;  \n**Φου:** Χα, όχι! **Είμαστε** από την Κίνα. …  \n**Λι:** Φοίβο, **είσαι** φοιτητής;  \n**Φου:** Εγώ **είμαι** μάγειρας και η Λι **είναι** πωλήτρια. **Είμαστε** οχτώ χρόνια στην Ελλάδα.\n\n### Упр. 1.6 — притяжательные (стр. 64)\n\n2. **σου**, **σου** *(το κινητό σου · το σταθερό σου)*  \n3. **σας**, **μας**  \n4. **σας**, **μας**\n\n### Кроссворд 1.4 — ответы (стр. 64)\n\n| Направление | Ответ |\n|-------------|--------|\n| Οριζ. 1 | **ελεύθερος** |\n| Οριζ. 2 | **ηλεκτρολόγος** |\n| Οριζ. 3 | **Ιταλίδα** |\n| Οριζ. 4 | **γιαγιά** |\n| Οριζ. 5 | **Τούρκος** |\n| Κάθ. 1 | **Ρώσος** |\n| Κάθ. 2 | **σερβιτόρος** |\n| Κάθ. 3 | **ταξιτζής** |\n| Κάθ. 4 | **γιος** |\n\n## 📇 Словарь и опоры\n\n### Лексика кроссворда (для самопроверки)\n\n**ελεύθερος**, **ηλεκτρολόγος**, **Ιταλίδα**, **γιαγιά**, **Τούρκος**, **Ρώσος**, **σερβιτόρος**, **ταξιτζής**, **γιος**.\n\n### Роли и ситуации\n\nКороткие опоры для импровизации: **μάγειρας**, **πωλήτρια**, **σπουδάζω**, **είμαι** + профессия, **καφενείο**. Вопросы: **Είναι …;** **Τι δουλειά κάνεις;**\n\n### Итоговый чеклист «могу ли я…»\n\n1. Поздороваться и попрощаться (**γεια σου / σας**, **τα λέμε** …).\n2. Назвать себя и спросить имя (**με λένε / πώς σε λένε**).\n3. Сказать, откуда вы (**είμαι από …**).\n4. Сказать, где живёте (**μένω στην/στον/το …**, адрес).\n5. Спросить и назвать телефон (**το κινητό μου είναι …**).\n6. Спросить «как дела» и ответить (**τι κάνεις; καλά** …).\n7. Спросить «кто это» (**ποιος είναι αυτός;**).\n8. Сказать, на каком языке говорите (**μιλάω …**).\n9. Сказать профессию (**τι δουλειά κάνεις; είμαι …**).\n10. Прочитать число 10–100 и составное (**είκοσι ένα** …).\n\n### Опора для монолога о трёх людях (не дословное ДЗ со стр. 65)\n\n*На стр. 65 в оцифровке — продуктивное задание на ~80 слов; **полная формулировка** — в [digitized/65.md](digitized/65.md). Ниже — **готовые мини-абзацы** как образец структуры (можно переставлять факты).*\n\n**Η Αρλέτα είναι από την Αλβανία. Μένει στην Αθήνα, στο Κουκάκι. Είναι κομμώτρια και μιλάει αλβανικά, ελληνικά και αγγλικά.**\n\n**Ο Μάικ είναι από την Αγγλία, από το Λονδίνο. Μένει στη Δάφνη, Αλεξάνδρας 42. Δουλεύει σε τουριστικό γραφείο και έχει δύο παιδιά.**\n\n**Η Γιούρι είναι από την Ιαπωνία. Σπουδάζει στην Αθήνα.**\n\n*Дальше — составьте свой текст по чеклисту выше, опираясь на фразы из **💬** и эталоны **📖**.*\n";

    document.getElementById("prompt-block").textContent = VOICE_PROMPT;

        const el = document.getElementById("copy-feedback");

        setTimeout(() => { el.textContent = ""; }, 2500);
      } catch (e) {

      }
    });
