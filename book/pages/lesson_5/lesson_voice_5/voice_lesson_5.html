  <script>
    const VOICE_PROMPT = "Λειτούργησε ως αυστηρός δάσκαλος ελληνικών και συνεργάτης μου για πρακτική εξάσκηση.\n\nЯ новичок в греческом языке, поэтому мета-общение со мной веди на русском. У тебя две основные задачи: разыгрывать со мной диалоги по ролям и строго контролировать мою речь.\n\nПРАВИЛА ИСПРАВЛЕНИЯ ОШИБОК (КРИТИЧЕСКИ ВАЖНО):\n1. Будь максимально краток. Никакой вежливости, похвалы и лишних слов.\n2. Если в моей реплике нет ошибок — ничего не говори вне роли (просто ответь «ОК» или сразу продолжай диалог своей репликой).\n3. Если ты видишь ошибку (в грамматике, лексике, порядке слов) — прерви роль и скажи ТОЛЬКО исправленный вариант. Никаких вступлений вроде «Правильно будет так...» или объяснений.\n4. Переводи фразы на русский язык ТОЛЬКО если я скажу слово «Перевод» или «Translate».\n\nПРАВИЛА РОЛЕВОЙ ИГРЫ:\n1. Я пришлю тебе сценарии (Ситуации). Я всегда играю Роль А, ты всегда играешь Роль Б.\n2. Жди моей первой реплики, не начинай диалог сам (если по сценарию Роль А говорит первой).\n3. Так как я новичок, говори короткими репликами, удобными для восприятия на слух, и используй строго лексику из чек-листа к ситуации. Не усложняй грамматику.\n\nМы будем переходить от одной ситуации к другой по моей команде (например, \"Ситуация 1\").\n\nВот сценарии для нашей практики:\n";
    const SOURCE_MD = "# 🎙 Голосовой урок 5 (по оцифровке главы)\n\n**[🏠 Readme](../../../../Readme.md) → [📚 content_5.md](../content_5.md) → 📄 `lesson_voice_5/voice_lesson_5.md`**\n\n| ⚡ Быстрые ссылки |                                                                    |\n|------------------|--------------------------------------------------------------------|\n| 📚 Урок          | [content_5.md](../content_5.md)                                    |\n| 📄 Оцифровка     | [lesson_5_digitized.md](../lesson_digitized/lesson_5_digitized.md) |\n| 💎 Суть урока    | [essence_5/essence_5.md](../essence_5/essence_5.md)                |\n| 🎙 Voice (HTML)  | [essence_5.html](../essence_5.html)                                |\n\n### Блок 1: Коммуникативные ситуации (Ролевые игры)\n\n* **Ситуация 1: Повторение — приветствие, имя, страна, жильё, телефон**\n* **Контекст:** Раздел «Πώς το λένε;»: неформально и формально; приветствия; прощания; где живёшь; телефон.\n* **Роль А:** Чередуйте неформальные и формальные вопросы из таблицы; спросите, где живёт собеседник; спросите про\n  телефон.\n* **Роль Б:** Отвечайте готовыми фразами из того же раздела.\n* 🎯 **Чек-лист для ситуации:**\n    - *Γεια σου / Γεια σας.* — Привет (ты) / Здравствуйте (вы).\n    - *Από ’δώ ο Ερβίν.* / *Από ’δώ η Βέρα.* — Представление «вот …».\n    - *Πώς σε λένε;* / *Πώς λέγεστε; (Πώς σας λένε;)* — Как тебя зовут? / Как вас зовут?\n    - *Από πού είσαι;* / *Από πού είστε;* — Откуда ты? / Откуда вы?\n    - *Πού μένεις;* — Где ты живёшь?\n    - *Μένω στον Πειραιά. στην Κυψέλη. στο Πασαλιμάνι.* — Живу в Пирее / в Кипсели / в Пасалимани (как в цепочке).\n    - *Έχεις τηλέφωνο;* — У тебя есть телефон?\n    - *Ναι, το κινητό μου είναι 6974567033 και το σταθερό μου 210 4578690.* — Да, мой мобильный и домашний номер (как в\n      оцифровке).\n    - *Όχι, δεν έχω.* — Нет, нет (у меня нет).\n\n---\n\n* **Ситуация 2: «Ποιος είμαι;» — короткая самопрезентация**\n* **Контекст:** Упражнение 1: монолог Майка и начало реплики Юри.\n* **Роль А:** Разыграйте Майка: имя, страна, город, адрес в Афинах, семья, работа.\n* **Роль Б:** Начните как Юри: поздоровайтесь, представьтесь и страну; продолжите по карточке.\n* 🎯 **Чек-лист для ситуации:**\n    - *Γεια σας. Με λένε Μάικ. Είμαι από την Αγγλία, από το Λονδίνο. Μένω στην Αθήνα, στη Δάφνη, Αλεξάνδρας 42. Είμαι\n      παντρεμένος και έχω δύο παιδιά. Δουλεύω σε ένα τουριστικό γραφείο.* — Здравствуйте; меня зовут Майк; страна,\n      город, адрес, семья, работа (как в тексте).\n    - *Καλημέρα. Εγώ είμαι η Γιούρι. Είμαι από την Ιαπωνία…* — Доброе утро; я Юри; я из Японии… (как в тексте).\n\n---\n\n* **Ситуация 3: Знакомство — Фоивос, Фу и Ли**\n* **Контекст:** Μάθημα 4 — Από πού είσαι; *(αριστερή σελίδα του διπλού σκαναρίσματος)* — пункт 7.\n* **Роль А (Фоивос):** Поздоровайтесь, представьтесь, уточните страну; ответьте про Грецию.\n* **Роль Б (Фу):** Ответьте на приветствие; представьте себя и Ли.\n* **Роль В (Ли):** Подтвердите, что вы из Китая; спросите Фоивоса про Грецию.\n* 🎯 **Чек-лист для ситуации:**\n    - *Γεια σας! Είμαι ο Φοίβος. Εσείς;* — Здравствуйте! Я Фивос. А вы?\n    - *Γεια σου, Φοίβο. Εγώ είμαι ο Φου και αυτή είναι η Λι.* — Привет, Фивос. Я Фу, это Ли.\n    - *Χαίρω πολύ. Από πού είστε; Από την Κίνα;* — Очень рад. Откуда вы? Из Китая?\n    - *Ναι, είμαστε από την Κίνα. Εσύ είσαι από την Ελλάδα;* — Да, мы из Китая. Ты из Греции?\n    - *Ναι, είμαι Έλληνας.* — Да, я грек.\n\n---\n\n* **Ситуация 4: В кафенείο — учёба и работа**\n* **Контекст:** Пункт 10: пропуски с *είμαι*; проговаривайте готовые реплики и заполните пропуски по логике упражнения.\n* **Роль А (Фоивос):** Начало диалога, вопрос про Японию, ответ про поездки и желание, ответ про учёбу, вопрос о работе\n  собеседников.\n* **Роль Б (Ли / Фу):** Реплики с пропусками: представление пары, страна, учёба Фоивоса, профессии, срок в Греции.\n* 🎯 **Чек-лист для ситуации:**\n    - *Γεια σας! Είμαι ο Φοίβος, ο γιος του Παναγιώτη.* — Здравствуйте! Я Фивос, сын Панайотиса.\n    - *Χαίρω πολύ. Εγώ ________ η Λι και αυτός ________ ο άντρας μου, ο Φου.* — Очень рад; я Ли и он мой муж Фу (\n      допишите *είμαι* / *είναι*).\n    - *Χα, όχι! ________ από την Κίνα. Εσύ… πώς λένε στα ελληνικά… ταξιδεύεις στην Κίνα;* — Реакция и ответ: из\n      Китая; … (как в тексте).\n    - *Α, όχι. Δεν ταξιδεύω πολύ. Αλλά θέλω να πάω μια μέρα!* — А, нет; не путешествую много; но хочу однажды поехать!\n    - *Ναι, σπουδάζω Τουριστικά Επαγγέλματα. Εσείς τι δουλειά κάνετε;* — Да, учусь на туристические профессии. Вы кем\n      работаете?\n    - *Εγώ ________ μάγειρας και η Λι ________ πωλήτρια. ________ οχτώ χρόνια στην Ελλάδα.* — Я повар, Ли — продавщица;\n      мы восемь лет в Греции (допишите формы *είμαι*).\n\n---\n\n* **Ситуация 5: «Σκέφτομαι ένα πρόσωπο» — да / нет**\n* **Контекст:** Пункт 11.\n* **Роль А:** Вопросы по цепочке; финал — угадайка про Роналдиньо.\n* **Роль Б:** Отвечайте *ναι* / *όχι* по задуманной личности.\n* 🎯 **Чек-лист для ситуации:**\n    - *Είναι άντρας;* — Это мужчина?\n    - *Ναι.* — Да.\n    - *Είναι παντρεμένος;* — Он женат?\n    - *Ναι.* — Да.\n    - *Είναι ηθοποιός;* — Он актёр?\n    - *Όχι.* — Нет.\n    - *Είναι πολιτικός;* — Он политик?\n    - *Όχι.* — Нет.\n    - *Είναι ποδοσφαιριστής;* — Он футболист?\n    - *Ναι.* — Да.\n    - *Είναι Άγγλος;* — Он англичанин?\n    - *Όχι.* — Нет.\n    - *Είναι Βραζιλιάνος;* — Он бразилец?\n    - *Ναι.* — Да.\n    - *Μήπως είναι ο Ροναλντίνιο;* — Может, это Роналдиньо?\n\n---\n\n### Блок 2: Универсальная шпаргалка (Фразы-клише)\n\n**Приветствия и прощания**\n\n* **Καλημέρα.** — *Доброе утро.*\n* **Καλησπέρα.** — *Добрый вечер.*\n* **Γεια χαρά.** — *Привет (букв. «радость»).*\n* **Αντίο.** — *Прощайте.*\n* **Γεια.** — *Пока.*\n* **Καληνύχτα.** — *Спокойной ночи.*\n* **Τα λέμε.** — *Увидимся / на связи.*\n\n**Имя, страна, национальность, работа**\n\n* **Χαίρω πολύ!** — *Очень рад(а) познакомиться!*\n* **Είσαι από τον Καναδά; την Αλβανία; το Βέλγιο;** — *Ты из Канады? Албании? Бельгии?*\n* **Είστε από τον Λίβανο; την Ισπανία; το Μεξικό;** — *Вы из Ливана? Испании? Мексики?*\n* **Όχι, δεν είμαι από…** — *Нет, я не из…*\n* **Όχι, δεν είστε από…** — *Нет, вы не из…*\n* **Ποιος είναι αυτός;** → *Αυτός είναι ο…* — *Кто это (м.)? → Это …*\n* **Ποια είναι αυτή;** → *Αυτή είναι η…* — *Кто это (ж.)? → Это …*\n* **Ποιο είναι αυτό;** → *Αυτό είναι το…* — *Что это (ср.)? → Это …*\n* **Είσαι / Είστε Ισπανός;** — *Ты / вы испанец?*\n* **Όχι, είμαι…** — *Нет, я …*\n* **Μιλάς / Μιλάτε ελληνικά;** — *Ты / вы говорите по-гречески?*\n* **Ναι, μιλάω. / Όχι, δε μιλάω καλά.** — *Да, говорю. / Нет, не очень хорошо говорю.*\n* **Τι δουλειά κάνεις; / κάνετε;** — *Кем ты работаешь? / Кем вы работаете?*\n* **Είμαι… / Δε δουλεύω.** — *Я … / Не работаю.*\n\n**Винительный падеж (модели из «Παραδείγματα»)**\n\n* **Ο Πέτρος είναι φίλος μου. Ο Κώστας είναι φίλος μου. Ο Γιάννης είναι φίλος μου.** — *Петрос, Костас и Яннис —\n  друзья (как в синих фразах).*\n* **Ξέρεις τον Πέτρο; τον Κώστα; τον Γιάννη;** — *Ты знаешь Петроса? Косту? Янниса?*\n* **Η Κατερίνα είναι φίλη μου. Η Ελένη είναι φίλη μου.** — *Катерина и Элени — подруги.*\n* **Ξέρεις την Κατερίνα; την Ελένη;** — *Ты знаешь Катерину? Элени?*\n* **Το μετρό είναι εκεί. Το σπίτι μου είναι εδώ. Το μάθημα είναι δύσκολο.** — *Метро там; мой дом здесь; урок трудный.*\n* **Ψάχνεις το μετρό; Βλέπεις το σπίτι μου; Καταλαβαίνεις το μάθημα;** — *Ты ищешь метро? Видишь мой дом? Понимаешь\n  урок?*\n\n**Притяжательность (фрагменты 1.6)**\n\n* **1. – Πόσα παιδιά έχουν ο κύριος και η κυρία Οικονόμου;** — *Сколько детей у господина и госпожи Эконому?*\n* **Δύο. Ο γιος **τους** είναι ο Μιχάλης και η κόρη **τους** η Ειρήνη. *(«τους» χειρόγραφο στο κενό μετά την «κόρη»)*\n  ** — *Их сын Михалис и дочь Ирини.*\n* **2. – Ποιο είναι το κινητό **\\_\\_\\_\\_\\_\\_**, Εύη;** — *Какой твой мобильный, Эви?*\n* **Δεν έχω κινητό. Γράφεις το σταθερό **\\_\\_\\_\\_\\_\\_**;** — *Нет мобильного. Записываешь домашний?*\n* **3. – Πού είναι το σπίτι **\\_\\_\\_\\_\\_\\_**, κύριε Μπάσενκο;** — *Где ваш дом, господин Басенко?*\n* **Μένουμε στην Κυψέλη. Το σπίτι **\\_\\_\\_\\_\\_\\_** είναι Σπετσών 29.** — *Живём в Кипсели; наш дом — Спецон 29.*\n* **4. – Ποιοι είναι οι γονείς **\\_\\_\\_\\_\\_\\_**, παιδιά;** — *Кто ваши родители, дети?*\n* **Οι γονείς **\\_\\_\\_\\_\\_\\_**; Είναι ο Μίλος και η Ιβάνα.** — *Наши родители? Это Милос и Ивана.*\n\n---\n\n### Блок 3: Тематический словарь\n\n**Глаголы (форма из текста урока)**\n\n| Слово на греческом | Перевод на русский                 |\n|--------------------|------------------------------------|\n| είμαι              | (связка) быть                      |\n| μένω               | живу                               |\n| μιλάω (μιλώ)       | говорю                             |\n| δουλεύω            | работаю                            |\n| μαθαίνω            | учусь / изучаю                     |\n| σπουδάζω           | учусь (в вузе)                     |\n| ταξιδεύω           | путешествую                        |\n| θέλω               | хочу                               |\n| έχω                | имею; у меня есть                  |\n| ψάχνω              | ищу                                |\n| βλέπω              | вижу                               |\n| καταλαβαίνω        | понимаю                            |\n| ξέρω               | знаю                               |\n| γράφω              | пишу                               |\n| σκέφτομαι          | думаю (об игре «загадай личность») |\n\n**Топонимы (с артиклем)**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| ο Πειραιάς         | Пирей              |\n| ο Άλιμος           | Алимос             |\n| ο Ρέντης           | Рентис             |\n| η Νεάπολη          | Неаполи            |\n| η Καλαμαριά        | Каламарья          |\n| η Σέριφος          | Серифос            |\n| το Μικρολίμανο     | Микролимано        |\n| το Πασαλιμάνι      | Пасалимани         |\n| το Πέραμα          | Перама             |\n| η Αθήνα            | Афины              |\n| η Δάφνη            | Дафни              |\n| η Κρήτη            | Крит               |\n| το Ηράκλειο        | Ираклион           |\n| η Νίκαια           | Никея              |\n| η Πετρούπολη       | Петруполи          |\n| η Κυψέλη           | Кипсели            |\n| το Λονδίνο         | Лондон             |\n\n**Страна — национальность — язык (таблица пункта 9)**\n\n| Слово на греческом                                           | Перевод на русский                                                  |\n|--------------------------------------------------------------|---------------------------------------------------------------------|\n| η Ελλάδα · ο Έλληνας · η Ελληνίδα · τα ελληνικά              | Греция · грек · гречанка · по-гречески                              |\n| η Κίνα · ο Κινέζος · η Κινέζα · τα κινέζικα                  | Китай · китаец · китаянка · по-китайски                             |\n| η Ιαπωνία · ο Ιάπωνας · η Ιαπωνέζα · τα ιαπωνικά             | Япония · японец · японка · по-японски                               |\n| η Ισπανία · ο Ισπανός · η Ισπανίδα · τα ισπανικά             | Испания · испанец · испанка · по-испански                           |\n| η Αγγλία · ο Άγγλος · η Αγγλίδα · τα αγγλικά                 | Англия · англичанин · англичанка · по-английски                     |\n| η Ρωσία · ο Ρώσος · η Ρωσίδα · τα ρωσικά                     | Россия · русский (м.) · русская · по-русски                         |\n| η Γαλλία · ο Γάλλος · η Γαλλίδα · τα γαλλικά                 | Франция · француз · француженка · по-французски                     |\n| η Γερμανία · ο Γερμανός · η Γερμανίδα · τα γερμανικά         | Германия · немец · немка · по-немецки                               |\n| η Ιταλία · ο Ιταλός · η Ιταλίδα · τα ιταλικά                 | Италия · итальянец · итальянка · по-итальянски                      |\n| η Πορτογαλία · ο Πορτογάλος · η Πορτογαλίδα · τα πορτογαλικά | Португалия · португалец · португалка · по-португальски              |\n| η Βραζιλία · ο Βραζιλιάνος · η Βραζιλιάνα · τα πορτογαλικά   | Бразилия · бразилец · бразильянка · по-португальски (как в таблице) |\n\n**Профессии и статусы**\n\n| Слово на греческом    | Перевод на русский |\n|-----------------------|--------------------|\n| ο φοιτητής            | студент            |\n| ο μάγειρας            | повар              |\n| η πωλήτρια            | продавщица         |\n| ο ποδοσφαιριστής      | футболист          |\n| ο πολιτικός           | политик            |\n| ο ηθοποιός            | актёр              |\n| ο άντρας              | мужчина            |\n| ο γιος                | сын                |\n| η κόρη                | дочь               |\n| το παιδί              | ребёнок            |\n| το τουριστικό γραφείο | туристическое бюро |\n\n**Служебные слова (1.6)**\n\n| Слово на греческом | Перевод на русский   |\n|--------------------|----------------------|\n| μου                | мой / мне            |\n| σου                | твой / тебе          |\n| μας                | наш / нам            |\n| σας                | ваш / вам            |\n| τους               | их                   |\n| ο κύριος           | господин             |\n| η κυρία            | госпожа              |\n| το κινητό          | мобильный телефон    |\n| το σταθερό         | стационарный (номер) |\n| το σπίτι           | дом                  |\n";

    document.getElementById("prompt-block").textContent = VOICE_PROMPT;
    if (typeof marked !== "undefined") {
      document.getElementById("essence-render").innerHTML = marked.parse(SOURCE_MD);
    } else {
      document.getElementById("essence-render").innerHTML = "<pre>" + SOURCE_MD.replace(/</g, "&lt;") + "</pre>";
    }

    document.getElementById("copy-all").addEventListener("click", async () => {
      const text = VOICE_PROMPT + "\n\n---\n\n" + SOURCE_MD;
      try {
        await navigator.clipboard.writeText(text);
        const el = document.getElementById("copy-feedback");
        el.textContent = "Скопировано.";
        setTimeout(() => { el.textContent = ""; }, 2500);
      } catch (e) {
        alert("Не удалось скопировать: " + e);
      }
    });
