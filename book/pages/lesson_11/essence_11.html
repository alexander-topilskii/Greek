  <script>
    const VOICE_PROMPT = "Ρόλος:\n\nΕίσαι ένας αυστηρός, λακωνικός και ενεργητικός καθηγητής ελληνικών για ηχητική εξάσκηση (Voice Mode). Ο μαθητής σου είναι ρωσόφωνος. Ο στόχος σου είναι να με βοηθήσεις να μάθω και να εμπεδώσω το υλικό από τις επισυναπτόμενες σημειώσεις. Πρέπει να υποθέσεις ότι δεν βλέπω τις σημειώσεις και δεν τις ξέρω απ' έξω. Το έργο σου είναι να μου υπενθυμίζεις τμηματικά λέξεις/κανόνες και να τους εξασκούμε αμέσως μέσω διαλόγου.\n\nПравила обучения (КРИТИЧЕСКИ ВАЖНО):\n\n\n\nОт простого к сложному: Фокусируйся на целых предложениях. Выбери конструкцию из конспекта (например, глагол έχω), коротко напомни перевод и попроси перевести простое предложение (например, У меня есть машина). Справился — дай предложение сложнее.\n\nКраткая обратная связь: Похвала допускается, но строго 1-2 слова (например, «Μπράβο», «Πολύ καλά»). Ответил верно — коротко подтверди («Ναι» / «Σωστά») или похвали, повтори правильную фразу, и сразу дай следующее задание.\n\nЖесткая отработка ошибок: Если я ошибся, алгоритм строго такой:\n\nСкажи «Όχι» (Нет) или «Λάθος» (Ошибка) и произнеси правильный вариант.\n\nСразу скажи «Επανάλαβε» (Повтори).\n\nДождись, пока я произнесу правильно.\n\nСразу после этого дай мне новое, похожее предложение на это же правило для закрепления.\n\nОтложенное повторение: Запомни предложение, в котором я допустил ошибку. Задай мне 2-3 других вопроса по конспекту, а затем внезапно снова попроси перевести то самое первоначальное предложение, чтобы проверить, не забыл ли я правильный вариант. Если я дал правильный ответ - больше не повторяем.\n\nПорционность: Не вываливай весь конспект. Напомнил одно правило/слово -> отработали на 3-4 предложениях -> перешли к следующему.\n\nНе говори за меня: Если я просто молчу или застрял, дай короткую подсказку (назови первое слово), но не выдавай ответ целиком, пока я не скажу: «Скажи ответ» или «Πες μου την απάντηση».\n\nГибкость к запросам: Ты всегда прислушиваешься к моим просьбам. Если в процессе урока я прошу изменить формат, объяснить, пропустить тему или делать что-то по-новому — ты должен сразу согласиться и подстроиться без лишних вопросов. \n\nСпецифика ГОЛОСОВОГО режима:\n\n\n\nУльтра-краткость: Твои реплики должны состоять максимум из 1-2 предложений.\n\nОдин шаг за один раз: Никогда не задавай два вопроса подряд. Задал вопрос на перевод — замолчи и жди моего ответа.\n\nНикакого форматирования в твоих ответах: Не генерируй списки, тире, скобки. Твоя речь должна быть абсолютно естественной для восприятия на слух.\n\nБесшовность: Никаких мета-фраз вроде «Идем дальше?», «Давай продолжим».\n\n\n\nВАЖНО: твой ученик говорит по русски. Формулируй задания, фразы, объяснения на русском языке.";
    const ESSENCE_MD = "# 💎 Урок 11 — суть: «Ψάχνω για σπίτι» — жильё, родительный, место и сравнение (стр. 132–149)\n\n**[🏠 Readme](../../../Readme.md) → [📘 book/pages](../) → [📚 content_11.md](content_11.md) → 📄 `essence_11.md`**\n\n*Одиннадцатая единица **«Ελληνικά Α'»** («**Ψάχνω για σπίτι**»): **аренда**, **район**, **квартира** (**δυάρι**, **όροφος**, **τετραγωνικά**); **родительный** (**του, της, των**); **предлоги места** (**κοντά**, **απέναντι από**, **δίπλα** …); **сравнение** (**πιο … από**, **πολύ …**); глаголы **типа Γ2** (**θυμάμαι** …). Материал **самодостаточен** для повторения: правила, фразы, эталоны, словарь. **Порядок:** цели → грамматика → фразы и диалоги → эталоны → словарь.*\n\n| ⚡ Быстрые ссылки       |                                                                                             |\n|------------------------|---------------------------------------------------------------------------------------------|\n| 📚 Страницы со сканами | [content_11.md](content_11.md)                                                              |\n| 🖼 Диапазон            | стр. 132–149                                                                                |\n| 📘 Рядом по курсу      | [essence_10](../lesson_10/essence_10.md) · [essence_12](../lesson_12/essence_12.md)         |\n\n## 📌 Тема и цели\n\n- Говорить о **жилье**: **σπίτι**, **διαμέρισμα / δυάρι / τριάρι**, **δωμάτιο**, **σαλόνι**, **κουζίνα**, **κρεβατοκάμαρα**, **όροφος**, **τετραγωνικά μέτρα (τ.μ.)**.\n- Читать и составлять **объявление** (**αγγελία**): **ενοικιάζεται**, **ενοίκιο**, **κοντά στο μετρό**.\n- Выражать **принадлежность** (**γενική**): **Ποιανού είναι το σπίτι;** — **Του Σταύρου.**\n- Описывать **расположение** и **маршрут** (**περνάτε τον φούρνο**, **στρίβετε δεξιά** …).\n- Строить **сравнение** прилагательных: **πιο μεγάλο από …**, **πολύ ακριβό** — таблица в [digitized/144.md](digitized/144.md).\n- Использовать **глаголы -άμαι** (тип **Γ2**): **θυμάμαι**, **φοβάμαι**, **κοιμάμαι** … — [digitized/136.md](digitized/136.md).\n\n### Сводка темы (стр. 132)\n\nКак на первой странице урока — [digitized/132.md](digitized/132.md).\n\n| Слева / фразы | Практика |\n|---------------|----------|\n| **Το σπίτι είναι του Σταύρου.** | **Τηλεφωνώ για την αγγελία. Πόσο είναι το ενοίκιο;** |\n| **Το διαμέρισμα είναι κοντά στο μετρό.** | **Σε ποιον όροφο είναι το διαμέρισμα;** |\n| **Έχει μια κόρη πέντε χρονών.** | **Το σαλόνι είναι πιο μεγάλο από την κουζίνα.** |\n\n**Хάρτης γειτονιάς:** ΠΑΡΚΟ · ΚΑΦΕΝΕΙΟ · ΦΑΡΜΑΚΕΙΟ · ΣΟΥΠΕΡ ΜΑΡΚΕΤ · ΦΟΥΡΝΟΣ · ΣΧΟΛΕΙΟ · ΣΤΑΣΗ\n\n## 🧠 Грамматика и правила\n\n### Родительный (**γενική**) — принадлежность\n\n**Вопрос:** **Ποιανού είναι …;** — **Του Σταύρου.** / **Της Άννας.** / **Του παιδιού.**\n\nПолные таблицы **ονομαστική / γενική** и текст-пример — [digitized/134.md](digitized/134.md).\n\n| род | им. ед. | род. ед. | род. мн. |\n|-----|---------|----------|----------|\n| ♂ | ο φίλος | **του** φίλου | **των** φίλων |\n| ♂ | ο γείτονας | **του** γείτονα | **των** γειτόνων |\n| ♀ | η γυναίκα | **της** γυναίκας | **των** γυναικών |\n| ⚲ | το διαμέρισμα | **του** διαμερίσματος | **των** διαμερισμάτων |\n| ⚲ | το παιδί | **του** παιδιού | **των** παιδιών |\n\n*Примеры:* **το σπίτι του** · **η στάση των λεωφορείων** · **οι τιμές των ενοικίων**\n\n### Возраст\n\n**Έχει μια κόρη πέντε χρονών.** — **Πόσων χρονών είσαι;** — формы в [digitized/137.md](digitized/137.md).\n\n### Предлоги места и направления\n\n**δίπλα στο**, **κοντά στο**, **μακριά από**, **ανάμεσα στο … και …**, **απέναντι από**, **μπροστά από**, **πίσω από**, **πάνω από / κάτω από / μέσα σε / έξω από** — примеры и карта — [digitized/135.md](digitized/135.md).\n\n### Сравнение прилагательных\n\n**Θετικός → συγκριτικός → εντατικός:** **ακριβός** — **πιο ακριβός από …** — **πολύ ακριβός** — см. [digitized/144.md](digitized/144.md).\n\n### Тип **Γ2** (глаголы на **-άμαι**)\n\nПарадигма **θυμάμαι** и примеры — [digitized/136.md](digitized/136.md).\n\n### Этажи и типы квартир\n\n**ισόγειο**, **ημιώροφος**, **1ος–6ος όροφος**, **ρετιρέ**, **υπόγειο**; **γκαρσονιέρα**, **δυάρι**, **τριάρι**, **τεσσάρι**, **μεζονέτα** — [digitized/141.md](digitized/141.md).\n\n### Даты и сроки\n\nКалендарь **πρώτη Ιανουαρίου** …, фразы **στις 15 Νοεμβρίου**, **την πρώτη του μήνα** — [digitized/141.md](digitized/141.md).\n\n### Окончания **-είο / -ιο**\n\nУпр. 10 — [digitized/138.md](digitized/138.md).\n\n## 💬 Готовые фразы и диалоги\n\n### «Πώς το λένε;» — объявление и кафеней (стр. 134)\n\nСводка фраз — [digitized/134.md](digitized/134.md).\n\n**Ενοικιάζεται δεύτερος όροφος, 65 τετραγωνικά μέτρα, κοντά στο μετρό. Ενοίκιο λογικό.**\n\n### Диалог **B1** — **στο καφενείο** (стр. 133)\n\n**Νίκος:** Καλημέρα, Παναγιώτη.\n\n**Παναγιώτης:** Καλώς τον Νίκο. Πώς από ’δώ τέτοια ώρα;\n\n**Νίκος:** Σήμερα ξεκινάω νωρίς νωρίς τα μαθήματα. Μου φτιάχνεις το καφεδάκι μου; Α, Παναγιώτη…\n\n**Παναγιώτης:** Πες μου.\n\n**Νίκος:** Είναι ένα σπίτι που νοικιάζεται. Να βάλω την αγγελία στο καφενείο;\n\n**Παναγιώτης:** Ευχαρίστως. Ποιανού είναι;\n\n**Νίκος:** Του φίλου μου του Σταύρου.\n\n**Παναγιώτης:** Σταύρος, Σταύρος… Δεν τον ξέρω.\n\n**Νίκος:** Πώς δεν τον ξέρεις! Ο γιος της κυρίας Χρύσας, που δουλεύει στον δήμο, και του κυρίου Μάκη, του υδραυλικού. Το σπίτι του είναι στην πολυκατοικία απέναντι από το φαρμακείο, κοντά στη στάση του λεωφορείου.\n\n**Παναγιώτης:** Α, ναι, ο Σταύρος. Τώρα θυμάμαι. Δεν έχει κι ένα παιδάκι;\n\n**Νίκος:** Ναι, μια κόρη πέντε χρονών. Φεύγουν για τη Θεσσαλονίκη τον άλλο μήνα, για μια καινούρια δουλειά, και νοικιάζουν το σπίτι τους.\n\n**Παναγιώτης:** Καλά. Πού είναι η αγγελία; Εντάξει… Τη βάζω εδώ, στην πόρτα, κάτω από τις άλλες.\n\n### Объявление (как в учебнике, стр. 133)\n\n**ΕΝΟΙΚΙΑΖΕΤΑΙ**  \n2ος όροφος, 65 τ.μ., μεγάλη βεράντα  \nκοντά στο μετρό. Ενοίκιο ΤΗΛ: 6981534472  \nλογικό. Απογεύματα\n\n### Диалог **B2** — **Τηλεφωνώ για την αγγελία** (стр. 139)\n\n**Σταύρος:** Παρακαλώ.\n\n**Ντιάνα:** Καλημέρα. Ο κύριος Σταύρος;\n\n**Σταύρος:** Ο ίδιος.\n\n**Ντιάνα:** Τηλεφωνώ για την αγγελία, για το δυάρι. Είστε ο ιδιοκτήτης;\n\n**Σταύρος:** Μάλιστα. Όμως, ξέρετε, δεν είναι ακόμα ελεύθερο. Θα είναι σε δύο εβδομάδες περίπου. Στις 15 Νοεμβρίου.\n\n**Ντιάνα:** Δεν υπάρχει πρόβλημα.\n\n**Σταύρος:** Αν έχετε χρόνο, κλείνουμε ένα ραντεβού σήμερα το απόγευμα.\n\n**Ντιάνα:** Ναι, βέβαια. Κατά τις 6:00 είναι καλά;\n\n**Σταύρος:** Στις 6:00 λοιπόν. Η διεύθυνση του σπιτιού είναι Μυστρά 18 και το κουδούνι γράφει Αλεξίου Σταύρος. Στον δεύτερο όροφο.\n\n**Ντιάνα:** Μία ερώτηση μόνο. Είναι κοντά στη στάση «Πανόραμα»;\n\n**Σταύρος:** Πολύ κοντά. Περνάτε τον φούρνο, προχωράτε ευθεία και στο πρώτο στενό στρίβετε δεξιά. Στη γωνία υπάρχει ένα καφενείο. Το σπίτι είναι μετά 50 μέτρα περίπου.\n\n**Ντιάνα:** Σας ευχαριστώ! Γεια σας!\n\n### Диалог **B3** — **Έχουμε ραντεβού για το διαμέρισμα** (стр. 143)\n\n**Ντιάνα:** Καλησπέρα σας. Έχουμε ραντεβού για το διαμέρισμα.\n\n**Σταύρος:** Ναι. Περάστε.\n\n**Ντιάνα:** Ευχαριστώ. Ωραία η γειτονιά σας. Είναι ήσυχη. Σίγουρα πιο ήσυχη από αυτή που μένω τώρα.\n\n**Σταύρος:** Και πολύ κοντά στο μετρό. Λοιπόν, από ’δώ είναι η κουζίνα, η κρεβατοκάμαρα και στο βάθος το μπάνιο.\n\n**Ντιάνα:** Μμμ, τα άλλα δωμάτια δεν είναι άσχημα, η κρεβατοκάμαρα, όμως, είναι λίγο μικρή. Και λίγο σκοτεινή.\n\n**Σταύρος:** Ναι, αλλά το σαλόνι είναι πιο άνετο και πιο φωτεινό. Έχει και μεγάλη βεράντα.\n\n**Ντιάνα:** Σίγουρα. Όμως βλέπει στο σχολείο. Είναι ήσυχο;\n\n**Σταύρος:** Αρκετά. Αν δε σας ενοχλούν οι φωνές των παιδιών την ώρα του διαλείμματος.\n\n**Ντιάνα:** Και το ενοίκιο;\n\n**Σταύρος:** 500 ευρώ.\n\n**Ντιάνα:** Κάπως ακριβό για μένα.\n\n**Σταύρος:** Όπως βλέπετε, όλα τα πατώματα είναι καινούρια. Το ίδιο και τα ντουλάπια της κουζίνας. Ακόμη, έχει τηλέφωνο και δύο κλιματιστικά.\n\n**Ντιάνα:** Ναι, όμως στα άλλα διαμερίσματα της περιοχής το ενοίκιο είναι πιο φτηνό.\n\n**Σταύρος:** Νομίζω ότι δεν έχετε δίκιο. Οι άλλες πολυκατοικίες είναι πιο παλιές από αυτή. Πολλές, μάλιστα, δεν έχουν θέρμανση, ασανσέρ…\n\n**Ντιάνα:** Ναι. Ξέρετε, μου αρέσει το διαμέρισμα, αλλά θα ήθελα λίγο χρόνο.\n\n**Σταύρος:** Όπως θέλετε.\n\n## 📖 Эталоны для самопроверки\n\n*Сжатые ответы. Аудио (**напр. B4**, стр. 147) и объёмные задания на письмо — без полного ключа.*\n\n### Упр. 1 (стр. 134) — **Συμπληρώνω**\n\nΟ Σταύρος είναι **ο γιος** του κυρίου Μάκη, του **υδραυλικού** και της **κυρίας Χρύσας** που δουλεύει στον δήμο. Μένει απέναντι από **το φαρμακείο**, κοντά στη **στάση** του λεωφορείου. Έχει μια κόρη πέντε **χρονών**. Τον άλλο μήνα **φεύγουν** για τη Θεσσαλονίκη και **νοικιάζουν** το σπίτι τους.\n\n### Упр. 1.1 — **Σωστό ή λάθος** по диалогу B2 (стр. 139)\n\n| № | Ответ | Комментарий |\n|---|--------|-------------|\n| 1 | Λάθος | свободно **στις 15 Νοεμβρίου**, не «летом» |\n| 2 | Σωστό | **κοντά στη στάση** |\n| 3 | Λάθος | **καφενείο** в углу, не пекарня |\n| 4 | Λάθος | **Αλεξίου Σταύρος** на звонке |\n| 5 | Λάθος | **50 μ.** от поворота до дома; **καφενείο** — в углу по пути |\n| 6 | Σωστό | **ραντεβού** в тот же день |\n\n### Упр. 1.5 — **Σωστό ή λάθος** по B3 (стр. 144)\n\n| № | Ответ |\n|---|--------|\n| 1 | Σωστό |\n| 2 | Λάθος *(κρεβατοκάμαρα σκοτεινή, όχι φωτεινή)* |\n| 3 | Σωστό *(πρώτα η κουζίνα)* |\n| 4 | Λάθος *(ντουλάπια καινούρια)* |\n| 5 | Σωστό *(δύο κλιματιστικά)* |\n| 6 | Λάθος *(έχει ασανσέρ — см. реплику про другие дома)* |\n\n### Упр. 8 (стр. 137) — выбор формы **Γ2**\n\n2. **Θυμούνται** · 3. **Τον λυπάμαι** · 4. **κοιμάμαι**\n\n\n### Упр. 3 (стр. 136) — **σκίτσο**, родительный\n\nТекст задания — [digitized/136.md](digitized/136.md). Опорные формы: **των αυτοκινήτων** · **της Ελένης** και **του Νίκου** · **του γιού**, **της κόρης** · **του αυτοκινήτου** · **των παιδιών** *(сверка по скану стр. 136)*.\n\n## 📇 Словарь и чеклист\n\n### Район и службы\n\n| ελληνικά | по-русски |\n|----------|-----------|\n| το πάρκο | парк |\n| το καφενείο | кафенейо |\n| το φαρμακείο | аптека |\n| το σχολείο | школа |\n| η στάση | остановка |\n| το σούπερ μάρκετ | супермаркет |\n| ο φούρνος | пекарня |\n| το μετρό | метро |\n| το περίπτερο | киоск |\n\n### Жильё и объявление\n\n| ελληνικά | по-русски |\n|----------|-----------|\n| η αγγελία | объявление |\n| το ενοίκιο | арендная плата |\n| ενοικιάζεται | сдаётся |\n| ο όροφος | этаж |\n| τα τετραγωνικά (μέτρα) | квадратные метры (τ.μ.) |\n| το διαμέρισμα | квартира |\n| το δυάρι | «двушка» (2 комнаты) |\n| ο ιδιοκτήτης | собственник |\n| η διεύθυνση | адрес |\n| το κουδούνι | дверной звонок / табличка |\n| ο μεσίτης / η μεσίτρια | риелтор |\n\n### Комнаты и мебель *(опорно)*\n\nСписок в учебнике — [digitized/145.md](digitized/145.md) (**κουζίνα**, **μπάνιο**, **σαλόνι**, **ντουλάπι** …).\n\n### Чеклист\n\n- [ ] **Ποιανού είναι …;** — ответ **του / της / των** + форма слова\n- [ ] **ενοίκιο**, **όροφος**, **τετραγωνικά**, **κοντά στο μετρό**\n- [ ] предлоги места: **κοντά**, **απέναντι από**, **δίπλα**, **μπροστά από**\n- [ ] сравнение: **πιο … από** · усиление: **πολύ …**\n- [ ] возраст: **Πόσων χρονών είσαι;** — **… χρονών**\n- [ ] глаголы **-άμαι**: **θυμάμαι**, **φοβάμαι**, **κοιμάμαι**\n\n---\n\n*Развёрнутые таблицы грамматики и лексики в репозитории:* [digitized/132.md](digitized/132.md) · [digitized/134.md](digitized/134.md) · [digitized/141.md](digitized/141.md) · [digitized/145.md](digitized/145.md).\n";

    document.getElementById("prompt-block").textContent = VOICE_PROMPT;
    if (typeof marked !== "undefined") {
      document.getElementById("essence-render").innerHTML = marked.parse(ESSENCE_MD);
    } else {
      document.getElementById("essence-render").innerHTML = "<pre>" + ESSENCE_MD.replace(/</g, "&lt;") + "</pre>";
    }

    document.getElementById("copy-all").addEventListener("click", async () => {
      const text = VOICE_PROMPT + "\n\n---\n\n" + ESSENCE_MD;
      try {
        await navigator.clipboard.writeText(text);
        const el = document.getElementById("copy-feedback");
        el.textContent = "Скопировано.";
        setTimeout(() => { el.textContent = ""; }, 2500);
      } catch (e) {
        alert("Не удалось скопировать: " + e);
      }
    });
  </script>
