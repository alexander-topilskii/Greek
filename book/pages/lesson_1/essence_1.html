  <script>
    const VOICE_PROMPT = "Ρόλος:\n\nΕίσαι ένας αυστηρός, λακωνικός και ενεργητικός καθηγητής ελληνικών για ηχητική εξάσκηση (Voice Mode). Ο μαθητής σου είναι ρωσόφωνος. Ο στόχος σου είναι να με βοηθήσεις να μάθω και να εμπεδώσω το υλικό από τις επισυναπτόμενες σημειώσεις (αρχείο essence — κονσπέκτο του μαθήματος). Πρέπει να υποθέσεις ότι δεν βλέπω τις σημειώσεις και δεν τις ξέρω απ' έξω. Το έργο σου είναι να μου υποενθυμίζεις τμηματικά λέξεις, κανόνες και έτοιμες φράσεις και να τα εξασκούμε αμέσως μέσω διαλόγου.\n\nΠρόσθετη προτεραιότητα — διάλογοι:\n\nΟι πλήρεις διάλογοι στις σημειώσεις (γραμμές με ονόματα, σκηνές) είναι για την επόμενη φάση. Πρώτα εξασκούμε ξεχωριστά τις φράσεις, τα μοτίβα και τις κατασκευές του μαθήματος (3–4 μικρά βήματα ανά θέμα). Μόνο όταν τα κατακτήσω σε απλές προτάσεις και μεταφράσεις, περνάμε σε σύντομο διάλογο: εσύ λες μία γραμμή από το κείμενο των σημειώσεων και περιμένεις τη δική μου — όχι ανάγνωση ολόκληρου του διαλόγου σε μία ροή χωρίς παύση.\n\nΚανόνες διδασκαλίας (ΚΡΙΣΙΜΑ):\n\nΑπό το απλό στο σύνθετο: Εστίασε σε ολόκληρες προτάσεις. Διάλεξε μία κατασκευή από τις σημειώσεις — π.χ. ένα ρήμα σε συγκεκριμένο χρόνο, ένα ερώτημα από πίνακα ερωτήσεων, ένα μοτίβο με άρθρο και προθέσεις —, θύμισέ το πολύ σύντομα και ζήτα μετάφραση απλής πρότασης από τα ρωσικά στα ελληνικά (ή το αντίστροφο, αν ταιριάζει στο μάθημα). Όταν απαντήσω σωστά — δώσε λίγο πιο δύσκολη πρόταση με την ίδια κατασκευή.\n\nΣύντομο feedback: Επιδοκιμασία επιτρέπεται, αλλά αυστηρά 1–2 λέξεις («Μπράβο», «Πολύ καλά»). Σωστή απάντηση — σύντομη επιβεβαίωση («Ναι» / «Σωστά») και αμέσως επόμενη άσκηση.\n\nΣκληρή διόρθωση λαθών: Αν έκανα λάθος, η ροή είναι σταθερή:\n\nΠες «Όχι» ή «Λάθος» και πες το σωστό.\n\nΑμέσως «Επανάλαβε».\n\nΠερίμενε να το πω σωστά.\n\nΑμέσως μετά δώσε νέα, παρόμοια πρόταση για τον ίδιο κανόνα, για ενίσχυση.\n\nΚαθυστερημένη επανάληψη: Θυμήσου την πρόταση όπου έσφαλα. Κάνε 2–3 άλλες ερωτήσεις από τις σημειώσεις και μετά ξαφνικά ξανά την ίδια αρχική πρόταση.\n\nΔόση: Μην ξεχύνεις όλο το υλικό των σημειώσεων. Ένας κανόνας ή μία λέξη — 3–4 προτάσεις — μετά επόμενο θέμα.\n\nΜη μιλάς για λογαριασμό μου: Αν σωπαίνω ή κολλάω, δώσε κοντή υπόδειξη (πρώτη λέξη), όχι ολόκληρη την απάντηση, εκτός αν πω ρητά «Πες μου την απάντηση» / «Скажи ответ».\n\nΕυελιξία: Αν ζητήσω να αλλάξει μορφή, να παραλείψω θέμα ή να κάνουμε αλλιώς — συμφώνησε αμέσως και προσαρμόσου.\n\nΕιδικά για ΦΩΝΗ:\n\nΥπερ-συντομία: Μέχρι 1–2 προτάσεις ανά ρεπλίκα σου.\n\nΈνα βήμα τη φορά: Ποτέ δύο ερωτήσεις στη σειρά. Έκανες ερώτηση — σώπασε και περίμενε.\n\nΧωρίς μορφοποίηση στη φωνή: Όχι λίστες, παύλες, αγκύλες στην ομιλία σου — φυσική προφορική γλώσσα.\n\nΧωρίς μετα-φράσεις τύπου «Πάμε παρακάτω;» — συνέχισε αθόρυβα στο επόμενο βήμα.\n\n---\n\nΣυνημμένο: σημειώσεις μαθήματος (essence_N.md) — ακολούθα αυστηρά το περιεχόμενό τους για λεξιλόγιο, γραμματική και διάλογους.";
    const ESSENCE_MD = "# 💎 Урок 1 — суть: «Γεια σας» — приветствие, имя, страна, 0–10 (стр. 14–23)\n\n**[🏠 Readme](../../../Readme.md) → [📘 book/pages](../) → [📚 content_1.md](content_1.md) → 📄 `essence_1.md`**\n\n*Первая единица **«Ελληνικά Α'»** («**Γεια σας**»). Материал **самодостаточен** для повторения темы: правила, фразы,\nэталоны, словарь. **Порядок:** цели → грамматика → фразы и диалоги → эталоны → словарь.*\n\n| ⚡ Быстрые ссылки       |                                                                                                                       |\n|------------------------|-----------------------------------------------------------------------------------------------------------------------|\n| 📚 Страницы со сканами | [content_1.md](content_1.md)                                                                                          |\n| 🖼 Диапазон            | стр. 14–23                                                                                                            |\n| 📘 Рядом по курсу      | [essence_0](../lesson_0/essence_0.md) · [essence_2](../lesson_2/essence_2.md) · [обзор 1–4](../lesson_5/essence_5.md) |\n\n## 📌 Тема и цели\n\n### После повторения я могу (проверяемые цели)\n\n- Поздороваться и попрощаться в типичных ситуациях (**γεια σου/σας**, **καλημέρα** …).\n- Сказать «я …», спросить и ответить «как зовут» (**είμαι**, **με λένε**, **πώς σε λένε** …).\n- Сказать, откуда я (**είμαι από τον/την/το …**).\n- Назвать и записать числа **0–10**; прочитать базовые знаки препинания (**; ! , .**).\n- Отличить пары слов по **τόνος** (πότε/ποτέ …) и прочитать **αι, αυ, ευ** и сочетания **μπ, ντ, γκ** в словах урока.\n\n### Содержание темы\n\n- **Γεια σου / Γεια σας** — неформально / вежливо или к нескольким людям.\n- **Είμαι ο/η …** — «я …»; **Είσαι …;** **Είστε …;** парадигма **είμαι**, отрицание **δεν είμαι …**.\n- **Από πού είσαι; / Από πού είστε;** — откуда ты / вы? **Είμαι από τον/την/το …** (после **από** — артикль в вин. п.).\n- **Πώς σε λένε; / Πώς λέγεστε;** (**Πώς σας λένε;**), **Με λένε …**, **Τον/Τη λένε …**.\n- Числа **μηδέν – δέκα**; знаки **; ! , .**; ударение (**τόνος**); чтение **αι, αυ, ευ, μπ, ντ, γκ/γγ, τσ, τζ**.\n\n### Сводка «Τι θα μάθουμε» (стр. 14)\n\n| Колонка 1           | Колонка 2              | Колонка 3            |\n|---------------------|------------------------|----------------------|\n| Γεια σας!           | Από 'δώ η Βέρα.        | Είμαι από το Μεξικό. |\n| Είμαι ο Παναγιώτης. | Πώς σε λένε;           | ' ; , . !            |\n| Είμαι η Αρλέτα.     | Είμαι από τον Καναδά.  | 1–10                 |\n| Από 'δώ ο Αντρέας.  | Είμαι από την Αλβανία. |                      |\n\n## 🧠 Грамматика и правила чтения\n\n### Глагол **είμαι** и местоимения\n\n| лицо  | форма           | пример                 |\n|-------|-----------------|------------------------|\n| εγώ   | είμαι           | η Αρλέτα.              |\n| εσύ   | είσαι           | η Βέρα;                |\n| αυτός | είναι           | ο Ερβίν.               |\n| αυτή  | είναι           | η Μαρίνα.              |\n| αυτό  | είναι           | το παιδί.              |\n| εμείς | είμαστε         | ο Σερίφ και η Αρζού.   |\n| εσείς | είσαστε / είστε | ο Νίκος και η Νατάσα;  |\n| αυτοί | είναι           | ο Πάμπλο και ο Νίκος … |\n| αυτές | είναι           | η Μαρίνα και η Λι.     |\n| αυτά  | είναι           | τα παιδιά.             |\n\n**Отрицание:**  \n— Είσαι από την Ιταλία;  \n— Όχι, δεν είμαι από την Ιταλία.\n\n### Имя: вопросы и ответы\n\n| ελληνικά                     | по-русски        |\n|------------------------------|------------------|\n| Πώς σε λένε;                 | Как тебя зовут?  |\n| Με λένε …                    | Меня зовут …     |\n| Πώς λέγεστε; / Πώς σας λένε; | Как вас зовут?   |\n| Πώς τον λένε; / Τον λένε …   | Как его зовут? … |\n| Πώς τη λένε; / Τη λένε …     | Как её зовут? …  |\n\n### **Από** + артикль (вин. п. после предлога)\n\n| род | пример                                  |\n|-----|-----------------------------------------|\n| ο   | **από τον** Καναδά, **από τον** Λίβανο  |\n| η   | **από την** Ισπανία, **από την** Κίνα … |\n| το  | **από το** Μεξικό, **από το** Βέλγιο    |\n\n*К конструкции **Είμαι από** относятся артикли **τον / την / το** и типичные названия\nстран **Καναδάς, Ισπανία, Μεξικό**.*\n\n### Числа 0–10\n\n| цифра | ελληνικά | варианты написания |\n|-------|----------|--------------------|\n| 0     | μηδέν    |                    |\n| 1     | ένα      |                    |\n| 2     | δύο      | также **δυο**      |\n| 3     | τρία     |                    |\n| 4     | τέσσερα  |                    |\n| 5     | πέντε    |                    |\n| 6     | έξι      |                    |\n| 7     | εφτά     | также **επτά**     |\n| 8     | οχτώ     | также **οκτώ**     |\n| 9     | εννιά    | также **εννέα**    |\n| 10    | δέκα     |                    |\n\n### Пунктуация (греческие знаки)\n\n| Знак  | пример      |\n|-------|-------------|\n| **;** | Εεε;        |\n| **!** | Αααα!       |\n| **,** | Ελένη, έλα. |\n| **.** | Εντάξει.    |\n\n### Ударение: три последних слога; пары по смыслу\n\n| с τόνος     | другое слово | заметка           |\n|-------------|--------------|-------------------|\n| **πότε**    | **ποτέ**     | когда? / никогда  |\n| **τάξη**    | **ταξί**     | класс / такси     |\n| **σχολείο** | **σχόλιο**   | школа / замечание |\n| **γράφει**  | **γραφή**    | пишет / письмо    |\n\n### Произношение — «Για δες» (гласные и **αυ, ευ**)\n\n| Звук    | Буквы / сочетания   | примеры                  |\n|---------|---------------------|--------------------------|\n| [a]     | α                   | Αλεξάνδρα, Αθήνα         |\n| [e]     | ε, αι               | Ελένη, Αιμιλία           |\n| [i]     | ι, η, υ, ει, οι, υι | Ηλίας, Ειρήνη, οικονομία |\n| [o]     | ο, ω                | Όλγα, Ρωξάνη             |\n| [u]     | ου                  | Ουρανία                  |\n| [f]/[v] | φ; **αυ, ευ**       | см. правило ниже         |\n\n**αυ, ευ:** перед **κ, π, τ, φ, θ, χ, σ, ξ, ψ** — **[af]/[ef]**; перед гласной и звонкими согласными — **[av]/[ev]**.  \nСлова для тренировки разбора **αυ, ευ**: Αυστραλία, ευχαριστώ, ευτυχία, αυτοκίνητο, αύριο, αυτός, Ευρώπη, Αυστρία,\nΛευκορωσία, Μαυριτανία, εύκολο, ευρώ.\n\n### Согласные сочетания **μπ, ντ, γκ/γγ, τσ, τζ**\n\n| Написание | Звук         | примеры                   |\n|-----------|--------------|---------------------------|\n| μπ        | [b] или [mb] | μπάσκετ, ομπρέλα          |\n| ντ        | [d] или [nd] | ντίσκο, Αντρέας           |\n| γγ, γκ    | [g] или [ng] | γκαράζ, φεγγάρι, καγκουρό |\n| τσ        | [ts]         | πίτσα, τσάι               |\n| τζ        | [dz]         | τζιν, τζατζίκι            |\n\n*Расширенный список слов для чтения (μπ, ντ, τσ …): [digitized/17.md](digitized/17.md) — по желанию, основная таблица\nвыше.*\n\n## 💬 Готовые фразы и диалоги\n\n### Блоки «Πώς το λένε;» — знакомство (стр. 15)\n\n| ελληνικά                 | по-русски                       |\n|--------------------------|---------------------------------|\n| Γεια σου / Γεια σας.     | привет / здравствуйте (ты / вы) |\n| Από 'δώ ο/η …            | познакомьтесь: …                |\n| Γεια.                    | привет                          |\n| Είμαι ο/η …              | я …                             |\n| Εσύ είσαι η …;           | ты …?                           |\n| Όχι, δεν είμαι … Είμαι … | нет, я не … я …                 |\n| Έλα! Εδώ είμαστε.        | иди! мы здесь.                  |\n\n### «Πώς το λένε;» — неформально и официально (стр. 19)\n\n| Неформально (ανεπίσημο)                       | Официально (επίσημο)                          |\n|-----------------------------------------------|-----------------------------------------------|\n| Πώς σε λένε;                                  | Πώς λέγεστε; (Πώς σας λένε;)                  |\n| Χαίρω πολύ!                                   | Χαίρω πολύ!                                   |\n| Από πού είσαι;                                | Από πού είστε;                                |\n| Είσαι από τον Καναδά; την Αλβανία; το Βέλγιο; | Είστε από τον Λίβανο; την Ισπανία; το Μεξικό; |\n\n### Диалоги (полные тексты)\n\n**В кафенείο — τρεις γυναίκες**\n\n**Μελέκ:** Γεια σας.  \n**Αρλέτα:** Γεια σου, Μελέκ. Από 'δώ η Βέρα.  \n**Μελέκ:** Γεια σου, Βέρα.  \n**Βέρα:** Γεια σου, Μελέκ.\n\n**Νεότερος / μεγαλύτερος**\n\n**Παναγιώτης:** Γεια σας, κύριε Αντρέα.  \n**Κύριος Αντρέας:** Γεια σου, Παναγιώτη μου.\n\n**Υπόδειγμα ταβέρνας**\n\n**Αρλέτα:** Έλα! Εδώ είμαστε.  \n**Ερβίν:** Γεια. Είμαι ο Ερβίν. Εσύ είσαι η Μελέκ;  \n**Βέρα:** Όχι, δεν είμαι η Μελέκ. Είμαι η Βέρα.  \n**Μελέκ:** Εγώ είμαι η Μελέκ.\n\n**Σύντομα υποδείγματα ομιλίας**\n\n— Γεια σου, Κεν. Από 'δώ η Λιζ. — Γεια σου, Λιζ. — Γεια σου, Κεν.  \n— Γεια. Είσαι ο Κώστας; — Όχι, είμαι ο Κεν.\n\n**Έξω από την τάξη**\n\n**Φου:** Καλημέρα.  \n**Πάμπλο:** Γεια, είμαι ο Πάμπλο. Πώς σε λένε;  \n**Φου:** Με λένε Φου.  \n**Πάμπλο:** Χαίρω πολύ.  \n**Φου:** Είσαι από την Ιταλία;  \n**Πάμπλο:** Όχι. Είμαι από την Ισπανία. Εσύ από πού είσαι;  \n**Φου:** Από την Κίνα.\n\n**Στη γραμματεία**\n\n**Μελέκ:** Καλημέρα σας. Είμαι για το μάθημα.  \n**Γραμματέας:** Καλημέρα. Πώς λέγεστε, παρακαλώ;  \n**Μελέκ:** Μελέκ Ολγούν.  \n**Γραμματέας:** Από πού είστε;  \n**Μελέκ:** Από την Τουρκία.  \n**Γραμματέας:** Εδώ είναι η τάξη σας.  \n**Μελέκ:** Ευχαριστώ. Γεια σας.\n\n### Чтение вывесок (стр. 23)\n\n1. **ΚΑΦΕ ΤΑΒΕΡΝΑ** · **ΤΑ ΕΠΤΑ ΑΔΕΛΦΙΑ** (*SEVEN BROTHERS* на вывеске).\n2. **Happening** · **MUSIC BAR**.\n3. **ΧΑΠΕΝΙΝΓΚ** · **AFTER HOURS** — **ΠΑΡ. - ΣΑΒ. & ΑΡΓΙΕΣ** — **Ανοίγουμε μετά τις 4.00 το πρωί**.\n4. Надпись латиницей *kafenio* → **καφενείο**.\n\n## 📖 Эталоны для самопроверки\n\n*Готовые связные тексты для сверки формулировок и самопроверки.*\n\n### Диалог с **είμαι** (Νίκος, Λι, Φου, Πάμπλο …)\n\n**Νίκος:** Καλημέρα. Εγώ είμαι ο Νίκος. Εσύ είσαι η Μελέκ;  \n**Λι:** Όχι. Είμαι η Λι. Και αυτός είναι ο Φου.  \n**Νίκος:** Από πού είστε;  \n**Φου:** Εμείς είμαστε από την Κίνα.  \n**Νίκος:** Εσύ;  \n**Πάμπλο:** Είμαι ο Πάμπλο.  \n**Νίκος:** Εσείς;  \n**Λουντμίλα:** Νατάσα και Λουντμίλα.  \n**Νίκος:** Είστε από τη Ρωσία;  \n**Νατάσα:** Εγώ είμαι από τη Ρωσία και η Λουντμίλα είναι από την Ουκρανία.\n\n### **Γεια σου** / **Γεια σας** (образец подстановки)\n\n1. Γεια **σου**, Βέρα. *(образец — первый пункт)*\n2. Γεια **σας**, παιδιά.\n3. Γεια **σου**, Λι.\n4. Γεια **σας**, κύριε Ιωάννου.\n5. Γεια **σου**, Αρλέτα.\n6. Γεια **σας**, κυρία Κατερίνα.\n\n### Короткий текст знакомства\n\n— **Καλή μέρα!** Εγώ **είμαι** η Μελέκ. Από **'δώ** η Βέρα.  \n— **Γεια σου**, Βέρα. **Είμαι** ο Παναγιώτης.  \n— **Χαίρω πολύ.**\n\n### Исправленный абзац *(образец без ошибок)*\n\n**Γεια σας.** Εγώ **είμαι** η Αρλέτα. **Αυτός είναι** ο Ερβίν. **Είμαστε** από **την** Αλβανία. **Αυτή είναι** η φίλη\nμου, η Βέρα. **Είναι** από **τη** Βουλγαρία.\n\n### Выбор местоимения *(верные формы)*\n\n| №  | Ответ     |\n|----|-----------|\n| 1  | **Αυτοί** |\n| 2  | **Εγώ**   |\n| 3  | **Εσείς** |\n| 4  | **Αυτές** |\n| 5  | **Εσύ**   |\n| 6  | **Αυτή**  |\n| 7  | **Εμείς** |\n| 8  | **Αυτός** |\n| 9  | **Αυτοί** |\n| 10 | **Αυτή**  |\n| 11 | **Τον**   |\n| 12 | **Τη**    |\n\n### Диалог (Σερίφ — Τζον — Ανέτ)\n\n**Σερίφ:** Καλημέρα. Είμαι ο Σερίφ.  \n**Τζον:** Χαίρω πολύ. Με λένε Τζον.  \n**Ανέτ:** Εγώ είμαι η Ανέτ.  \n**Ανέτ:** Από πού είσαι, Τζον;  \n**Τζον:** Εσύ είσαι από τον Καναδά;  \n**Ανέτ:** Από το Βέλγιο.  \n**Τζον:** Από πού είσαι, Σερίφ;  \n**Σερίφ:** Είμαι από την Τουρκία.\n\n## 📇 Словарь урока\n\n### Приветствия и вежливость\n\n| ελληνικά     | по-русски                       |\n|--------------|---------------------------------|\n| γεια σου/σας | привет / до свидания (контекст) |\n| καλημέρα     | доброе утро / день              |\n| καλησπέρα    | добрый вечер                    |\n| καληνύχτα    | спокойной ночи                  |\n| χαίρω πολύ   | рад(а) познакомиться            |\n| κύριε …      | господин …                      |\n| κυρία …      | госпожа …                       |\n| παρακαλώ     | пожалуйста                      |\n| ευχαριστώ    | спасибо                         |\n| συγνώμη      | извините                        |\n\n### Лексика сцен (существительные)\n\n| ελληνικά     | по-русски  |\n|--------------|------------|\n| η τάξη       | класс      |\n| το μάθημα    | урок       |\n| η γραμματεία | канцелярия |\n| η φίλη       | подруга    |\n| τα παιδιά    | дети       |\n| το παιδί     | ребёнок    |\n\n### Страны: ном. + фраза **είμαι από …**\n\n| род | пример                                                                                       | по-русски        |\n|-----|----------------------------------------------------------------------------------------------|------------------|\n| ο   | ο Καναδάς — **από τον Καναδά**                                                               | Канада           |\n| η   | η Ισπανία — **από την Ισπανία**                                                              | Испания          |\n| η   | η Ιταλία, η Κίνα, η Ρωσία, η Ουκρανία, η Αλβανία, η Βουλγαρία, η Αγγλία, η Ελλάδα, η Τουρκία |                  |\n| το  | το Μεξικό, το Βέλγιο — **από το …**                                                          | Мексика, Бельгия |\n| ο   | ο Λίβανος — **από τον Λίβανο**                                                               | Ливан            |\n\n### Числительные 0–10\n\nТаблица **μηδέν – δέκα** — выше, в разделе **«Грамматика»** → **«Числа 0–10»**.\n";

    document.getElementById("prompt-block").textContent = VOICE_PROMPT;
    if (typeof marked !== "undefined") {
      document.getElementById("essence-render").innerHTML = marked.parse(ESSENCE_MD);
    } else {
      document.getElementById("essence-render").innerHTML = "<pre>" + ESSENCE_MD.replace(/</g, "&lt;") + "</pre>";

    document.getElementById("copy-all").addEventListener("click", async () => {
      const text = VOICE_PROMPT + "\n\n---\n\n" + ESSENCE_MD;
      try {
        await navigator.clipboard.writeText(text);
        const el = document.getElementById("copy-feedback");
        el.textContent = "Скопировано.";
        setTimeout(() => { el.textContent = ""; }, 2500);
      } catch (e) {
        alert("Не удалось скопировать: " + e);
      }
    });
