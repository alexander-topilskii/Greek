  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" crossorigin="anonymous"></script>
  <script>
    const VOICE_PROMPT = "Λειτούργησε ως αυστηρός δάσκαλος ελληνικών και συνεργάτης μου για πρακτική εξάσκηση.\n\nЯ новичок в греческом языке, поэтому мета-общение со мной веди на русском. У тебя две основные задачи: разыгрывать со мной диалоги по ролям и строго контролировать мою речь.\n\nПРАВИЛА ИСПРАВЛЕНИЯ ОШИБОК (КРИТИЧЕСКИ ВАЖНО):\n1. Будь максимально краток. Никакой вежливости, похвалы и лишних слов.\n2. Если в моей реплике нет ошибок — ничего не говори вне роли (просто ответь «ОК» или сразу продолжай диалог своей репликой).\n3. Если ты видишь ошибку (в грамматике, лексике, порядке слов) — прерви роль и скажи ТОЛЬКО исправленный вариант. Никаких вступлений вроде «Правильно будет так...» или объяснений.\n4. Переводи фразы на русский язык ТОЛЬКО если я скажу слово «Перевод» или «Translate».\n\nПРАВИЛА РОЛЕВОЙ ИГРЫ:\n1. Я пришлю тебе сценарии (Ситуации). Я всегда играю Роль А, ты всегда играешь Роль Б.\n2. Жди моей первой реплики, не начинай диалог сам (если по сценарию Роль А говорит первой).\n3. Так как я новичок, говори короткими репликами, удобными для восприятия на слух, и используй строго лексику из чек-листа к ситуации. Не усложняй грамматику.\n\nМы будем переходить от одной ситуации к другой по моей команде (например, \"Ситуация 1\").\n\nВот сценарии для нашей практики:\n";
    const SOURCE_MD = "# 🎙 Голосовой урок 16 (по оцифровке главы)\n\n\n### Блок 1: Коммуникативные ситуации (Ролевые игры)\n\n* **Ситуация 1: «Πάμε να πιούμε κανέναν καφέ;» — перерыв и класс (B18)**\n* **Контекст:** Рамка «Πάμε βόλτα;»; Элени хочет кофе на площади; в классе — предложение перенести урок в кафенейон; ответы Никоса и учеников.\n* **Роль А:** Элени / Пабло — инициируйте; **Роль Б:** Никос, Димитра, Войцех, Хамидт.\n* 🎯 **Чек-лист для ситуации:**\n  - *Πάμε να πιούμε κανέναν καφέ;* — Пойдём выпьем кофе?\n  - *Θέλετε να δούμε καμιά ταινία;* — Хотите посмотреть фильм?\n  - *Αποφάσισα να κάνω ένα μεγάλο ταξίδι.* — Решил(а) съездить в большое путешествие.\n  - *Ουφ! Πονοκέφαλος μ’ έπιασε. Σήμερα δεν έχω κέφι για μάθημα. Πάμε να πιούμε κανέναν καφέ στην πλατεία;* — Ух, голова; нет настроения на урок; кофе на площади?\n  - *Δηλαδή, λες να φύγουμε; Τι θα πει ο δάσκαλος;* — То есть уйти? Что скажет учитель?\n  - *Ο Νίκος; Μπορούμε να του πούμε την αλήθεια: ότι είμαστε κουρασμένοι και προτιμάμε να πάμε βόλτα.* — Никосу можно сказать правду: устали, хотим погулять.\n  - *Καλή ιδέα. Να σου πω... Γιατί δεν το λέμε σε όλους; Μπορεί να θέλουν να έρθουν μαζί μας.* — Скажем всем; может, пойдут с нами.\n  - *Παιδιά, η Ελένη προτείνει να κάνουμε το μάθημα έξω σήμερα! Στο καφενείο της πλατείας. Τι λέτε; Νίκο, πάμε;* — Урок на площади, в кафенейоне; Никос, пойдём?\n  - *Ένα λεπτό. Ξέρετε ότι έχουμε πολλή δουλειά. Δεν είπαμε να κάνουμε επανάληψη στα ρήματα σήμερα; Και πρέπει να τελειώσουμε το βιβλίο πριν από τις εξετάσεις. Μπορούμε να βγούμε μετά το μάθημα. Σύμφωνοι;* — Много работы; повторение глаголов; после урока можно выйти.\n  - *Νομίζω ότι δεν έγινε και τίποτα, αν χάσουμε μια ώρα...* — Ничего страшного, если пропустим час…\n  - *Λοιπόν, το συζητάμε σε λίγο. Θέλω πρώτα να δούμε τον διάλογο στη στο σχετικό τμήμα. Αρχίζουμε;* — Обсудим позже; сначала диалог.\n\n---\n\n* **Ситуация 2: «Πώς το λένε» — после B18**\n* **Контекст:** Готовые фразы про настроение и согласие.\n* **Роль А / Б:** Произносите строки по очереди с переводом.\n* 🎯 **Чек-лист для ситуации:**\n  - *«Ουφ! Πονοκέφαλος μ’ έπιασε.»*\n  - *«Δεν έχω κέφι για μάθημα.»*\n  - *«Πάμε να πιούμε κανέναν καφέ;»*\n  - *«Λες να φύγουμε;»*\n  - *«Να σου πω...»*\n  - *«Σύμφωνοι;»*\n  - *«Δεν έγινε και τίποτα.»*\n\n---\n\n* **Ситуация 3: «Θέλετε να δούμε καμιά ταινία;» — кафенейон (B19)**\n* **Контекст:** Фильм, театр, музыка, бузуки, ребетика; договорились смотреть афишу.\n* **Роль А / Б:** Ведите диалог по спикерам; затем — второй блок «Πώς το λένε».\n* 🎯 **Чек-лист для ситуации:**\n  - *Τώρα που καταλαβαίνετε καλά τα ελληνικά, σκέφτομαι να δούμε καμιά ταινία στο μάθημα.* — Предлагаю греческий фильм на уроке.\n  - *Τέλεια! Δεν ξέρω τίποτα από ελληνικό σινεμά.* — Ничего не знаю о греческом кино.\n  - *Μπορούμε να κοιτάξουμε τι παίζουν οι κινηματογράφοι και να πάμε σε μια ελληνική ταινία.* — Посмотрим, что в кинотеатрах.\n  - *Γιατί δεν κανονίζουμε να πάμε και στο θέατρο καμιά φορά;* — Может, в театр как-нибудь?\n  - *Μπράβο, Πάμπλο! Λατρεύω το θέατρο. Κι έχει μια πολύ καλή παράσταση στο Εθνικό. Αλλά πρέπει να κλείσουμε εισιτήρια.* — Обожаю театр; в Национальном — хороший спектакль; билеты.\n  - *Θέλετε να αφήσουμε το θέατρο για αργότερα; Θα είναι δύσκολο να καταλάβουμε, δε νομίζετε; Προτείνω να πάμε κάπου να ακούσουμε ελληνική μουσική.* — Театр оставим на потом? Трудно понять; лучше музыка.\n  - *Ναι, ναι! Μ’ αρέσουν πολύ τα μπουζούκια! Εκεί μπορείς να χορέψεις και να διασκεδάσεις όλη νύχτα!* — Люблю бузуки; танцы всю ночь!\n  - *Ποια μπουζούκια, βρε Δήμητρα; Εγώ είπα να πάμε σε καμιά συναυλία με έντεχνη μουσική. Χατζιδάκις, Θεοδωράκης…* — Речь о концерте «арт-музыки»…\n  - *Γιατί δεν πάμε καλύτερα σε κανένα ταβερνάκι να φάμε, να πιούμε και να ακούσουμε ρεμπέτικα;* — В таверну — еда, питьё, ребетика.\n  - *Έχω μια ιδέα. Μπορείτε να ψάξετε στις εφημερίδες τι γίνεται στην πόλη αυτή την εβδομάδα και την άλλη φορά αποφασίζουμε τι θέλουμε να κάνουμε.* — Идея: поискать в газетах; в следующий раз решим.\n  - *Εντάξει. Έγινε.* — Ладно. Договорились.\n  - *«Δεν ξέρω τίποτα από ελληνικό σινεμά.»* — Ничего не знаю о греческом кино.\n  - *«Τι παίζουν οι κινηματογράφοι;»* — Что идёт в кинотеатрах?\n  - *«Λατρεύω το θέατρο.»* — Обожаю театр.\n  - *«Έχει μια καλή παράσταση, αλλά πρέπει να κλείσουμε εισιτήρια.»* — Хороший спектакль, но билеты заказать.\n  - *«Θα έχουμε πρόβλημα, δε νομίζετε;»* — Будут проблемы, не думаете?\n\n---\n\n* **Ситуация 4: «Θέλω να κάνω ένα μεγάλο ταξίδι» — B20 и лексика поездки**\n* **Контекст:** Никос просит уроки китайского; поездка в Китай; турфирмы; паспорт и виза; фразы «Πώς το λένε».\n* **Роль А / Б:** Никос, Фу, Ли, Панайотис — по диалогу; затем произнесите блоки жёлтый / зелёный / синий.\n* 🎯 **Чек-лист для ситуации:**\n  - *Λοιπόν, παιδιά, θέλω να σας ζητήσω κάτι.* — Прошу кое о чём.\n  - *Ευχαρίστως. Τι;* — С удовольствием. Что?\n  - *Μπορείτε να μου κάνετε δυο τρία μαθήματα κινέζικων;* — Два-три урока китайского?\n  - *Πλάκα μας κάνεις…* — Шутишь…\n  - *Όχι βρε, τι πλάκα. Αποφάσισα να πάω στην Κίνα το καλοκαίρι. Έχω δύο χρόνια να πάω διακοπές και θέλω να κάνω ένα μεγάλο ταξίδι.* — Решил летом в Китай; давно не был в отпуску.\n  - *Γι’ αυτό καλό είναι να ξέρω πώς λένε «καλημέρα», «δεν καταλαβαίνω κινέζικα»…* — Нужно «здравствуйте», «не понимаю китайский»…\n  - *Όχι ακόμα. Αλλά ρώτησα σε δύο τουριστικά γραφεία. Να, εδώ είναι και τα φυλλάδια με τις προσφορές. Περιλαμβάνουν αεροπορικά εισιτήρια, διαμονή σε μονόκλινο σε ξενοδοχείο τεσσάρων αστέρων και όλες τις μετακινήσεις μέσα στη χώρα. Α, και ξεναγό, βέβαια.* — Брошюры турфирм: билеты, отель, экскурсии.\n  - *Ναι, αλλά το ΠΑΝΟΡΑΜΑ προσφέρει ημιδιατροφή, ενώ το άλλο μόνο πρωινό.* — Панорама — полупансион.\n  - *Ξέρεις, χρειάζεται να βγάλεις βίζα.* — Нужна виза.\n  - *Ναι, βέβαια. Θα πάω στην πρεσβεία, αλλά πρέπει πρώτα να ανανεώσω το διαβατήριό μου. Λοιπόν, παιδιά, πότε ξεκινάμε τα μαθήματα;* — Паспорт обновить; когда начнём уроки?\n  - *Πλάκα κάνεις.* — Шутишь.\n  - *Έλα! Μη μου πεις!* — Ну, не говори!\n  - *Χρειάζεται να ανανεώσω το διαβατήριο και να βγάλω βίζα.* — Нужно обновить паспорт и оформить визу.\n  - ***Περιλαμβάνει:*** — Заголовок в брошюре: что входит в тур.\n  - *αεροπορικά εισιτήρια*\n  - *διαμονή σε μονόκλινο*\n  - *ημιδιατροφή*\n  - *μετακινήσεις*\n  - *ξεναγό*\n\n---\n\n* **Ситуация 5: Вопросы, пример и роли (σινεμά, ξενοδοχείο)**\n* **Контекст:** «Η σειρά μου τώρα» §8; образец про Патрика; роли 1.7 (вечер, кино) и 2.8 (номер в отеле).\n* **Роль А / Б:** Ответьте на вопросы; расскажите по образцу; разыграйте один из ролевых сценариев.\n* 🎯 **Чек-лист для ситуации:**\n  - *Σου αρέσει ο κινηματογράφος; Πηγαίνεις στο θέατρο;*\n  - *Τι ξέρεις από ελληνική μουσική; Πήγες ποτέ σε καμιά συναυλία;*\n  - *Πώς διασκεδάζεις συνήθως;*\n  - *Πώς διασκεδάζει ο κόσμος στη χώρα σου;*\n  - **Ο Πάτρικ πηγαίνει συχνά στο σινεμά, αλλά το θέατρο δεν του αρέσει...** — Образец: про Патрика.\n  - *Μιλάω με έναν φίλο / μια φίλη στο τηλέφωνο. Προτείνω να πάμε σινεμά και μετά για φαγητό.* — Роль А: звонок — кино и ужин.\n  - *Ένας φίλος / μια φίλη με παίρνει τηλέφωνο για να πάμε απόψε στον κινηματογράφο. Μιλάμε για την ταινία που μπορούμε να δούμε και την ώρα του ραντεβού. Εγώ δεν μπορώ να βγω μέχρι αργά, γιατί ξυπνάω νωρίς το πρωί.* — Роль Б: друг зовёт в кино.\n  - *Είμαι σε ένα νησί και θέλω να κλείσω δωμάτιο με θέα στη θάλασσα σ’ ένα ξενοδοχείο. Ρωτάω στη ρεσεψιόν αν έχουν δωμάτιο, πόσο κοστίζει, αν περιλαμβάνει πρωινό, αν έχει δικό του μπάνιο και ζεστό νερό, αν υπάρχει κλιματισμός.* — Роль А: бронь номера с видом на море.\n  - *Δουλεύω στη ρεσεψιόν ενός ξενοδοχείου. Μια πελάτισσα / ένας πελάτης ζητάει ένα δωμάτιο. Απαντάω στις ερωτήσεις της / του ευγενικά και προσπαθώ να την / τον εξυπηρετήσω.* — Роль Б: администратор отеля.\n\n---\n\n### Блок 2: Универсальная шпаргалка (Фразы-клише)\n\n**Вводная рамка «Πάμε βόλτα;»**\n\n* **Πάμε να πιούμε κανέναν καφέ;** — *Пойдём выпьем кофе?*\n* **Θέλετε να δούμε καμιά ταινία;** — *Хотите посмотреть какой-нибудь фильм?*\n* **Αποφάσισα να κάνω ένα μεγάλο ταξίδι.** — *Решил(а) сделать большое путешествие.*\n\n**Согласие и настроение (после B18)**\n\n* **«Πάμε να πιούμε κανέναν καφέ;»** — *Пойдём выпьем кофе?*\n* **«Σύμφωνοι;»** — *Согласны?*\n* **«Δεν έγινε και τίποτα.»** — *Ничего страшного не случилось.*\n\n**Развлечения (B19 + «Πώς το λένε»)**\n\n* **«Τι παίζουν οι κινηματογράφοι;»** — *Что идёт в кинотеатрах?*\n* **«Λατρεύω το θέατρο.»** — *Обожаю театр.*\n* **Εντάξει. Έγινε.** — *Ладно. Договорились.*\n\n**Поездка (B20)**\n\n* **Χρειάζεται να ανανεώσω το διαβατήριο και να βγάλω βίζα.** — *Нужно обновить паспорт и оформить визу.*\n* **αεροπορικά εισιτήρια** — *авиабилеты*\n* **διαμονή σε μονόκλινο** — *проживание в одноместном*\n* **ημιδιατροφή** — *полупансион*\n\n---\n\n### Блок 3: Тематический словарь\n\n**Кино, театр, музыка**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| ο κινηματογράφος · το σινεμά | кинотеатр · кино (разг.) |\n| η ταινία | фильм |\n| το θέατρο · η παράσταση | театр · спектакль |\n| τα εισιτήρια | билеты |\n| τα μπουζούκια | бузуки (музыка/заведение) |\n| το ρεμπέτικο | ребетика (жанр) |\n| η συναυλία | концерт |\n\n**Кафе и учёба**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| ο καφές | кофе |\n| το καφενείο | кафенейон |\n| η πλατεία | площадь |\n| το μάθημα | урок |\n| η επανάληψη | повторение |\n\n**Путешествие**\n\n| Слово на греческом | Перевод на русский |\n|--------------------|--------------------|\n| το ταξίδι | поездка, путешествие |\n| οι διακοπές | каникулы, отпуск |\n| το διαβατήριο | паспорт |\n| η βίζα | виза |\n| η πρεσβεία | посольство |\n| το τουριστικό γραφείο | туристическое бюро |\n| το ξενοδοχείο | отель |\n| η ρεσεψιόν | ресепшн |\n| το δωμάτιο | номер (в отеле) |\n\n";

    document.getElementById("prompt-block").textContent = VOICE_PROMPT;
    if (typeof marked !== "undefined") {
      document.getElementById("essence-render").innerHTML = marked.parse(SOURCE_MD);
    } else {
      document.getElementById("essence-render").innerHTML = "<pre>" + SOURCE_MD.replace(/</g, "&lt;") + "</pre>";
    }

    document.getElementById("copy-all").addEventListener("click", async () => {
      const text = VOICE_PROMPT + "\n\n---\n\n" + SOURCE_MD;
      try {
        await navigator.clipboard.writeText(text);
        const el = document.getElementById("copy-feedback");
        el.textContent = "Скопировано.";
        setTimeout(() => { el.textContent = ""; }, 2500);
      } catch (e) {
        alert("Не удалось скопировать: " + e);
      }
    });
  </script>
