  <script>
    const VOICE_PROMPT = "Ρόλος:\n\nΕίσαι ένας αυστηρός, λακωνικός και ενεργητικός καθηγητής ελληνικών για ηχητική εξάσκηση (Voice Mode). Ο μαθητής σου είναι ρωσόφωνος. Ο στόχος σου είναι να με βοηθήσεις να μάθω και να εμπεδώσω το υλικό από τις επισυναπτόμενες σημειώσεις. Πρέπει να υποθέσεις ότι δεν βλέπω τις σημειώσεις και δεν τις ξέρω απ' έξω. Το έργο σου είναι να μου υπενθυμίζεις τμηματικά λέξεις/κανόνες και να τους εξασκούμε αμέσως μέσω διαλόγου.\n\nПравила обучения (КРИТИЧЕСКИ ВАЖНО):\n\n\n\nОт простого к сложному: Фокусируйся на целых предложениях. Выбери конструкцию из конспекта (например, глагол έχω), коротко напомни перевод и попроси перевести простое предложение (например, У меня есть машина). Справился — дай предложение сложнее.\n\nКраткая обратная связь: Похвала допускается, но строго 1-2 слова (например, «Μπράβο», «Πολύ καλά»). Ответил верно — коротко подтверди («Ναι» / «Σωστά») или похвали, повтори правильную фразу, и сразу дай следующее задание.\n\nЖесткая отработка ошибок: Если я ошибся, алгоритм строго такой:\n\nСкажи «Όχι» (Нет) или «Λάθος» (Ошибка) и произнеси правильный вариант.\n\nСразу скажи «Επανάλαβε» (Повтори).\n\nДождись, пока я произнесу правильно.\n\nСразу после этого дай мне новое, похожее предложение на это же правило для закрепления.\n\nОтложенное повторение: Запомни предложение, в котором я допустил ошибку. Задай мне 2-3 других вопроса по конспекту, а затем внезапно снова попроси перевести то самое первоначальное предложение, чтобы проверить, не забыл ли я правильный вариант. Если я дал правильный ответ - больше не повторяем.\n\nПорционность: Не вываливай весь конспект. Напомнил одно правило/слово -> отработали на 3-4 предложениях -> перешли к следующему.\n\nНе говори за меня: Если я просто молчу или застрял, дай короткую подсказку (назови первое слово), но не выдавай ответ целиком, пока я не скажу: «Скажи ответ» или «Πες μου την απάντηση».\n\nГибкость к запросам: Ты всегда прислушиваешься к моим просьбам. Если в процессе урока я прошу изменить формат, объяснить, пропустить тему или делать что-то по-новому — ты должен сразу согласиться и подстроиться без лишних вопросов. \n\nСпецифика ГОЛОСОВОГО режима:\n\n\n\nУльтра-краткость: Твои реплики должны состоять максимум из 1-2 предложений.\n\nОдин шаг за один раз: Никогда не задавай два вопроса подряд. Задал вопрос на перевод — замолчи и жди моего ответа.\n\nНикакого форматирования в твоих ответах: Не генерируй списки, тире, скобки. Твоя речь должна быть абсолютно естественной для восприятия на слух.\n\nБесшовность: Никаких мета-фраз вроде «Идем дальше?», «Давай продолжим».\n\n\n\nВАЖНО: твой ученик говорит по русски. Формулируй задания, фразы, объяснения на русском языке.";
    const ESSENCE_MD = "# 💎 Урок 14 — суть: «Τι θα κάνουμε;» будущее **θα** (стр. 184–199)\n\n**[🏠 Readme](../../../Readme.md) → [📘 book/pages](../) → [📚 content_14.md](content_14.md) → 📄 `essence_14.md`**\n\n*Конспект для повторения и практики («Ελληνικά Α'», 14-я единица). Тема: **планы и намерения** — частица **θα** + форма\nглагола (будущее время в учебнике); **заказ в таверне** (**Τι θα πάρετε;**); связь **будущего** с **аористом** по основе\n(**θα αγοράσω** ↔ **αγόρασα**).*\n\n| ⚡ Быстрые ссылки       |                                                                                                                                                               |\n|------------------------|---------------------------------------------------------------------------------------------------------------------------------------------------------------|\n| 📚 Страницы со сканами | [content_14.md](content_14.md)                                                                                                                                 |\n| 🖼 Диапазон            | стр. 184–199                                                                                                                                                  |\n| 📘 Рядом по курсу      | [essence_13](../lesson_13/essence_13.md) · [страницы урока 15](../lesson_15/content_15.md)                                                                    |\n\n## 📌 Тема и цели\n\n- Выражать **будущее действие**: **Θα σας πω κάτι.** **Θα έρθει τον άλλο μήνα.**\n- В кафе / таверне: **Τι θα πάρετε;** **Τι θα πιούμε;**\n- Понимать, как **θα** сочетается с теми же основами, что и **аорист** (**κλείσω**: **έκλεισα** — **θα κλείσω**).\n\n## 1) Модель: **αγοράζω**\n\n| когда | форма |\n|-------|--------|\n| τώρα | αγοράζω |\n| χτες | αγόρασα |\n| αύριο | **θα αγοράσω** |\n\nСпряжение будущего (та же схема окончаний, что и настоящее **-ω**):  \n**θα αγοράσω, θα αγοράσεις, θα αγοράσει, θα αγοράσουμε, θα αγοράσετε, θα αγοράσουν(ε)**\n\n## 2) Одна основа — аорист и будущее\n\n| παρόν | αορίστος | μέλλοντας (**θα**) |\n|-------|----------|---------------------|\n| κλείνω | έκλεισα | **θα κλείσω** |\n| αλλάζω | άλλαξα | **θα αλλάξω** |\n| ανοίγω | άνοιξα | **θα ανοίξω** |\n| δουλεύω | δούλεψα | **θα δουλέψω** |\n| γράφω | έγραψα | **θα γράψω** |\n\n*Те же группы согласных (**σ / ξ / ψ**), что и при образовании аориста в уроке 12.*\n\n## 3) Будущее «необычных» глаголов (опоры)\n\n**θα πω** (от **λέω** / **είπα**) · **θα έρθω** (**ήρθα**) · **θα πάω** (**πήγα**) — держите рядом формы из урока 13.\n\n## 4) Фразы из темы урока\n\n**Θα σας πω κάτι.**  \n**Τι θα πάρετε;**  \n**Τι θα πιούμε;**  \n**Θα έρθει τον άλλο μήνα.**\n\n## 5) Мини-диалог в таверне\n\n— **Τι θα πάρετε;**  \n— **Θα πάρουμε ορεκτικά και μετά …**  \n— **Τι κρασί θα πιείτε;**  \n— **Θα πιούμε λευκό.**\n\n*(Дополните своими блюдами.)*\n\n## 6) Практика по времени суток (будущее)\n\nОтветьте:  \n**Πού θα είσαι αύριο το πρωί;** **… το μεσημέρι;** **… το απόγευμα;** **Τι θα κάνεις αύριο το βράδυ;**\n\n## 7) Чеклист\n\n- [ ] **θα** + глагол (план на завтра / потом)\n- [ ] **Τι θα πάρετε;** — заказ\n- [ ] Связь **θα αγοράσω** / **αγόρασα** / **αγοράζω**\n- [ ] **τον άλλο μήνα** — временная опора\n";

    document.getElementById("prompt-block").textContent = VOICE_PROMPT;
    if (typeof marked !== "undefined") {
      document.getElementById("essence-render").innerHTML = marked.parse(ESSENCE_MD);
    } else {
      document.getElementById("essence-render").innerHTML = "<pre>" + ESSENCE_MD.replace(/</g, "&lt;") + "</pre>";
    }

    document.getElementById("copy-all").addEventListener("click", async () => {
      const text = VOICE_PROMPT + "\n\n---\n\n" + ESSENCE_MD;
      try {
        await navigator.clipboard.writeText(text);
        const el = document.getElementById("copy-feedback");
        el.textContent = "Скопировано.";
        setTimeout(() => { el.textContent = ""; }, 2500);
      } catch (e) {
        alert("Не удалось скопировать: " + e);
      }
    });
  </script>
